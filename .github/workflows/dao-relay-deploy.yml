name: Deploy dao-relay Worker

# 道法自然 · 中继 Worker 去中心化部署: 往 main 推 addons/dao-relay/** 即自动用 wrangler 部署到
# Cloudflare(Worker dao-relay-do)。这样 worker.js / keys.js 的改动(含「网页内原生直渲」反代路由)
# 合并即上线, 无需任何人手工 wrangler deploy。
#
# 需在仓库 Secrets 配置:
#   CLOUDFLARE_API_TOKEN   —— 具备 Workers 编辑权限的 API Token
# 账号 ID 非机密, 直接写在 env(也可改用 secret 覆盖)。

on:
  push:
    branches: [main]
    paths:
      - "addons/dao-relay/**"
      - ".github/workflows/dao-relay-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dao-relay-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addons/dao-relay
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '3a57c2b4682757ec20145ccdb0e6b6a7' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Guard — skip if token missing
        id: guard
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "no_token=1" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN 未配置, 跳过部署。请在仓库 Settings → Secrets 添加。"
          else
            echo "no_token=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.guard.outputs.no_token == '0'
        run: npm install --no-audit --no-fund

      - name: Deploy
        if: steps.guard.outputs.no_token == '0'
        run: CI=1 npx wrangler deploy
