name: Sync plugins to Release

# 道法自然 · 去中心化按模块发版：往 main 推代码即可。本工作流只重建并发版「真正改动的模块」，
# 每个模块发到自己的 tag <key>-v<version>（资产仅含它自己的 VSIX），互不干扰（鸡犬相闻，老死不相往来）；
# 末尾据各模块当前版本自动维护 README 下载索引。鉴权用内置 GITHUB_TOKEN，跑在 GitHub 原生环境。
# 单一事实源 = tools/modules.json（detect/notes/index 三处都读它）。
# 触发：push 到 main（命中 core/** · addons/** · 发版基础设施）；亦可手动 workflow_dispatch（all=true 强制全量，
#       auto-merge 合并后也会 dispatch 本工作流——彼时按合并提交差异只发改动模块）。

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "addons/**"
      - "tools/pack-vsix.js"
      - "tools/modules.json"
      - "tools/detect-modules.js"
      - "tools/release-notes.js"
      - "tools/gen-readme-index.js"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      all:
        description: "强制全部 vsix 模块发版 (true/false)"
        default: "false"

permissions:
  contents: write

concurrency:
  group: release-decentralized
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.d.outputs.modules }}
      any: ${{ steps.d.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - id: d
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.all }}" = "true" ]; then
            MODS=$(node tools/detect-modules.js --all)
          else
            BEFORE="${{ github.event.before }}"
            ZERO="0000000000000000000000000000000000000000"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "$ZERO" ] && git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              git diff --name-only "$BEFORE" "${{ github.sha }}" > changed.txt
            else
              # workflow_dispatch / 无 before：用合并提交相对首父的差异（= 被合 PR 的改动）
              git diff --name-only "${{ github.sha }}^" "${{ github.sha }}" > changed.txt 2>/dev/null || git diff --name-only HEAD~1 HEAD > changed.txt
            fi
            echo "changed files:"; cat changed.txt || true
            MODS=$(node tools/detect-modules.js --files changed.txt)
          fi
          echo "modules=$MODS" >> "$GITHUB_OUTPUT"
          if [ "$MODS" = "[]" ]; then echo "any=false" >> "$GITHUB_OUTPUT"; else echo "any=true" >> "$GITHUB_OUTPUT"; fi
          echo "detected modules: $MODS"

  release:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        key: ${{ fromJson(needs.detect.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Build ${{ matrix.key }} VSIX
        env:
          KEY: ${{ matrix.key }}
        run: |
          set -e
          node -e '
            const fs=require("fs");
            const reg=JSON.parse(fs.readFileSync("tools/modules.json","utf8"));
            const m=reg.modules.find(x=>x.key===process.env.KEY);
            if(!m){console.error("unknown module "+process.env.KEY);process.exit(1);}
            // 每条命令各自在子 shell 中从仓库根执行，避免 cd 串味
            const sh="set -e\n"+(m.build||[]).map(c=>"( "+c+" )").join("\n")+"\n";
            fs.writeFileSync("build.sh", sh);
          '
          echo "----- build.sh -----"; cat build.sh; echo "--------------------"
          bash build.sh
      - name: Create/update Release for ${{ matrix.key }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ matrix.key }}
        run: |
          set -e
          DIR=$(node -p "require('./tools/modules.json').modules.find(m=>m.key===process.env.KEY).dir")
          NAME=$(node -p "require('./tools/modules.json').modules.find(m=>m.key===process.env.KEY).name")
          VER=$(node -p "require('./$DIR/package.json').version")
          TAG="${KEY}-v${VER}"
          VSIX="$DIR/${NAME}-${VER}.vsix"
          echo "module=$KEY dir=$DIR vsix=$VSIX tag=$TAG"
          ls -lh "$VSIX"
          node tools/release-notes.js "$KEY" > notes.md
          TITLE="$KEY v$VER"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file notes.md --draft=false
            gh release upload "$TAG" "$VSIX" --clobber
          else
            gh release create "$TAG" "$VSIX" --title "$TITLE" --notes-file notes.md --target "$GITHUB_SHA"
          fi
          echo "released $TAG"

  index:
    needs: [detect, release]
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Regenerate README module index
        run: node tools/gen-readme-index.js
      - name: Commit README if changed
        run: |
          set -e
          if [ -n "$(git status --porcelain README.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs(readme): auto-sync 模块下载索引 [skip ci]"
            git push
          else
            echo "README module index unchanged"
          fi
