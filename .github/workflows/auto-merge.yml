name: Auto-merge clean PRs

# 道法自然：无冲突的 PR 自动合并进 main，有冲突的留待人工解决。
# 触发：PR 开启/更新/重开/转就绪 时自动判定；亦可手动 workflow_dispatch 扫描全部开放 PR。

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write   # 允许合并后 dispatch release.yml

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || 'sweep' }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.base.ref == 'main' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Merge mergeable PR(s)
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let numbers = [];
            if (context.eventName === 'workflow_dispatch') {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner, repo, state: 'open', base: 'main', per_page: 100,
              });
              numbers = prs
                .filter(p => !p.draft && p.head.repo && p.head.repo.full_name === `${owner}/${repo}`)
                .map(p => p.number);
            } else {
              numbers = [context.payload.pull_request.number];
            }

            let mergedAny = false;
            for (const number of numbers) {
              // GitHub computes `mergeable` asynchronously; poll until known.
              let pr = null;
              for (let i = 0; i < 10; i++) {
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: number })).data;
                if (pr.mergeable !== null) break;
                await new Promise(r => setTimeout(r, 4000));
              }
              if (!pr || pr.state !== 'open') { core.info(`#${number}: not open, skip`); continue; }
              if (pr.draft) { core.info(`#${number}: draft, skip`); continue; }
              if (pr.mergeable === false) { core.info(`#${number}: has conflicts, leaving for manual resolution`); continue; }
              if (pr.mergeable !== true) { core.info(`#${number}: mergeability still unknown, skip this run`); continue; }
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: number, merge_method: 'merge' });
                core.notice(`#${number}: merged into main`);
                mergedAny = true;
              } catch (e) {
                core.warning(`#${number}: merge failed (${e.status}) ${e.message}`);
              }
            }

            // 自动合并由 GITHUB_TOKEN 完成，其 push 不会触发 release.yml / android-release.yml /
            // dao-relay-deploy.yml 的 on:push（GitHub 防递归）。故显式 dispatch（workflow_dispatch 是
            // GITHUB_TOKEN 的例外，可正常触发）把最新成果同步上线。三者都 dispatch（均幂等，无变化时为空转/跳过）：
            //   release.yml 发插件、android-release.yml 发手机版 APK、dao-relay-deploy.yml 部署中继 Worker。
            // 缺了 android-release.yml → rt-flow-app 改动进 main 后 APK 从不构建, latest.json 却已升版 →
            //   App「检查更新」查到新版但下载 404 → 用户装不上、仍是旧版。
            // 缺了 dao-relay-deploy.yml → addons/dao-relay 改动进 main 后 Worker 从不重部署 →
            //   单网页控台(/console·/i-init·/i/ 边缘自愈等)的修复永远不上线、公网通道用旧逻辑。
            if (mergedAny) {
              for (const wf of ['release.yml', 'android-release.yml', 'dao-relay-deploy.yml']) {
                try {
                  await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: wf, ref: 'main' });
                  core.notice(`dispatched ${wf} to publish latest release`);
                } catch (e) {
                  core.warning(`${wf} dispatch failed (${e.status}) ${e.message}`);
                }
              }
            }
