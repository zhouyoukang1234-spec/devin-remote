name: Build & Release rt-flow APK

# 道法自然 · 手机版 APK 去中心化发版：往 main 推 addons/rt-flow-app/** 即自动构建签名 APK 并发到
# tag rtflow-v<versionName>（资产 DevinCloud-mobile-v<versionName>.apk），与 latest.json 的 url 对齐，
# 从而 App 内「检查更新」可检索到并下载安装。版本号唯一事实源 = app/build.gradle 的 versionName/versionCode。
# 签名用仓库内固定 release.keystore（侧载分发用），任意机器/CI 构建签名一致 → 自更新不会因签名不符被拒。
# 已存在同名资产则跳过（幂等，重跑不重复构建/覆盖）。

on:
  push:
    branches: [main]
    paths:
      - "addons/rt-flow-app/**"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rtflow-apk-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      # 显式 checkout main 活动分支顶端，而非 dispatch 时记录的 github.sha。
      # auto-merge 合并后立刻 dispatch 本流，若用默认 (= dispatch 时刻的 main SHA)
      # 会读到合并前的旧 versionName → 误判该版已发布而跳过 → 新版 APK 永不构建
      # (即「升版号却不发包」)。fetch-depth:0 取全量，确保 --target $GITHUB_SHA 可定位。
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 版本 + 自动升版断链根治:
      #   病灶: 改了 rt-flow-app 代码却忘了升 versionCode/versionName → 本流读到旧版号 →
      #         发现该版 Release 已存在 → 跳过构建 → 新代码永不发包; 用户手机(已在该版)查更新得 hasUpdate=false → 永远收不到。
      #   修法: 若「该版 Release 已存在」且「自该 tag 以来 rt-flow-app 代码有改动(排除 build.gradle/latest.json 自身)」,
      #         即判定为「改了码没升号」→ 自动 versionCode+1·versionName 末段+1·同步 latest.json(版本号+url) 并提交回 main,
      #         再据新版号构建发版。GITHUB_TOKEN 的提交不触发 on:push(防递归), 同一次运行内继续构建, 无死循环。
      - name: Resolve version (auto-bump if code changed without a version bump)
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git fetch --tags --force --quiet || true
          GRADLE=addons/rt-flow-app/app/build.gradle
          LATEST=addons/rt-flow-app/latest.json
          VN=$(grep -oP 'versionName\s+"\K[^"]+' "$GRADLE")
          VC=$(grep -oP 'versionCode\s+\K[0-9]+' "$GRADLE")
          TAG="rtflow-v$VN"
          ASSET="DevinCloud-mobile-v$VN.apk"
          need_bump=false
          if gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; then
            # 该版已发布。自该 tag 以来 rt-flow-app 是否有「非版本文件」改动?
            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              CHANGED=$(git diff --name-only "refs/tags/$TAG" HEAD -- addons/rt-flow-app \
                | grep -v -e '^addons/rt-flow-app/app/build.gradle$' -e '^addons/rt-flow-app/latest.json$' || true)
              if [ -n "$CHANGED" ]; then
                need_bump=true
                echo "代码自 $TAG 以来有改动但版本号未升 → 自动升版:"; echo "$CHANGED"
              fi
            fi
          fi
          if [ "$need_bump" = true ]; then
            NVC=$((VC + 1))
            NVN=$(echo "$VN" | awk -F. 'BEGIN{OFS="."} {$NF=$NF+1; print}')
            NTAG="rtflow-v$NVN"
            NASSET="DevinCloud-mobile-v$NVN.apk"
            sed -i -E "s/versionCode[[:space:]]+$VC/versionCode $NVC/" "$GRADLE"
            sed -i -E "s/versionName[[:space:]]+\"$VN\"/versionName \"$NVN\"/" "$GRADLE"
            node -e '
              const fs=require("fs"), f=process.argv[1];
              const j=JSON.parse(fs.readFileSync(f,"utf8"));
              const [nvc,nvn,ntag,nasset]=process.argv.slice(2);
              j.versionCode=parseInt(nvc,10); j.versionName=nvn;
              j.url=`https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${ntag}/${nasset}`;
              const head=`v${nvn} · 自动发版(代码已更新, 版本号自动递增)`;
              j.notes=(j.notes && j.notes.indexOf("v"+nvn)===0)?j.notes:(head+"\n"+(j.notes||""));
              fs.writeFileSync(f,JSON.stringify(j,null,2)+"\n");
            ' "$LATEST" "$NVC" "$NVN" "$NTAG" "$NASSET"
            git config user.name "rtflow-release-bot"
            git config user.email "rtflow-release-bot@users.noreply.github.com"
            git add "$GRADLE" "$LATEST"
            git commit -m "release(rt-flow-app): 自动升版 v$NVN (code $NVC) — 代码已更新但版本号未升, CI 自动递增并发版"
            git push origin HEAD:main
            VN=$NVN; VC=$NVC; TAG=$NTAG; ASSET=$NASSET
            echo "已自动升版并提交回 main: v$NVN (code $NVC)"
          fi
          echo "vn=$VN" >> "$GITHUB_OUTPUT"
          echo "vc=$VC" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          echo "rt-flow APK: versionName=$VN versionCode=$VC"

      # latest.json 永不僵化根治:
      #   病灶: 上面的自动升版分支才会回写 latest.json; 但「人工已正确升号」(改 build.gradle) 时不进该分支 →
      #         APK 照常构建发版, 而 latest.json 从不同步 → 停在旧版 → 手机查更新 hasUpdate=false → 永远收不到新版。
      #   修法: 无论是否自动升版, 这里都把 latest.json 的 versionCode/versionName/url 对齐到本次发版的版本,
      #         有差异即提交回 main。GITHUB_TOKEN 的推送不触发 on:push(防递归), 故不会死循环。
      - name: Sync latest.json to released version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          LATEST=addons/rt-flow-app/latest.json
          VN="${{ steps.ver.outputs.vn }}"
          VC="${{ steps.ver.outputs.vc }}"
          TAG="${{ steps.ver.outputs.tag }}"
          ASSET="${{ steps.ver.outputs.asset }}"
          node -e '
            const fs=require("fs"), f=process.argv[1];
            const [vc,vn,tag,asset]=process.argv.slice(2);
            const j=JSON.parse(fs.readFileSync(f,"utf8"));
            const url=`https://github.com/${process.env.GITHUB_REPOSITORY}/releases/download/${tag}/${asset}`;
            let changed=false;
            if(j.versionCode!==parseInt(vc,10)){ j.versionCode=parseInt(vc,10); changed=true; }
            if(j.versionName!==vn){ j.versionName=vn; changed=true; }
            if(j.url!==url){ j.url=url; changed=true; }
            const head=`v${vn} · 自动发版`;
            if(!(j.notes||"").startsWith("v"+vn)){ j.notes=head+"\n"+(j.notes||""); changed=true; }
            if(changed){ fs.writeFileSync(f,JSON.stringify(j,null,2)+"\n"); console.log("latest.json synced → v"+vn+" (code "+vc+")"); }
            else { console.log("latest.json already at v"+vn+" → no change"); }
          ' "$LATEST" "$VC" "$VN" "$TAG" "$ASSET"
          if ! git diff --quiet -- "$LATEST"; then
            git config user.name "rtflow-release-bot"
            git config user.email "rtflow-release-bot@users.noreply.github.com"
            git add "$LATEST"
            git commit -m "release(rt-flow-app): 同步 latest.json → v$VN (code $VC)"
            git push origin HEAD:main
            echo "latest.json 已同步并提交回 main"
          fi

      - name: Skip if release already has this APK
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"
          ASSET="${{ steps.ver.outputs.asset }}"
          if gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "release $TAG already has $ASSET → skip build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.gate.outputs.exists == 'false'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        if: steps.gate.outputs.exists == 'false'
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        if: steps.gate.outputs.exists == 'false'
        run: |
          set -e
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build signed release APK
        if: steps.gate.outputs.exists == 'false'
        working-directory: addons/rt-flow-app
        run: |
          set -e
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage APK asset
        if: steps.gate.outputs.exists == 'false'
        run: |
          set -e
          SRC=addons/rt-flow-app/app/build/outputs/apk/release/app-release.apk
          cp "$SRC" "${{ steps.ver.outputs.asset }}"
          ls -lh "${{ steps.ver.outputs.asset }}"

      - name: Create/update GitHub release
        if: steps.gate.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.ver.outputs.tag }}"
          ASSET="${{ steps.ver.outputs.asset }}"
          TITLE="Devin Cloud 手机版 v${{ steps.ver.outputs.vn }}"
          node -e "console.log(JSON.parse(require('fs').readFileSync('addons/rt-flow-app/latest.json','utf8')).notes||'')" > notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file notes.md --draft=false
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" --title "$TITLE" --notes-file notes.md --target "$(git rev-parse HEAD)"
          fi
          echo "released $TAG with $ASSET"
