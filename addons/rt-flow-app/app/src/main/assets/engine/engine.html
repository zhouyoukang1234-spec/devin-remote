<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>RT Flow Engine</title></head>
<body>
<script src="relay-app.js"></script>
<script src="devin-core.js"></script>
<script src="devin-cloud.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// engine.html · APP 的 JS 引擎 (常驻前台服务的 WebView 里跑)
//   职责: 账号存储 + 25 RPC dispatch + 内网穿透客户端 + OTA 热修通道
//   原生壳子只提供 Native 桥 (开标签/读写文件/状态回调); 业务逻辑全在此 → 可隔隧道热修
// ═══════════════════════════════════════════════════════════════════════════
(function () {
  var N = window.Native || {};
  function log(s){ try{ N.log && N.log(String(s)); }catch(e){} }
  var DEVIN = "https://app.devin.ai/";

  // ── 账号存储 (localStorage) ──────────────────────────────────────────────
  function loadAcc(){ try{ return JSON.parse(localStorage.getItem("rtflow.accounts")||"[]"); }catch(e){ return []; } }
  function saveAcc(a){ localStorage.setItem("rtflow.accounts", JSON.stringify(a||[])); }
  function getActive(){ return localStorage.getItem("rtflow.active")||""; }
  function setActive(id){ localStorage.setItem("rtflow.active", id||""); }
  function findAcc(id){ var a=loadAcc(); for(var i=0;i<a.length;i++){ if(a[i].id===id||a[i].email===id) return a[i]; } return null; }

  // ── 25 RPC + 管理命令 dispatch (与扩展同名, 行为按 APP 适配) ──────────────
  var CMDS = {
    getState: async function(){
      var accs = loadAcc();
      return { ok:true, accounts: accs, active: getActive(), count: accs.length, engine:"rt-flow-app", ts: Date.now() };
    },
    addAccount: async function(a){
      var acc=a.account||a;
      if(!acc||(!acc.email&&!acc.auth1)) return {ok:false,error:"缺 email 或 auth1"};
      var saved=DaoCore.upsertAcc(acc);
      return {ok:true, id:saved.id, count:loadAcc().length};
    },
    // 邮箱+密码 真登录 → 解锁 auth1/org/额度 (修复核心: 此前缺这条链)
    login: async function(a){
      var email=a.email||(a.id||""), pw=a.password||a.pw||"";
      if(!email){ var acc0=findAcc(a.id); if(acc0){ email=acc0.email; pw=pw||acc0.password; } }
      if(!email||!pw){ var acc1=findAcc(email); if(acc1&&acc1.password) pw=acc1.password; }
      if(!email||!pw) return {ok:false,error:"需 email+password"};
      return await DaoCore.loginAndStore(email, pw);
    },
    loginAll: async function(){
      var accs=loadAcc(), done=0, fail=0, errs=[];
      for(var i=0;i<accs.length;i++){ var a=accs[i]; if(a.auth1&&a.quota) {done++;continue;} if(!a.email||!a.password){fail++;continue;}
        try{ var r=await DaoCore.loginAndStore(a.email,a.password); if(r.ok)done++; else {fail++; errs.push(a.email+": "+r.error);} }catch(e){fail++; errs.push(a.email+": "+e);} }
      return {ok:true, done:done, fail:fail, count:accs.length, errs:errs.slice(0,5)};
    },
    refreshQuota: async function(a){ return await DaoCore.refreshQuotaFor(a.id||a.email); },
    // ── P3 Devin Cloud 对话 (供中继远程驱动 + UI 共用) ──
    listSessions: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listSessions(acc, a.limit||100); },
    sessionDetail: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.sessionDetail(acc, a.sid||a.sessionId); },
    exportSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.exportSession(acc, a.sid||a.sessionId, a.kind||"conversation"); },
    deleteSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.deleteSession(acc, a.sid||a.sessionId); },
    backupAccount: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.backupAccount(acc, a.kind||"conversation"); },
    backupAll: async function(a){ var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var out=[]; for(var i=0;i<accs.length;i++){ try{ var b=await DaoCloud.backupAccount(accs[i], (a&&a.kind)||"conversation"); out.push({email:accs[i].email,count:b.count||0,ok:b.ok}); }catch(e){out.push({email:accs[i].email,ok:false,error:String(e)});} } return {ok:true, accounts:out}; },
    // ── P4 集成 (Git/Secret/Knowledge/Playbook) ──
    checkGit: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.checkGit(acc); },
    connectGit: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; if(!a.pat)return{ok:false,error:"需 pat"}; return await DaoCloud.injectGitHubPAT(acc, a.pat); },
    listSecrets: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listSecrets(acc); },
    listKnowledge: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listKnowledge(acc); },
    listPlaybooks: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listPlaybooks(acc); },
    injectSecret: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.injectSecret(acc, a.name, a.value); },
    injectKnowledge: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.injectKnowledge(acc, a.name, a.body, a.trigger); },
    injectPlaybook: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.injectPlaybook(acc, a.title, a.body); },
    // ── P4+ 全功能 CRUD (创建/中停/归档/删除/盘点/水过无痕) ──
    createSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; if(!a.prompt&&!a.user_message)return{ok:false,error:"需 prompt"}; return await DaoCloud.createSession(acc, a.prompt||a.user_message, {title:a.title,tags:a.tags,playbookId:a.playbookId,repos:a.repos,sessionSecrets:a.sessionSecrets}); },
    stopSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.stopSession(acc, a.sid||a.sessionId); },
    archiveSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.archiveSession(acc, a.sid||a.sessionId); },
    deleteKnowledge: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.deleteKnowledge(acc, a.kid||a.knowledgeId); },
    deletePlaybook: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.deletePlaybook(acc, a.pid||a.playbookId); },
    deleteSecret: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.deleteSecret(acc, a.secret||a.name||a.secretId); },
    listIntegrations: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listIntegrations(acc); },
    wipeAccount: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.wipeAccount(acc, {confirm:a.confirm,backupFirst:a.backupFirst,force:a.force,archiveSessions:a.archiveSessions}); },
    // ── P5 批量管理 / 健康检查 / 归一注入 ──
    batchConnectGit: async function(a){ if(!a||!a.pat)return{ok:false,error:"需 pat"}; var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var out=[]; for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.injectGitHubPAT(accs[i], a.pat); out.push({email:accs[i].email,ok:r.ok,existed:r.existed,error:r.error}); }catch(e){out.push({email:accs[i].email,ok:false,error:String(e)});} } return {ok:true, accounts:out, done:out.filter(function(x){return x.ok;}).length}; },
    batchInjectKnowledge: async function(a){ if(!a||!a.name)return{ok:false,error:"需 name/body"}; var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var out=[]; for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.injectKnowledge(accs[i], a.name, a.body||"", a.trigger||""); out.push({email:accs[i].email,ok:r.ok}); }catch(e){out.push({email:accs[i].email,ok:false});} } return {ok:true, accounts:out, done:out.filter(function(x){return x.ok;}).length}; },
    batchInjectSecret: async function(a){ if(!a||!a.name)return{ok:false,error:"需 name/value"}; var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var out=[]; for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.injectSecret(accs[i], a.name, a.value||""); out.push({email:accs[i].email,ok:r.ok}); }catch(e){out.push({email:accs[i].email,ok:false});} } return {ok:true, accounts:out, done:out.filter(function(x){return x.ok;}).length}; },
    batchInjectPlaybook: async function(a){ if(!a||!a.title)return{ok:false,error:"需 title/body"}; var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var out=[]; for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.injectPlaybook(accs[i], a.title, a.body||""); out.push({email:accs[i].email,ok:r.ok}); }catch(e){out.push({email:accs[i].email,ok:false});} } return {ok:true, accounts:out, done:out.filter(function(x){return x.ok;}).length}; },
    // 健康检查 / 过期扫描: 对所有有 email+pw 的账号重新登录, 标记失效(过期/无效)
    healthScan: async function(){ var accs=loadAcc(), live=0, dead=0, skip=0, report=[]; for(var i=0;i<accs.length;i++){ var a=accs[i]; if(!a.email||!a.password){ skip++; report.push({email:a.email||a.id,state:"skip(无密码)"}); continue; } try{ var r=await DaoCore.loginAndStore(a.email,a.password); if(r.ok){ live++; report.push({email:a.email,state:"live",org:r.orgName}); } else { dead++; report.push({email:a.email,state:"DEAD",error:r.error}); } }catch(e){ dead++; report.push({email:a.email,state:"DEAD",error:String(e)}); } } return {ok:true, live:live, dead:dead, skip:skip, count:accs.length, report:report}; },
    // 对话追踪: 扫所有已登录账号的运行中/受阻会话 (status 含 block/wait/stuck/running)
    trackStuck: async function(){ var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var hits=[]; for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.listSessions(accs[i], 50); if(!r.ok)continue; (r.sessions||[]).forEach(function(s){ var st=String(s.status_enum||s.status||"").toLowerCase(); if(/block|wait|stuck|running|working|active/.test(st)){ hits.push({email:accs[i].email,sid:s.devin_id||s.session_id||s.id,title:(s.title||"").slice(0,50),status:st}); } }); }catch(e){} } return {ok:true, count:hits.length, sessions:hits}; },
    refreshAll: async function(){
      var accs=loadAcc(), ok=0; for(var i=0;i<accs.length;i++){ if(!accs[i].auth1)continue; try{ var r=await DaoCore.refreshQuotaFor(accs[i].id); if(r.ok)ok++; }catch(e){} }
      return {ok:true, refreshed:ok};
    },
    importAccounts: async function(a){
      var list=a.accounts||a.list||[]; if(!Array.isArray(list)) return {ok:false,error:"accounts 非数组"};
      var accs=loadAcc();
      list.forEach(function(acc){ acc.id=acc.id||acc.email||("acc"+Math.random().toString(36).slice(2,8)); var i=accs.findIndex(function(x){return x.id===acc.id;}); if(i>=0)accs[i]=acc; else accs.push(acc); });
      saveAcc(accs); return {ok:true, count:accs.length};
    },
    removeAccount: async function(a){ var accs=loadAcc().filter(function(x){return x.id!==a.id&&x.email!==a.id;}); saveAcc(accs); return {ok:true,count:accs.length}; },
    activate: async function(a){ var acc=findAcc(a.id); if(!acc) return {ok:false,error:"无此账号"}; setActive(acc.id); return {ok:true, active:acc.id}; },
    openAccountTab: async function(a){
      var acc=findAcc(a.id)||findAcc(getActive()); if(!acc) return {ok:false,error:"无账号可开"};
      setActive(acc.id);
      var url=a.url||DEVIN;
      try{ N.openTab(url, JSON.stringify(acc)); }catch(e){ return {ok:false,error:String(e)}; }
      return {ok:true, opened:url, account:acc.id};
    },
    listTabs: async function(){ try{ return {ok:true, tabs: JSON.parse(N.listTabs()||"[]")}; }catch(e){ return {ok:true,tabs:[]}; } },
    closeAccountTab: async function(a){ try{ N.closeTab(a.tabId|0); }catch(e){} return {ok:true}; },

    // ── 管理/热修通道 (用户私有 token 已门禁; 用户明确要求隔隧道热修) ──
    ping: async function(){ return {ok:true, pong:Date.now()}; },
    getEngineInfo: async function(){ return {ok:true, version:"0.6.0", ua:navigator.userAgent, cmds:Object.keys(CMDS), accounts: loadAcc().length, withAuth: loadAcc().filter(function(x){return x.auth1&&x.orgId;}).length }; },
    deviceInfo: async function(){ var N=window.Native||{}; return {ok:true, ua:navigator.userAgent, platform:navigator.platform, lang:navigator.language, screen:{w:screen.width,h:screen.height,dpr:window.devicePixelRatio,orient:(screen.orientation||{}).type}, relay:typeof DaoRelayApp!=="undefined"?DaoRelayApp.status():{}, tabs:N.listTabs?(function(){try{return JSON.parse(N.listTabs()||"[]");}catch(e){return[];}})():[], conn:N.getConn?(function(){try{return JSON.parse(N.getConn()||"{}");}catch(e){return{};}})():{}, ts:Date.now()}; },
    listTabs: async function(){ var N=window.Native||{}; if(!N.listTabs)return{ok:false,error:"listTabs bridge unavailable"}; try{return{ok:true,tabs:JSON.parse(N.listTabs()||"[]")};}catch(e){return{ok:false,error:String(e)};} },
    closeTab: async function(a){ var N=window.Native||{}; if(!N.closeTab)return{ok:false,error:"closeTab bridge unavailable"}; N.closeTab(a.tabId||a.id||0); return{ok:true}; },
    readFile: async function(a){ var N=window.Native||{}; if(!a||!a.name)return{ok:false,error:"需 name"}; if(!N.readFile)return{ok:false,error:"readFile bridge unavailable"}; return{ok:true,name:a.name,content:N.readFile(a.name)}; },
    writeFile: async function(a){ var N=window.Native||{}; if(!a||!a.name)return{ok:false,error:"需 name+content"}; if(!N.writeFile)return{ok:false,error:"writeFile bridge unavailable"}; N.writeFile(a.name,a.content||""); return{ok:true,name:a.name}; },
    hotpatch: async function(a){
      if(!a||typeof a.js!=="string") return {ok:false,error:"缺 js"};
      try{ var r=(0,eval)(a.js); return {ok:true, result: (typeof r==="undefined")?null:r}; }catch(e){ return {ok:false,error:String(e&&e.message||e), stack:e&&e.stack}; }
    },
    persistModule: async function(a){
      if(!a||typeof a.js!=="string") return {ok:false,error:"缺 js"};
      var name=a.name||"user-module.js";
      try{ N.writeFile(name, a.js); }catch(e){ return {ok:false,error:"写盘失败 "+e}; }
      try{ (0,eval)(a.js); }catch(e){ return {ok:true, persisted:name, evalError:String(e&&e.message||e)}; }
      return {ok:true, persisted:name, evaluated:true};
    },
    reloadEngine: async function(){ try{ N.reload(); }catch(e){} return {ok:true}; },
  };

  window.CMDS = CMDS;          // 暴露给 hotpatch 增删命令
  window.DaoEngine = { loadAcc:loadAcc, saveAcc:saveAcc, getActive:getActive, setActive:setActive };

  DaoRelayApp.register(CMDS);
  DaoRelayApp.setStatusCb(function(st){ try{ N.onStatus(JSON.stringify(st)); }catch(e){} });

  // 先加载持久化的用户模块 (历史热修), 再启动穿透
  try { var um = N.readFile && N.readFile("user-module.js"); if (um) { (0,eval)(um); log("user-module loaded"); } } catch(e){ log("user-module err "+e); }

  // 读取烘焙在 assets 的 conn.json (中继地址/token/session) → 自动出站连
  try {
    var conn = JSON.parse(N.getConn ? (N.getConn()||"{}") : "{}");
    if (conn && conn.url && conn.token && conn.session) {
      DaoRelayApp.start({ url: conn.url, token: conn.token, session: conn.session });
      log("relay starting → " + conn.url + " session=" + conn.session);
    } else { log("conn.json 不完整, 未自动连"); }
  } catch (e) { log("conn parse err " + e); }
})();
</script>
</body>
</html>
