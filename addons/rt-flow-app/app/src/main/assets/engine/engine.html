      content: "# 模块一 · 软件本体 ▸ 浏览器自动化子模块 (内置 WebView 底层)\n\n## 概述\n浏览器查看与操作全部在**软件内置 WebView 引擎底层**完成 — 等价 Playwright / Chrome-CDP / 浏览器-MCP 的能力集 (开页·执行JS·DOM·Cookie·Storage·截图·导出·点击填表等待提交), 直接驱动手机端 WebView 标签, 在不干扰用户正常使用的前提下, 帮用户操作/测试/记录任意网页:\n- 列举/打开/关闭标签, 前进/后退/刷新/跳转导航\n- 在指定标签执行任意 JavaScript 并取返回值\n- 提取 DOM (outerHTML) / 读 Cookie / 读 localStorage·sessionStorage\n- 截图 (base64 PNG) / 导出页面为 Markdown\n- 高级: 点击元素 / 填表 / 等待元素出现 / 提交表单 / 提取链接·输入值 / 页面概要 / 滚动\n- 顶级 MCP 对齐: 可访问性快照(ref 定位器·含控件当前值/heading level/required·readonly 状态·同源 iframe 内树) / 按 ref 点击·输入·悬停·选择·拖拽·滚动入视·文件上传 / 键盘按键 / 纯文本 / 控制台日志捕获 / 网络请求捕获 / 通用等待 / Cookie·Storage 读写\n\n## 多实例·不干扰契约 (道并行而不相悖)\n本 APK 原生多标签: `browseOpen{foreground:false}` 后台静默开新实例, 之后所有 browse* 命令一律按 `tabIndex` 直驱目标标签, **绝不调用 browseActivateTab/appToFront** → 用户前台页毫无察觉。Agent 既能接管用户已打开的页, 也能自开后台实例并行干活, 互不抢占 (万物并作而不相害)。\n\n## 授权 (一次性, 最小成本)\n远程操控开关默认关闭。Agent 调 `setRemoteOps({enable:true})` 即可 (或让用户在穿透面板拨一下开关)。\n\n## 命令列表 (37)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| browseSnapshot | tabIndex, maxNodes? | 可访问性快照: 返回带 [ref=eN] 的 aria 结构树(顶级 MCP 范式·免脆弱选择器·优先用它再按 ref 操作) |\n| browseClickRef | tabIndex, ref, dblclick? | 按快照 ref 点击 |\n| browseTypeRef | tabIndex, ref, text, clear?, submit? | 按 ref 真实输入(原生 setter·触发 React/框架 onChange) |\n| browseHoverRef | tabIndex, ref | 按 ref 悬停(触发 hover 菜单) |\n| browseSelectRef | tabIndex, ref, values | 按 ref 选择 <select> 选项(value 或文本) |\n| browsePressKey | tabIndex, key, ref? | 键盘按键(Enter/Tab/ArrowDown…); 省略 ref 作用于焦点元素 |\n| browseGetText | tabIndex, selector? | 取纯文本(innerText, 默认 body) |\n| browseConsoleEnable | tabIndex | 开启控制台日志捕获(hook console.*+onerror) |\n| browseConsole | tabIndex | 读取已捕获的 console 日志 |\n| browseNetworkEnable | tabIndex | 开启网络请求捕获(hook fetch/XHR) |\n| browseNetwork | tabIndex | 读取已捕获的网络请求 + performance 资源 |\n| browseWait | tabIndex, ms? / text? / selector? / timeout? | 通用等待: 固定 ms·或某文本/选择器出现·或页面 readyState=complete |\n| browseDragRef | tabIndex, ref, toRef | 按快照 ref 拖拽到另一 ref(HTML5 drag 序列) |\n| browseScrollToRef | tabIndex, ref, block? | 按 ref 把元素滚动入视(start/center/end) |\n| browseUploadRef | tabIndex, ref, content(base64)/text, name?, mime? | 给 <input type=file> 注入文件(File+DataTransfer·对齐 browser_upload) |\n| browseSetCookie | tabIndex, name, value, path?, domain?, maxAge?, secure? | 写入 Cookie |\n| browseSetStorage | tabIndex, key, value, type=local/session, remove? | 写入/删除 local·sessionStorage |\n| browseListTabs | - | 列出所有前台标签 (index/url/title/account/active) |\n| browseOpen | url, account?, foreground? | 后台静默开新标签(默认不打扰用户当前页); foreground:true 才提到前台。返回 tabIndex |\n| browseActivateTab | tabIndex | 把指定标签提到前台(需前端同步反映时显式调用) |\n| browseClose | tabIndex | 关闭标签 |\n| browseNavigate | tabIndex, action(back/forward/reload/stop/goto), url? | 导航 |\n| browseExecJs | tabIndex, js | 执行 JS 并返回结果 |\n| browseGetDom | tabIndex | 获取完整 DOM HTML |\n| browseGetCookies | url | 获取指定 URL 的 Cookie |\n| browseGetStorage | tabIndex, type(local/session) | 获取 Storage 键值 |\n| browseScreenshot | tabIndex | 截图返回 base64 PNG |\n| browseExportMd | tabIndex, save?, name? | 导出为 Markdown |\n| browseFindInPage | tabIndex, text | 页内查找 |\n| browseClickElement | tabIndex, selector | 点击元素 (CSS 选择器) |\n| browseFillForm | tabIndex, selector, value | 填写输入框 |\n| browseScrollTo | tabIndex, x, y | 滚动页面 |\n| browseGetLinks | tabIndex | 提取所有链接 |\n| browseGetPageInfo | tabIndex | 页面概要 (title/url/meta/表单数) |\n| browseWaitForElement | tabIndex, selector, timeout? | 等待元素出现 |\n| browseSubmitForm | tabIndex, selector? | 提交表单 |\n| browseGetInputValues | tabIndex | 获取所有输入框值 |\n\n## 使用示例\n```json\n{\"cmd\":\"browseOpen\",\"url\":\"https://example.com\"}\n{\"cmd\":\"browseWaitForElement\",\"tabIndex\":0,\"selector\":\"#login\"}\n{\"cmd\":\"browseFillForm\",\"tabIndex\":0,\"selector\":\"#email\",\"value\":\"a@b.com\"}\n{\"cmd\":\"browseClickElement\",\"tabIndex\":0,\"selector\":\"button[type=submit]\"}\n{\"cmd\":\"browseScreenshot\",\"tabIndex\":0}\n\n## CDP 协议域 facade (与 Chrome DevTools Protocol 同名, 落在软件自身 WebView)\n一条 `cdp {method, params, tabIndex}` 路由全部域 — 工具调用逻辑与 Playwright/Chrome-CDP 一致, 执行用本软件浏览器基底:\n| method | params | 说明 |\n|------|------|------|\n| Browser.getVersion | - | 引擎/UA 版本 |\n| Page.navigate / reload / stopLoading / goBack / goForward | url? | 导航 |\n| Page.captureScreenshot | - | {data: base64 PNG} |\n| Page.getLayoutMetrics | - | 视口/内容尺寸/DPR |\n| Page.getNavigationHistory | - | 当前 URL/标题 |\n| Runtime.evaluate | expression | 执行 JS, 返回 {result:{type,value}} |\n| DOM.getDocument | - | 根文档 outerHTML |\n| DOM.getOuterHTML | selector | 指定元素 outerHTML |\n| DOM.querySelector / querySelectorAll | selector | 元素 tag/attrs/text |\n| Input.dispatchMouseEvent | x, y, type | 坐标派发鼠标事件 |\n| Input.insertText | text | 向焦点元素插入文本 |\n| Network.enable / disable | - | 注入 fetch/XHR hook 开始/停止抓包 |\n| Network.getRequests | - | {hooked:[req...], resources:[performance...]} |\n| Network.getResponseBody | requestId | 已捕获响应体 |\n示例: `cdp {method:\"Network.enable\", tabIndex:1}` 然后 `cdp {method:\"Page.reload\", tabIndex:1}` 再 `cdp {method:\"Network.getRequests\", tabIndex:1}`。\n```"

      summary: "文件/相册/剪贴板/通知/应用/设备信息/电池/WiFi/振动/音量 + 联系人/短信(OTP)/通话 + 无障碍系统级接管(手势·读屏·按文字点击·输入·全屏截图) + ADB/AVD 级 shell(Shizuku, 等价 adb shell·input/screencap/pm/am)。共 31 命令。",
      content: "# 模块二 · 手机本体\n\n## 概述\n通过隧道全方位接管手机 (类 ADB/scrcpy/Windows 手机连接), 三层能力:\n1. **本体操控**: 设备信息+手机号 / 文件读写 / 相册 / 剪贴板 / 分享 / 通知 / 应用 / 电池 / WiFi / 振动 / 音量\n2. **敏感数据** (辅助全链路账号注册): 联系人 / 短信收件箱(含 OTP 验证码) / 通话记录\n3. **系统级接管** (AccessibilityService, 无需 root): 坐标手势 / 全局操作 / 读屏控件树 / 按文字点击 / 文本输入 / 全屏截图\n\n## 授权 (最小成本, 一键)\n- 基础+敏感: Agent 调 `setRemoteOps({enable:true})`; 敏感数据首次自动弹运行时权限, 用户点「允许」即可 (`phoneRequestPerms`)。\n- 系统级接管: 调 `phoneEnsureControl` — 自动开启远程开关 + 跳转无障碍设置, 用户点一次「允许」开启服务即可; 之后长期有效。\n\n## 本体 (14)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneInfo | - | 设备信息+手机号+存储 |\n| phoneListFiles | dir? | 列出目录 |\n| phoneReadFile | path, base64? | 读文件 |\n| phoneWriteFile | path, content | 写文件 |\n| phoneListPhotos | limit? | 相册图片 (MediaStore) |\n| phoneClipboard | set? | 剪贴板读写 |\n| phoneShare | text, title? | 系统分享 |\n| phoneNotify | title?, text | 发通知 |\n| phoneInstalledApps | - | 已装应用 |\n| phoneLaunchApp | package | 启动应用 |\n| phoneBattery | - | 电量/温度/充电 |\n| phoneWifiInfo | - | SSID/IP |\n| phoneVibrate | ms? | 振动 |\n| phoneVolume | set? | 音量读写 |\n\n## 敏感数据 (5, 一次性授权后全开放)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneRequestPerms | - | 一次弹窗申请 联系人/短信/通话 权限 |\n| phoneHasPerm | perm | 查询权限是否已授予 |\n| phoneContacts | limit? | 读取联系人 (姓名+号码) |\n| phoneSmsInbox | limit? | 读取短信收件箱 (含 OTP) |\n| phoneCallLog | limit? | 读取通话记录 |\n\n## 系统级接管 (10, 无障碍服务)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneA11yReady | - | 无障碍服务是否已开启 |\n| phoneEnsureControl | - | 一键: 开远程开关 + 跳转无障碍设置引导开启 |\n| phoneOpenA11ySettings | - | 仅跳转系统无障碍设置 |\n| phoneTap | x, y | 坐标点击 |\n| phoneLongPress | x, y, ms? | 坐标长按 |\n| phoneSwipe | x1,y1,x2,y2, ms? | 滑动 |\n| phoneGlobalAction | action | back/home/recents/notifications/quicksettings/lockscreen/powerdialog/screenshot |\n| phoneDumpScreen | - | 导出当前界面控件树 (文本/坐标/可点击) |\n| phoneClickText | text | 按文字查找并点击 |\n| phoneInputText | text | 向焦点输入框填字 |\n| phoneScreenCapture | - | 全屏截图 base64 (API30+) |\n\n## 看屏-操作闭环示例\n```json\n{\"cmd\":\"phoneEnsureControl\"}\n{\"cmd\":\"phoneDumpScreen\"}            // 读当前界面控件 (含坐标)\n{\"cmd\":\"phoneClickText\",\"text\":\"登录\"}\n{\"cmd\":\"phoneInputText\",\"text\":\"hello\"}\n{\"cmd\":\"phoneScreenCapture\"}         // 截图验证结果\n```\n\n## ADB/AVD 级 Shell (Shizuku · uid2000 · 等价 adb shell — 用户端 AVD 全流程底层)\n需 Shizuku 授权(一次)+ setRemoteOps; 与你操作虚拟机 AVD 一致的控制通道: input/screencap/pm/am/settings/dumpsys/wm/monkey 任意命令。\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneShizukuReady | - | Shizuku 是否已授权 (shell 通道就绪) |\n| phoneShell | command | 执行任意 shell 命令, 返回 {ok,exit,out} |\n| (HTTP) POST /api/exec | {command} | 等价直通执行 |\n\n示例: {\"cmd\":\"phoneShell\",\"command\":\"input tap 540 1200\"} · \"screencap -p /sdcard/s.png\" · \"pm list packages -3\" · \"am start -n <pkg>/<act>\"```"

    software: {

      title: "模块一 · 软件本体 ▸ 账号切换 + Devin Cloud 全功能 + 穿透",

      content: "# 模块一 · 软件本体 ▸ 账号切换 + Devin Cloud 全功能\n\n## 概述\n操控本软件自身的全部数据与功能, 等价于桌面版切号面板 + Devin Cloud 全功能。\n\n## 账号切换\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| getState | - | 获取所有账号状态 |\n| addAccount | 账号字段 | 添加账号 |\n| importAccounts | text | 万法识号·批量导入 |\n| login / loginAll | id? | 单/全账号登录 (邮箱+密码→auth1) |\n| refreshQuota / refreshAll | id? | 刷新单/全额度 |\n| activate | id | 激活账号 (切号) |\n| removeAccount | id | 删除账号 |\n| healthScan | - | 健康检查扫描 |\n| trackStuck | - | 追踪卡住会话 |\n\n## Devin Cloud 全功能 CRUD\n| 命令 | 说明 |\n|------|------|\n| listSessions / sessionDetail / exportSession | 会话 列举/详情/导出 |\n| createSession / stopSession / archiveSession / deleteSession | 会话操作 |\n| listKnowledge / injectKnowledge / deleteKnowledge | 知识 |\n| listPlaybooks / injectPlaybook / deletePlaybook | 剧本 |\n| listSecrets / injectSecret / deleteSecret | 密钥 |\n| checkGit / connectGit | Git 连接/注入 PAT |\n| backupAccount / backupAll | 备份 |\n| wipeAccount | 水过无痕 (先备份再清数据) |\n| batchConnectGit / batchInjectKnowledge / batchInjectSecret / batchInjectPlaybook | 全账号批量注入 |\n\n## 内网穿透\n出站 WSS 连中继 (dao-relay 协议)。配置优先级: localStorage(rtflow.relay) > relay-config.json > conn.json 兜底。设备唯一 session + 每冷启动 SecureRandom 轮换 token, 中继按 (session,token) 配对。\n\n## 安全开关\n远程操控默认关闭, `setRemoteOps({enable:true})` 开启; browse*/phone* 全部受此门禁。状态持久化 remote-ops-flag。\n\n## 管理命令\n| 命令 | 说明 |\n|------|------|\n| ping / getEngineInfo / deviceInfo | 探活/引擎/设备 |\n| setRemoteOps / getRemoteOps | 远程开关 读写 |\n| getCloudMd / getLocalMd | 云端(轻)/本地(重) 文档 |\n| getModuleIndex / getModuleDoc | 三大板块 概览/详情 |\n| hotpatch / persistModule / reloadEngine | 热修 |"

  // ── 对话整体提取 工作流文档 (内联进 getCloudMd / getModuleDoc{software} / 单独 getExtractMd) ──
  //   核心: 提取只读已有数据, 不消耗额度 → 额度耗尽账号一样能登录并整体提取历史对话+文件。
  function CONV_EXTRACT_DOC(){
    return [
      "",

      "",

  // ── 道法自然·对话生命周期分类器 (纯函数·可单测·正本清源) ─────────────────────────
  //   逆流 Devin 官方 latest_status_contents(lsc) + 顶层字段, 把一条会话判成两类:
  //     · 活跃态 reason ∈ {quota, action_required, blocked, awaiting, running}  → 仍在追踪
  //     · 终态   term   ∈ {interrupted, expired, suspended, stopped, archived, finished} → 闭环结束反馈
  //   convReasonOf 与 switch.html sessStatus 同源(reason 优先·en 兜底), 返回活跃 reason 或 ""(非活跃)。
  //   convTerminalOf 仅在非活跃时调用, 精确区分 中断/过期/挂起(不活动)/停止/归档/正常完成 → 结束通知文案据此分流。
  function convReasonOf(s, o, qLive){
    var QUOTA_RE=/out_of_quota|usage_limit|insufficient|overage|exceeded|\bquota\b|out of (acu|credit)|credit.*exhaust|no.*credit/i;
    var uar=o&&o.user_action_required;
    var actionReq=(uar!==undefined&&uar!==null&&uar!==""&&uar!==false&&uar!=="null");
    var en=String((o&&o.enum)||s.status_enum||s.status||s.statusClass||"").toLowerCase();
    var rs=String((o&&o.reason)||"").toLowerCase();
    var top=String(s.status||"").toLowerCase();
    var act=String(s.activity_status||"").toLowerCase();
    var cur=String(s.current_activity||"").toLowerCase();
    var qsig=rs+" "+String(s.status||"")+" "+en+" "+String(s.activity_status||"")+" "+String(s.current_activity||"");
    if(QUOTA_RE.test(qsig) && qLive!==true) return "quota";
    if(actionReq) return "action_required";
    if(/error|failed|crash|stuck|interrupt|abort|disconnect|timeout/.test(rs)) return "blocked";
    if(/limit.*reach|cap.*reach|no.*remain|depleted|no.*available|allowance/.test(rs)) return "quota";
    if(/await|wait|ask|question|input|need/.test(en) || /wait.*input|wait.*user|need.*input|user.*action|await|asking/.test(rs)) return "awaiting";
    if(/block|stuck|fail|error|interrupt|abort|disconnect|timeout/.test(en)) return "blocked";
    // ⑤ 终态(完成/过期/挂起/停止/归档/取消…) → 非活跃, 交由 convTerminalOf 精确分流
    if(/finish|complet|expired|suspend|stopped|archiv|cancel|exited|deleted/.test(en+" "+top)) return "";
    // ⑥ 进行中: enum/活动字段命中(含 续跑/思考/流式/规划… → 根治「对话续跑却不亮绿灯」·与 sessStatus 同源)
    if(/run|working|active|execut|in_progress|streaming|coding|planning|testing|thinking|busy|resumed|started/.test(en+" "+act+" "+cur)) return "running";
    // ⑦ 有状态但未归类 → 视为运行(宁可实时亮灯·与 sessStatus 末行同源); 真空状态才不追踪
    return (en||top) ? "running" : "";
  }
  function convTerminalOf(s, o){
    var en=String((o&&o.enum)||s.status_enum||s.status||"").toLowerCase();
    var rs=String((o&&o.reason)||"").toLowerCase();
    var top=String(s.status||"").toLowerCase();
    if(/error|crash|abort|interrupt|disconnect|timeout|fail/.test(rs)) return "interrupted";
    if(top==="expired"||/expired/.test(en)) return "expired";
    if(top==="suspended"||/user_inactiv|inactiv/.test(rs)||/suspend/.test(en)) return "suspended";
    if(s.is_archived===true||s.is_archived==="true") return "archived";
    if(/cancel|stopped|terminat/.test(en)||/cancel|stopped|terminat/.test(rs)) return "stopped";
    return "finished";
  }

  (function startSignal(){

    //   此前一次性放弃会导致「设备重启→引擎先于身份起来→去中心化信令永不启动(直到重开 App)」。
    //   改为定时重读 getConn() 重试至就绪, 且 serve 失败/拒绝也重试 → 启动竞态自愈, 持久稳定。
    //   且 token 轮换(rotateToken)/relay 重启会改变派生密钥 H(session+token), 旧 serve 句柄
    //   将无法解密新分享链接发来的 offer → 浏览器直开「未收到对端应答」。故每次都**实读**当前
    //   设备身份, 一旦 (session,token) 漂移即关旧句柄、按新身份重起应答方 → 分享链接恒可打通。
    var tries = 0, MAX = 60, serving = false;
    var serveHandle = null, servedSession = null, servedToken = null;
    function curId(){
      var s = null, t = null;
      try { var c2 = JSON.parse(N.getConn ? (N.getConn()||"{}") : "{}"); if (c2) { s = c2.session || null; t = c2.token || null; } } catch (e) {}
      if (!s) s = _devSession; if (!t) t = _devToken;
      return { s: s, t: t };
    }
    function tick(){
      if (serving) return;
      try {
        var id = curId();
        if (!id.s || !id.t) {
          if (!serveHandle && ++tries <= MAX) { setTimeout(tick, 2000); }
          else if (!serveHandle) { log("signal: 设备身份持续未就绪(" + tries + "次), 暂停去中心化信令"); }
          return;
        }
        _devSession = id.s; _devToken = id.t;

        if (serveHandle && id.s === servedSession && id.t === servedToken) return;
        // 首次启动, 或身份已轮换 → (重)建应答方, 始终应答「当前分享链接」对应的 topic+key。
        serving = true;

          } else { log("signal serve 失败: " + (r && r.error) + (tries < MAX ? " → 稍后重试" : "")); if (++tries <= MAX) setTimeout(tick, 3000); }

      } catch (e) { serving = false; log("signal boot err " + e); if (++tries <= MAX) setTimeout(tick, 3000); }
    }

    setInterval(tick, 5000);   // 周期巡检设备身份漂移(token 轮换/relay 重启即自动 re-serve, 持久打通)
  })();

  // ── 对话追踪·全局通知 (常驻引擎后台轮询, 软件被切后台/锁屏也能弹系统通知)。──

  (function startConvWatch(){

    // 最近对话名缓存: 凡本轮见到某号一条对话名即记下(带 ts), 供额度类通知优先显示「对话名」而非账号名;
    //   90 天未更新即剪枝。即便本轮该号无活跃对话(只剩额度低/历史), 仍能回忆其最近对话名。
    function _updLatest(titleByAcct, now){
      try{ var c=_ls(LKEY), ch=false;
        Object.keys(titleByAcct).forEach(function(e){ var nm=titleByAcct[e]; if(!nm)return; var p=c[e]; if(!p||p.name!==nm){ c[e]={name:nm,ts:now}; ch=true; } else { p.ts=now; ch=true; } });

    function _acctConvName(email, preferred){

      nm = _latestName(email); if(nm) return nm;
      return String(email||"").split("@")[0];
    }
    // 额度耗尽: 按账号聚合 N 个休眠对话, 跃迁(从无到有/数目增加)或超节流窗即真推送一次; 恢复(本轮无)即清, 下次再耗尽立报。
    function quotaWatch(byAcct, titleByAcct, now){
      var q = _ls(QKEY), nq = {};
      Object.keys(byAcct).forEach(function(email){
        var cnt = byAcct[email]|0; if(cnt<=0) return;

        if (transition || stale) {
          var subj = _acctConvName(email, titleByAcct && titleByAcct[email]);   // 主体优先用该号额度耗尽对话名(用户要求: 有对话即显示对话名, 不再显示账号名)
          notify("quota-" + email, "\uD83D\uDED1 " + subj + " \u989d\u5ea6\u5df2\u8017\u5c3d", cnt + " \u4e2a\u5bf9\u8bdd\u56e0\u914d\u989d\u8017\u5c3d\u4f11\u7720, \u8bf7\u5c3d\u5feb\u5145\u503c/\u5207\u53f7");

    //   据此, recentConvAll 采样窗口漏采的远端活跃号, 一律由本金库补齐 → 根治网页间歇"无活跃对话"/陈旧。

        var unlocked=Object.create(null);

        var agg=Object.create(null);

          var e=String(s.email||"").toLowerCase(); if(!e) return;
          var cls = s.reason==="quota" ? "exhausted"
                  : (s.reason==="action_required"||s.reason==="blocked") ? "blocked"
                  : s.reason==="awaiting" ? "awaiting"
                  : s.reason==="running" ? "running" : "";

        N.vaultSave("rtflow.trk", JSON.stringify(vault));
        // 最近结束闭环 → 独立金库键 rtflow.trk.ended (不污染活跃聚合; 网页/跨设备「最近结束」板可选渲染终态文案)。
        //   续跑复活(道·反者道之动): 本轮重新活跃的会话, 若曾登记「最近结束」→ 立即撤销其终态, 不再残留"已结束"
        //   直到 15min 窗满 → 根治「对话续跑、标签仍显示已结束/不亮绿灯」。无论本轮 ended 是否为空都执行此剪枝。
        var activeSids=Object.create(null); (sessions||[]).forEach(function(s){ if(s&&s.sid) activeSids[s.sid]=1; });
        var ev=null; try{ var raw2=N.vaultLoad?N.vaultLoad("rtflow.trk.ended"):null; if(raw2) ev=JSON.parse(raw2)||{}; }catch(e){}
        if(ev || (ended && ended.length)){
          ev=ev||{};
          (ended||[]).forEach(function(x){ if(x&&x.sid && !activeSids[x.sid]) ev[x.sid]={ title:String(x.title||"").slice(0,48), term:x.term||"finished", email:x.email||"", ts:now }; });
          Object.keys(ev).forEach(function(k){ if(activeSids[k] || now-((ev[k]&&ev[k].ts)||0)>=ENDED_HOLD_MS) delete ev[k]; });   // 复活的会话即刻撤销终态; 过期亦剪
          N.vaultSave("rtflow.trk.ended", JSON.stringify(ev));
        }
      }catch(e){}
    }
    async function tick(){
      if (!watchEnabled()) return;
      var accs = []; try { accs = loadAcc().filter(function(x){ return x.auth1 && x.orgId; }); } catch(e){}
      if (!accs.length) return;
      var prev = loadPrev(), next = {}, now = Date.now();
      var coldStart = !prev || !Object.keys(prev).length;   // 冷启(prev 空): 只播种, 不对全部既有活跃会话刷屏「新对话」
      // watchSids=上轮在追踪的全部 sid → trackStuck 据此精确登记终态(中断/挂起/完成…)·并回报本轮扫描成功的账号。
      var r; try { r = await CMDS.trackStuck({ watchSids: Object.keys(prev) }); } catch(e){ return; }
      if (!r || !r.ok || !Array.isArray(r.sessions)) return;
      var scanned = Object.create(null); (r.scanned||[]).forEach(function(e){ scanned[String(e).toLowerCase()]=1; });   // 本轮扫描成功的账号(门控结束判定)
      // 本轮 active(running/awaiting) 与 attention(action_required/blocked) 集合
      var cur = Object.create(null), quotaByAcct = Object.create(null), quotaTitleByAcct = Object.create(null), titleByAcct = Object.create(null);
      r.sessions.forEach(function(s){
        var sid = s.sid; if (!sid) return;
        var ttl = s.title || "";
        if (s.email && ttl && !titleByAcct[s.email]) titleByAcct[s.email] = ttl;   // 该号一条当前对话名 → 供额度类通知显示对话名而非账号名
        // 额度耗尽单独聚合 (仍登记进 cur·phase=quota -> 既不误判「已结束」, 又不触发卡住通知)。
        if (s.reason === "quota") { cur[sid] = { phase: "quota", title: ttl || sid, email: s.email || "", msgId: s.msgId||"" }; var k = s.email || "?"; quotaByAcct[k] = (quotaByAcct[k]||0) + 1; if (ttl && !quotaTitleByAcct[k]) quotaTitleByAcct[k] = ttl; return; }
        var phase = (s.reason === "action_required" || s.reason === "blocked" || s.reason === "awaiting") ? "stuck" : "active";
        cur[sid] = { phase: phase, title: ttl || sid, email: s.email || "", reason: s.reason, label: s.actionLabel, msgId: s.msgId||"", unread: !!s.unread };
      });
      _updLatest(titleByAcct, now);   // 更新最近对话名缓存(供额度类通知优先显示对话名)
      // 跃迁判定: 新对话/续跑/新内容 → 仅实时反映「追踪状态 + 标签变绿」, 不发消息提示(按用户要求·
      //   开播/续跑/新内容皆静默, 只让账号页标签变绿·网页镜像同步); 仅「需你关注」(卡住/待处理/等待输入)才通知。
      //   绿灯与续跑复活的状态反映由 next[sid] 登记 + _mirrorTickToVault 复活剪枝承担, 与通知解耦。
      Object.keys(cur).forEach(function(sid){
        var c = cur[sid], p = prev[sid];
        next[sid] = { phase: c.phase, title: c.title, email: c.email, ts: now, msgId: c.msgId, reason: c.reason };
        if (c.phase === "stuck" && (!p || p.phase !== "stuck")) {
          var head = c.reason === "action_required" ? "⚠️ 待你处理" : (c.reason === "blocked" ? "⛔ 卡住/失败" : "⏳ 等待输入");
          notify("conv-" + sid, head + ": " + c.title, (c.email ? c.email + " · " : "") + (c.label || "Devin 需要你回应") );
        }
      });
      // 结束闭环①·精确终态: trackStuck 已观测到「曾追踪→已终态」的会话, 按 中断/过期/挂起/停止/归档/完成 分流文案。
      var endedSid = Object.create(null), TERM = {
        interrupted: ["⛔ 已中断", "执行被中断/失败"],
        expired:     ["⌛ 已过期", "会话超时过期"],
        suspended:   ["💤 已挂起", "长时间无活动·已休眠"],
        stopped:     ["🛑 已停止", "对话已被停止"],
        archived:    ["🗄 已归档", "对话已归档"],
        finished:    ["✅ 已完成", "对话正常完成"]
      };
      (r.ended||[]).forEach(function(ev){
        var sid = ev && ev.sid; if (!sid) return; var p = prev[sid]; if (!p) return;
        if (p.phase !== "active" && p.phase !== "stuck" && p.phase !== "quota") return;
        endedSid[sid] = 1;
        var m = TERM[ev.term] || TERM.finished;
        notify("conv-" + sid, m[0] + ": " + (ev.title || p.title || sid), (p.email ? p.email + " · " : "") + m[1]);
      });
      // 结束闭环②·兜底: 上轮在追踪、本轮既不在活跃也未登记终态 → 仅当其账号本轮扫描成功才判「已结束」;
      //   账号本轮扫描失败(不在 scanned) → 不判结束·原样保留追踪态(根治个别号扫描失败误报「已结束」)。
      Object.keys(prev).forEach(function(sid){
        if (cur[sid] || endedSid[sid]) return;
        var p = prev[sid]; if (p.phase !== "active" && p.phase !== "stuck" && p.phase !== "quota") return;
        var em = String(p.email || "").toLowerCase();
        if (scanned[em]) {
          notify("conv-" + sid, "✅ 已结束: " + (p.title || sid), (p.email ? p.email + " · " : "") + "对话已完成/停止");
        } else {
          next[sid] = { phase: p.phase, title: p.title, email: p.email, ts: p.ts || now, msgId: p.msgId, reason: p.reason, carried: true };
        }
      });
      savePrev(next);
      try { _mirrorTickToVault(r.sessions, now, r.ended); } catch(e){}   // 常驻后台权威态写入共享金库(含最近结束闭环) → 网页/跨设备对话追踪恒鲜(≤60s)·一号不漏
      // 额度通知 (真·系统推送, 与对话卡座同款): 已耗尽聚合 + 即将耗尽预警。
      try { quotaWatch(quotaByAcct, quotaTitleByAcct, now); } catch(e){}
      try { quotaLowWatch(accs, titleByAcct, now); } catch(e){}
    }
    setTimeout(function(){ tick(); setInterval(tick, POLL_MS); }, FIRST_DELAY);
    log("convwatch armed (对话追踪·全局通知, 轮询 " + (POLL_MS/1000) + "s)");
  })();
})();
</script>
