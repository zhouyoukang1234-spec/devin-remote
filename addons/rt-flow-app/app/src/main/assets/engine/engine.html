// ═══════════════════════════════════════════════════════════════════════════

(function () {
  var N = window.Native || {};
  function log(s){ try{ N.log && N.log(String(s)); }catch(e){} }
  // 安全解析: JSON.parse("null")/标量不抛错却非对象 → 下游读属性即崩; 一律收敛 (对象/数组各自兜底)。
  function _pjo(raw){ try{ var o=JSON.parse(raw||"{}"); return (o&&typeof o==="object"&&!Array.isArray(o))?o:{}; }catch(e){ return {}; } }
  function _pja(raw){ try{ var o=JSON.parse(raw||"[]"); return Array.isArray(o)?o:[]; }catch(e){ return []; } }
  var DEVIN = "https://app.devin.ai/";
  // 版本号优先读真实 APK versionName (Native.appVer), 取不到才回退常量 → 页脚永不再僵化/落后于发版。
  var APP_VERSION = (function(){ try{ var v = N.appVer && N.appVer(); if(v) return String(v); }catch(e){} try{ var c = localStorage.getItem("rtflow.ver"); if(c) return String(c); }catch(e){} return "0.35.8"; })();
  try{ localStorage.setItem("rtflow.ver", APP_VERSION); }catch(e){}  // 供 switch/panel 页脚自同步, 永不再僵化

  // ── 浏览器自动化 execJs 异步桥 ─────────────────────────────────────────────
  //   引擎页与前台标签共用同一 WebView 渲染线程; 同步 N.browseExecJs 会把渲染线程挂死,
  //   导致前台标签的 evaluateJavascript 回调永不触发 (8s 超时返回 null)。故走非阻塞:
  //   N.browseExecJsAsync(reqId,...) 立即返回, 结果经 window.__browseCb(reqId, value) 回灌
  //   (与原生 HTTP 桥 __httpCb 同一模式)。resolve 的是 evaluateJavascript 已解析的值。
  var __bseq = 0, __bcbs = Object.create(null);
  window.__browseCb = function(id, val){ var cb = __bcbs[id]; if(cb){ delete __bcbs[id]; cb(val); } };
  function execJs(tabIndex, js){
    return new Promise(function(resolve){
      if(N.browseExecJsAsync){
        var id = "b" + (++__bseq) + "_" + Date.now();
        __bcbs[id] = function(v){ resolve(v); };
        try{ N.browseExecJsAsync(id, tabIndex|0, js); }
        catch(e){ delete __bcbs[id]; resolve(null); return; }
        setTimeout(function(){ if(__bcbs[id]){ delete __bcbs[id]; resolve(null); } }, 15000);
        return;
      }
      // 兜底: 老原生无异步桥时退回同步 (并把原始 JSON 解析一层)
      if(N.browseExecJs){ var r = N.browseExecJs(tabIndex|0, js); try{ resolve(JSON.parse(r)); }catch(e){ resolve(r); } }
      else resolve(null);
    });
  }

  // ── CDP-facade 网络捕获注入脚本 (在软件自身 WebView 内 hook fetch/XHR + 读 performance) ──
  var NET_HOOK_JS = "(function(){if(window.__cdpNetInit)return 'already';window.__cdpNetInit=true;window.__cdpNet=[];window.__cdpSeq=0;try{var of=window.fetch;if(of){window.fetch=function(){if(window.__cdpNetOff)return of.apply(this,arguments);var ar=arguments;var url=(ar[0]&&ar[0].url)||ar[0]||'';var mth=(ar[1]&&ar[1].method)||(ar[0]&&ar[0].method)||'GET';var id=++window.__cdpSeq;var rec={requestId:String(id),url:String(url),method:mth,type:'Fetch',startTime:Date.now()};window.__cdpNet.push(rec);return of.apply(this,ar).then(function(rs){rec.status=rs.status;rec.statusText=rs.statusText;rec.endTime=Date.now();try{rs.clone().text().then(function(b){rec.body=(b||'').slice(0,20000);});}catch(e){}return rs;});};}var OX=window.XMLHttpRequest;if(OX){var op=OX.prototype.open,sn=OX.prototype.send;OX.prototype.open=function(m,u){this.__cdp={requestId:String(++window.__cdpSeq),url:String(u),method:m,type:'XHR',startTime:Date.now()};return op.apply(this,arguments);};OX.prototype.send=function(){var x=this;if(x.__cdp&&!window.__cdpNetOff){window.__cdpNet.push(x.__cdp);x.addEventListener('loadend',function(){x.__cdp.status=x.status;x.__cdp.endTime=Date.now();try{x.__cdp.body=(x.responseText||'').slice(0,20000);}catch(e){}});}return sn.apply(this,arguments);};}}catch(e){return 'err:'+e;}return 'hooked';})()";
  // ── Playwright/Chrome-MCP 级·可访问性快照 + ref 定位器 (注入目标页执行·无新原生代码·知其雄守其雌) ──
  //   __daoSnapshot 产出 aria 风格缩进文本(每个可交互元素带 [ref=eN]) 并把元素登记到 window.__daoRefs;
  //   后续按 ref 点击/输入/悬停/选择/按键 → 稳健定位(免脆弱 CSS 选择器), 与 Playwright getByRole / Chrome-MCP snapshot 同范式。
  function __daoSnapshot(maxNodes){
    maxNodes = maxNodes||400;
    var refs = []; window.__daoRefs = refs; var out = []; var count = 0;
    function vis(el){ if(!el||el.nodeType!==1)return false; if(el.getAttribute&&el.getAttribute('aria-hidden')==='true')return false; var r=el.getBoundingClientRect?el.getBoundingClientRect():null; if(!r||(r.width<=0&&r.height<=0))return false; var cs=window.getComputedStyle?getComputedStyle(el):null; if(cs&&(cs.visibility==='hidden'||cs.display==='none'))return false; return true; }
    function lbl(el){ var t=''; try{ if(el.id){ var sel='label[for="'+(window.CSS&&CSS.escape?CSS.escape(el.id):el.id)+'"]'; var lf=document.querySelector(sel); if(lf)t=(lf.innerText||lf.textContent||''); } if(!t&&el.closest){ var lp=el.closest('label'); if(lp)t=(lp.innerText||lp.textContent||''); } }catch(e){} return (t||'').replace(/\s+/g,' ').trim(); }
    function nm(el){ var fld=(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT'); var n=el.getAttribute&&(el.getAttribute('aria-label')||''); if(!n){ var lb=el.getAttribute&&el.getAttribute('aria-labelledby'); if(lb){ var t=document.getElementById(lb); if(t)n=(t.innerText||'').trim(); } } if(!n&&fld)n=lbl(el); if(!n)n=el.getAttribute&&(el.getAttribute('alt')||el.getAttribute('placeholder')||el.getAttribute('title')||''); if(!n&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'))n=el.value||''; if(!n&&!fld){ var s=''; for(var i=0;i<el.childNodes.length;i++){ var c=el.childNodes[i]; if(c.nodeType===3)s+=c.nodeValue; } n=(s||el.innerText||'').trim(); } return (n||'').replace(/\s+/g,' ').slice(0,120); }
    function role(el){ var r=el.getAttribute&&el.getAttribute('role'); if(r)return r; var tag=el.tagName.toLowerCase(); if(tag==='input'){ var ty=(el.getAttribute('type')||'text').toLowerCase(); if(ty==='checkbox')return'checkbox'; if(ty==='radio')return'radio'; if(ty==='submit'||ty==='button')return'button'; if(ty==='range')return'slider'; return'textbox'; } var m={a:'link',button:'button',select:'combobox',textarea:'textbox',h1:'heading',h2:'heading',h3:'heading',h4:'heading',h5:'heading',h6:'heading',img:'img',nav:'navigation',main:'main',form:'form',li:'listitem',summary:'summary'}; return m[tag]||''; }
    function hot(el){ var tag=el.tagName.toLowerCase(); if(/^(a|button|input|select|textarea|summary)$/.test(tag))return true; if(el.getAttribute&&(el.getAttribute('role')||el.hasAttribute('onclick')||el.getAttribute('tabindex')!==null||el.hasAttribute('contenteditable')))return true; if(/^h[1-6]$/.test(tag))return true; return false; }
    function stt(el){ var s=[]; if(el.disabled)s.push('disabled'); if(el.checked)s.push('checked'); if(el.getAttribute){ var ex=el.getAttribute('aria-expanded'); if(ex)s.push('expanded='+ex); if(el.getAttribute('aria-selected')==='true')s.push('selected'); } if(document.activeElement===el)s.push('focused'); return s.length?(' ['+s.join('] [')+']'):''; }
    function walk(el, depth){ if(count>=maxNodes)return; for(var i=0;i<el.children.length;i++){ var c=el.children[i]; var tag=c.tagName.toLowerCase(); if(tag==='script'||tag==='style'||tag==='noscript')continue; if(!vis(c))continue; if(hot(c)){ var ref='e'+refs.length; refs.push(c); out.push(new Array(depth+1).join('  ')+'- '+(role(c)||tag)+((nm(c))?' \"'+nm(c)+'\"':'')+stt(c)+' [ref='+ref+']'); count++; walk(c, depth+1); } else { walk(c, depth); } } }
    try{ walk(document.body||document.documentElement, 0); }catch(e){ return JSON.stringify({ok:false,error:String(e)}); }
    return JSON.stringify({ok:true, count:refs.length, url:location.href, title:document.title, tree:out.join('\n')});
  }
  var SNAPSHOT_FN = __daoSnapshot.toString();
  function __daoAct(refIdx, op, opts){
    opts = opts||{}; var el=(refIdx>=0)?(window.__daoRefs||[])[refIdx]:(document.activeElement||document.body);
    if(refIdx>=0 && !el) return JSON.stringify({ok:false, error:'ref_stale (请重新 browseSnapshot)'});
    function setVal(t,v){ try{ var proto=t.tagName==='TEXTAREA'?window.HTMLTextAreaElement.prototype:window.HTMLInputElement.prototype; var d=Object.getOwnPropertyDescriptor(proto,'value'); if(d&&d.set){ d.set.call(t,v); } else { t.value=v; } }catch(e){ t.value=v; } t.dispatchEvent(new Event('input',{bubbles:true})); t.dispatchEvent(new Event('change',{bubbles:true})); }
    function key(t,k){ ['keydown','keypress','keyup'].forEach(function(e){ try{ t.dispatchEvent(new KeyboardEvent(e,{key:k,code:k,bubbles:true,cancelable:true})); }catch(_){} }); }
    try{
      if(el&&el.scrollIntoView){ try{ el.scrollIntoView({block:'center'}); }catch(e){} }
      if(op==='click'){ try{ el.focus&&el.focus(); }catch(e){} el.click(); return JSON.stringify({ok:true,op:op}); }
      if(op==='dblclick'){ el.dispatchEvent(new MouseEvent('dblclick',{bubbles:true})); return JSON.stringify({ok:true,op:op}); }
      if(op==='hover'){ ['pointerover','mouseover','mouseenter','mousemove'].forEach(function(t){ try{ el.dispatchEvent(new MouseEvent(t,{bubbles:true})); }catch(_){} }); return JSON.stringify({ok:true,op:op}); }
      if(op==='type'){ try{ el.focus&&el.focus(); }catch(e){} if(opts.clear)setVal(el,''); setVal(el,(el.value||'')+(opts.text||'')); if(opts.submit)key(el,'Enter'); return JSON.stringify({ok:true, value:(el.value||'').slice(0,200)}); }
      if(op==='press'){ key(el, opts.key||'Enter'); return JSON.stringify({ok:true, key:opts.key||'Enter'}); }
      if(op==='select'){ var vs=opts.values||[]; if(!(vs instanceof Array))vs=[vs]; var n=0; if(el.options){ for(var i=0;i<el.options.length;i++){ var o=el.options[i]; o.selected=(vs.indexOf(o.value)>=0||vs.indexOf(o.text)>=0); if(o.selected)n++; } el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true})); } return JSON.stringify({ok:n>0, selected:n}); }
      return JSON.stringify({ok:false,error:'unknown_op'});
    }catch(e){ return JSON.stringify({ok:false,error:String(e)}); }
  }
  var ACT_FN = __daoAct.toString();
  function _actRes(s){ var d; try{ d=(typeof s==='string')?JSON.parse(s):s; }catch(e){ d=null; } return (d&&typeof d==='object')?d:{ok:false,raw:s}; }
  function _refIdx(ref){ var m=String(ref==null?'':ref).match(/(\d+)/); return m?parseInt(m[1],10):-1; }
  var CONSOLE_HOOK_JS = "(function(){if(window.__daoConInit)return 'already';window.__daoConInit=true;window.__daoConsole=[];['log','info','warn','error','debug'].forEach(function(lvl){var o=console[lvl];if(!o)return;console[lvl]=function(){try{var a=Array.prototype.slice.call(arguments).map(function(x){try{return typeof x==='object'?JSON.stringify(x):String(x);}catch(e){return String(x);}}).join(' ');window.__daoConsole.push({level:lvl,text:a.slice(0,2000),ts:Date.now()});if(window.__daoConsole.length>500)window.__daoConsole.shift();}catch(e){}return o.apply(this,arguments);};});window.addEventListener('error',function(e){try{window.__daoConsole.push({level:'error',text:'[uncaught] '+(e.message||'')+' @'+(e.filename||'')+':'+(e.lineno||0),ts:Date.now()});}catch(_){}});return 'hooked';})()";
  var NET_DUMP_JS = "(function(){var net=window.__cdpNet||[];var perf=[];try{perf=performance.getEntriesByType('resource').map(function(e){return {url:e.name,type:e.initiatorType,duration:Math.round(e.duration),transferSize:e.transferSize||0,startTime:Math.round(e.startTime),responseEnd:Math.round(e.responseEnd)};});}catch(e){}return JSON.stringify({hooked:net.slice(-200),resources:perf.slice(-200),hookedCount:net.length,resourceCount:perf.length});})()";

  // ── 账号存储 (localStorage) ──────────────────────────────────────────────
  function loadAcc(){ try{ return JSON.parse(localStorage.getItem("rtflow.accounts")||"[]"); }catch(e){ return []; } }
  function saveAcc(a){ localStorage.setItem("rtflow.accounts", JSON.stringify(a||[])); }
  function getActive(){ return localStorage.getItem("rtflow.active")||""; }
  function setActive(id){ localStorage.setItem("rtflow.active", id||""); }
  function findAcc(id){ var a=loadAcc(); for(var i=0;i<a.length;i++){ if(a[i].id===id||a[i].email===id) return a[i]; } return null; }

  // ── 渐进式暴露文档 (Progressive Disclosure) ─────────────────────────────
  //   云端 Agent 首次接入拿综合索引; 按需加载各模块详细指南
  //  设计 (道法自然·完全开放·无限制):
  //   · getCloudMd  = 完整接入文档 — 接入信息 + 两大模块「全部命令/参数/高级用法」全内联 + 对话整体提取工作流; 云端 Agent 读这一篇即可直接调用任意功能, 无需再分步拉取
  //   · getModuleIndex = 两大模块的机读概览 (模块一 软件本体[含 browser+software 子文档] · 模块二 手机本体[phone])
  //   · getModuleDoc(board) = 某一板块「全部细节」(与 getCloudMd 内联内容一致, 供单独按板块拉取)
  //   · getLocalMd  = 重型「本地操控」文档 — 直接操控软件本体 (Native.* 桥)
  var MODULE_DOCS = {
    browser: {
      core: true,
      title: "模块一 · 软件本体 ▸ 浏览器自动化子模块 (内置 WebView)",
      summary: "软件内置 WebView 引擎(等价 Playwright/Chrome-CDP/浏览器-MCP): 查看+操作任意网页全在软件底层完成, 不干扰用户。打开/导航/执行JS/提取DOM·Cookie·Storage/截图/导出MD + 点击·填表·等待元素·提交·滚动·提链接 + CDP 协议域 facade(cdp: Page.*/Runtime.*/DOM.*/Input.*/Network.*)。开页默认后台静默(不打扰用户当前页·道并行而不相悖)。共 20 专用命令 + 1 条 cdp 路由。",
      content: "# 模块一 · 软件本体 ▸ 浏览器自动化子模块 (内置 WebView 底层)\n\n## 概述\n浏览器查看与操作全部在**软件内置 WebView 引擎底层**完成 — 等价 Playwright / Chrome-CDP / 浏览器-MCP 的能力集 (开页·执行JS·DOM·Cookie·Storage·截图·导出·点击填表等待提交), 直接驱动手机端 WebView 标签, 在不干扰用户正常使用的前提下, 帮用户操作/测试/记录任意网页:\n- 列举/打开/关闭标签, 前进/后退/刷新/跳转导航\n- 在指定标签执行任意 JavaScript 并取返回值\n- 提取 DOM (outerHTML) / 读 Cookie / 读 localStorage·sessionStorage\n- 截图 (base64 PNG) / 导出页面为 Markdown\n- 高级: 点击元素 / 填表 / 等待元素出现 / 提交表单 / 提取链接·输入值 / 页面概要 / 滚动\n- 顶级 MCP 对齐: 可访问性快照(ref 定位器) / 按 ref 点击·输入·悬停·选择 / 键盘按键 / 纯文本 / 控制台日志捕获\n\n## 授权 (一次性, 最小成本)\n远程操控开关默认关闭。Agent 调 `setRemoteOps({enable:true})` 即可 (或让用户在穿透面板拨一下开关)。\n\n## 命令列表 (29)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| browseSnapshot | tabIndex, maxNodes? | 可访问性快照: 返回带 [ref=eN] 的 aria 结构树(顶级 MCP 范式·免脆弱选择器·优先用它再按 ref 操作) |\n| browseClickRef | tabIndex, ref, dblclick? | 按快照 ref 点击 |\n| browseTypeRef | tabIndex, ref, text, clear?, submit? | 按 ref 真实输入(原生 setter·触发 React/框架 onChange) |\n| browseHoverRef | tabIndex, ref | 按 ref 悬停(触发 hover 菜单) |\n| browseSelectRef | tabIndex, ref, values | 按 ref 选择 <select> 选项(value 或文本) |\n| browsePressKey | tabIndex, key, ref? | 键盘按键(Enter/Tab/ArrowDown…); 省略 ref 作用于焦点元素 |\n| browseGetText | tabIndex, selector? | 取纯文本(innerText, 默认 body) |\n| browseConsoleEnable | tabIndex | 开启控制台日志捕获(hook console.*+onerror) |\n| browseConsole | tabIndex | 读取已捕获的 console 日志 |\n| browseListTabs | - | 列出所有前台标签 (index/url/title/account/active) |\n| browseOpen | url, account?, foreground? | 后台静默开新标签(默认不打扰用户当前页); foreground:true 才提到前台。返回 tabIndex |\n| browseActivateTab | tabIndex | 把指定标签提到前台(需前端同步反映时显式调用) |\n| browseClose | tabIndex | 关闭标签 |\n| browseNavigate | tabIndex, action(back/forward/reload/stop/goto), url? | 导航 |\n| browseExecJs | tabIndex, js | 执行 JS 并返回结果 |\n| browseGetDom | tabIndex | 获取完整 DOM HTML |\n| browseGetCookies | url | 获取指定 URL 的 Cookie |\n| browseGetStorage | tabIndex, type(local/session) | 获取 Storage 键值 |\n| browseScreenshot | tabIndex | 截图返回 base64 PNG |\n| browseExportMd | tabIndex, save?, name? | 导出为 Markdown |\n| browseFindInPage | tabIndex, text | 页内查找 |\n| browseClickElement | tabIndex, selector | 点击元素 (CSS 选择器) |\n| browseFillForm | tabIndex, selector, value | 填写输入框 |\n| browseScrollTo | tabIndex, x, y | 滚动页面 |\n| browseGetLinks | tabIndex | 提取所有链接 |\n| browseGetPageInfo | tabIndex | 页面概要 (title/url/meta/表单数) |\n| browseWaitForElement | tabIndex, selector, timeout? | 等待元素出现 |\n| browseSubmitForm | tabIndex, selector? | 提交表单 |\n| browseGetInputValues | tabIndex | 获取所有输入框值 |\n\n## 使用示例\n```json\n{\"cmd\":\"browseOpen\",\"url\":\"https://example.com\"}\n{\"cmd\":\"browseWaitForElement\",\"tabIndex\":0,\"selector\":\"#login\"}\n{\"cmd\":\"browseFillForm\",\"tabIndex\":0,\"selector\":\"#email\",\"value\":\"a@b.com\"}\n{\"cmd\":\"browseClickElement\",\"tabIndex\":0,\"selector\":\"button[type=submit]\"}\n{\"cmd\":\"browseScreenshot\",\"tabIndex\":0}\n\n## CDP 协议域 facade (与 Chrome DevTools Protocol 同名, 落在软件自身 WebView)\n一条 `cdp {method, params, tabIndex}` 路由全部域 — 工具调用逻辑与 Playwright/Chrome-CDP 一致, 执行用本软件浏览器基底:\n| method | params | 说明 |\n|------|------|------|\n| Browser.getVersion | - | 引擎/UA 版本 |\n| Page.navigate / reload / stopLoading / goBack / goForward | url? | 导航 |\n| Page.captureScreenshot | - | {data: base64 PNG} |\n| Page.getLayoutMetrics | - | 视口/内容尺寸/DPR |\n| Page.getNavigationHistory | - | 当前 URL/标题 |\n| Runtime.evaluate | expression | 执行 JS, 返回 {result:{type,value}} |\n| DOM.getDocument | - | 根文档 outerHTML |\n| DOM.getOuterHTML | selector | 指定元素 outerHTML |\n| DOM.querySelector / querySelectorAll | selector | 元素 tag/attrs/text |\n| Input.dispatchMouseEvent | x, y, type | 坐标派发鼠标事件 |\n| Input.insertText | text | 向焦点元素插入文本 |\n| Network.enable / disable | - | 注入 fetch/XHR hook 开始/停止抓包 |\n| Network.getRequests | - | {hooked:[req...], resources:[performance...]} |\n| Network.getResponseBody | requestId | 已捕获响应体 |\n示例: `cdp {method:\"Network.enable\", tabIndex:1}` 然后 `cdp {method:\"Page.reload\", tabIndex:1}` 再 `cdp {method:\"Network.getRequests\", tabIndex:1}`。\n```"
    },
    phone: {
      core: true,

      content: "# 模块二 · 手机本体\n\n## 概述\n通过隧道全方位接管手机 (类 ADB/scrcpy/Windows 手机连接), 三层能力:\n1. **本体操控**: 设备信息+手机号 / 文件读写 / 相册 / 剪贴板 / 分享 / 通知 / 应用 / 电池 / WiFi / 振动 / 音量\n2. **敏感数据** (辅助全链路账号注册): 联系人 / 短信收件箱(含 OTP 验证码) / 通话记录\n3. **系统级接管** (AccessibilityService, 无需 root): 坐标手势 / 全局操作 / 读屏控件树 / 按文字点击 / 文本输入 / 全屏截图\n\n## 授权 (最小成本, 一键)\n- 基础+敏感: Agent 调 `setRemoteOps({enable:true})`; 敏感数据首次自动弹运行时权限, 用户点「允许」即可 (`phoneRequestPerms`)。\n- 系统级接管: 调 `phoneEnsureControl` — 自动开启远程开关 + 跳转无障碍设置, 用户点一次「允许」开启服务即可; 之后长期有效。\n\n## 本体 (14)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneInfo | - | 设备信息+手机号+存储 |\n| phoneListFiles | dir? | 列出目录 |\n| phoneReadFile | path, base64? | 读文件 |\n| phoneWriteFile | path, content | 写文件 |\n| phoneListPhotos | limit? | 相册图片 (MediaStore) |\n| phoneClipboard | set? | 剪贴板读写 |\n| phoneShare | text, title? | 系统分享 |\n| phoneNotify | title?, text | 发通知 |\n| phoneInstalledApps | - | 已装应用 |\n| phoneLaunchApp | package | 启动应用 |\n| phoneBattery | - | 电量/温度/充电 |\n| phoneWifiInfo | - | SSID/IP |\n| phoneVibrate | ms? | 振动 |\n| phoneVolume | set? | 音量读写 |\n\n## 敏感数据 (5, 一次性授权后全开放)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneRequestPerms | - | 一次弹窗申请 联系人/短信/通话 权限 |\n| phoneHasPerm | perm | 查询权限是否已授予 |\n| phoneContacts | limit? | 读取联系人 (姓名+号码) |\n| phoneSmsInbox | limit? | 读取短信收件箱 (含 OTP) |\n| phoneCallLog | limit? | 读取通话记录 |\n\n## 系统级接管 (10, 无障碍服务)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneA11yReady | - | 无障碍服务是否已开启 |\n| phoneEnsureControl | - | 一键: 开远程开关 + 跳转无障碍设置引导开启 |\n| phoneOpenA11ySettings | - | 仅跳转系统无障碍设置 |\n| phoneTap | x, y | 坐标点击 |\n| phoneLongPress | x, y, ms? | 坐标长按 |\n| phoneSwipe | x1,y1,x2,y2, ms? | 滑动 |\n| phoneGlobalAction | action | back/home/recents/notifications/quicksettings/lockscreen/powerdialog/screenshot |\n| phoneDumpScreen | - | 导出当前界面控件树 (文本/坐标/可点击) |\n| phoneClickText | text | 按文字查找并点击 |\n| phoneInputText | text | 向焦点输入框填字 |\n| phoneScreenCapture | - | 全屏截图 base64 (API30+) |\n\n## 看屏-操作闭环示例\n```json\n{\"cmd\":\"phoneEnsureControl\"}\n{\"cmd\":\"phoneDumpScreen\"}            // 读当前界面控件 (含坐标)\n{\"cmd\":\"phoneClickText\",\"text\":\"登录\"}\n{\"cmd\":\"phoneInputText\",\"text\":\"hello\"}\n{\"cmd\":\"phoneScreenCapture\"}         // 截图验证结果\n```\n\n## ADB/AVD 级 Shell (Shizuku · uid2000 · 等价 adb shell — 用户端 AVD 全流程底层)\n需 Shizuku 授权(一次)+ setRemoteOps; 与你操作虚拟机 AVD 一致的控制通道: input/screencap/pm/am/settings/dumpsys/wm/monkey 任意命令。\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneShizukuReady | - | Shizuku 是否已授权 (shell 通道就绪) |\n| phoneShell | command | 执行任意 shell 命令, 返回 {ok,exit,out} |\n| (HTTP) POST /api/exec | {command} | 等价直通执行 |\n\n示例: {\"cmd\":\"phoneShell\",\"command\":\"input tap 540 1200\"} · \"screencap -p /sdcard/s.png\" · \"pm list packages -3\" · \"am start -n <pkg>/<act>\"```"

      content: "# 模块一 · 软件本体 ▸ 账号切换 + Devin Cloud 全功能\n\n## 概述\n操控本软件自身的全部数据与功能, 等价于桌面版切号面板 + Devin Cloud 全功能。\n\n## 账号切换\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| getState | - | 获取所有账号状态 |\n| addAccount | 账号字段 | 添加账号 |\n| importAccounts | text | 万法识号·批量导入 |\n| login / loginAll | id? | 单/全账号登录 (邮箱+密码→auth1) |\n| refreshQuota / refreshAll | id? | 刷新单/全额度 |\n| activate | id | 激活账号 (切号) |\n| removeAccount | id | 删除账号 |\n| healthScan | - | 健康检查扫描 |\n| trackStuck | - | 追踪卡住会话 |\n\n## Devin Cloud 全功能 CRUD\n| 命令 | 说明 |\n|------|------|\n| listSessions / sessionDetail / exportSession | 会话 列举/详情/导出 |\n| createSession / stopSession / archiveSession / deleteSession | 会话操作 |\n| listKnowledge / injectKnowledge / deleteKnowledge | 知识 |\n| listPlaybooks / injectPlaybook / deletePlaybook | 剧本 |\n| listSecrets / injectSecret / deleteSecret | 密钥 |\n| checkGit / connectGit | Git 连接/注入 PAT |\n| backupAccount / backupAll | 备份 |\n| wipeAccount | 水过无痕 (先备份再清数据) |\n| batchConnectGit / batchInjectKnowledge / batchInjectSecret / batchInjectPlaybook | 全账号批量注入 |\n\n## 内网穿透\n出站 WSS 连中继 (dao-relay 协议)。配置优先级: localStorage(rtflow.relay) > relay-config.json > conn.json 兜底。设备唯一 session + 每冷启动 SecureRandom 轮换 token, 中继按 (session,token) 配对。\n\n## 安全开关\n远程操控默认关闭, `setRemoteOps({enable:true})` 开启; browse*/phone* 全部受此门禁。状态持久化 remote-ops-flag。\n\n## 管理命令\n| 命令 | 说明 |\n|------|------|\n| ping / getEngineInfo / deviceInfo | 探活/引擎/设备 |\n| setRemoteOps / getRemoteOps | 远程开关 读写 |\n| getCloudMd / getLocalMd | 云端(轻)/本地(重) 文档 |\n| getModuleIndex / getModuleDoc | 三大板块 概览/详情 |\n| hotpatch / persistModule / reloadEngine | 热修 |"

  // ── 25+ RPC + 管理命令 dispatch (与扩展同名, 行为按 APP 适配) ──────────────
  var CMDS = {
    getState: async function(){
      var accs = loadAcc();
      return { ok:true, accounts: accs, active: getActive(), count: accs.length, engine:"devin-cloud-mobile", ts: Date.now() };
    },
    addAccount: async function(a){
      var acc=a.account||a;
      if(!acc||(!acc.email&&!acc.auth1)) return {ok:false,error:"缺 email 或 auth1"};
      var saved=DaoCore.upsertAcc(acc);
      return {ok:true, id:saved.id, count:loadAcc().length};
    },
    // 邮箱+密码 真登录 → 解锁 auth1/org/额度 (修复核心: 此前缺这条链)
    login: async function(a){
      var email=a.email||(a.id||""), pw=a.password||a.pw||"";
      if(!email){ var acc0=findAcc(a.id); if(acc0){ email=acc0.email; pw=pw||acc0.password; } }
      if(!email||!pw){ var acc1=findAcc(email); if(acc1&&acc1.password) pw=acc1.password; }
      if(!email||!pw) return {ok:false,error:"需 email+password"};
      return await DaoCore.loginAndStore(email, pw);
    },
    loginAll: async function(){
      var accs=loadAcc(), done=0, fail=0, errs=[];
      for(var i=0;i<accs.length;i++){ var a=accs[i]; if(a.auth1&&a.quota) {done++;continue;} if(!a.email||!a.password){fail++;continue;}
        try{ var r=await DaoCore.loginAndStore(a.email,a.password); if(r.ok)done++; else {fail++; errs.push(a.email+": "+r.error);} }catch(e){fail++; errs.push(a.email+": "+e);} }
      return {ok:true, done:done, fail:fail, count:accs.length, errs:errs.slice(0,5)};
    },
    refreshQuota: async function(a){ return await DaoCore.refreshQuotaFor(a.id||a.email); },
    // ── P3 Devin Cloud 对话 (供中继远程驱动 + UI 共用) ──
    listSessions: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listSessions(acc, a.limit||100); },
    sessionDetail: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.sessionDetail(acc, a.sid||a.sessionId); },
    exportSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.exportSession(acc, a.sid||a.sessionId, a.kind||"conversation"); },
    // ── 对话整体提取 (额度耗尽账号亦可: 仅读已有数据, 不消耗额度) ──
    //  一次拿齐: 元数据 + 完整对话 md + 工作日志 md + 文件清单 + (可选)落盘到共享保险箱
    extractConversation: async function(a){
      var acc=findAcc(a.id||a.email); if(!acc) return {ok:false,error:"无此账号 (先 addAccount/login)"};
      if(!acc.auth1||!acc.orgId) return {ok:false,error:"该账号需先登录 (login) 解锁 auth1; 登录不消耗额度, 额度耗尽也能登录读取历史"};
      var sid=a.sid||a.sessionId; if(!sid) return {ok:false,error:"需 sid (会话ID; 可先 listSessions 取)"};
      var out={ok:true, account:acc.email, orgId:acc.orgId, sessionId:sid};
      try{ var d=await DaoCloud.sessionDetail(acc, sid); if(d&&d.ok) out.detail=d.session; }catch(e){}
      try{ var conv=await DaoCloud.exportSession(acc, sid, "conversation"); out.title=conv&&conv.title; out.conversationMd=conv&&(conv.md||conv.markdown||conv.text); out.events=conv&&conv.events; }catch(e){ out.convErr=String(e); }
      try{ var wl=await DaoCloud.exportSession(acc, sid, "worklog"); out.worklogMd=wl&&(wl.md||wl.markdown||wl.text); }catch(e){}
      try{ var m=await DaoCloud.sessionMessages(acc, sid); var files=[]; (m.messages||[]).forEach(function(msg){ var atts=msg.attachments||msg.files||[]; (atts||[]).forEach(function(f){ if(f&&(f.url||f.path||f.name)) files.push({name:f.name||f.path||"", url:f.url||"", path:f.path||""}); }); }); out.files=files; out.fileCount=files.length; }catch(e){}
      if(a.save){ try{ var fn=(a.name||("session-"+sid))+".md"; var body="# 会话提取 "+sid+" ("+acc.email+")\n\n"+(out.conversationMd||"")+"\n\n---\n\n"+(out.worklogMd||""); if(N.writeFile) N.writeFile(fn, body); out.saved=fn; }catch(e){} }
      // zip:true → 额外打成「对话md+工作日志md+_meta.json+files/产出文件」单个 ZIP, base64 随响应回传 (云端 Agent 可自行落盘); 本地有产出文件即 MD+ZIP 形态。
      if(a.zip){ try{ var z=await DaoCloud.exportSessionZip(acc, sid); if(z&&z.ok){ out.zipB64=z.b64; out.zipName=(a.name||("session-"+sid))+".zip"; out.zipFileCount=z.fileCount; } else out.zipErr=(z&&z.error)||"zip 失败"; }catch(e){ out.zipErr=String(e); } }
      return out;
    },
    // 整账号全部对话一次性提取 (额度耗尽账号亦可)
    extractAccountConversations: async function(a){
      var acc=findAcc(a.id||a.email); if(!acc) return {ok:false,error:"无此账号"};
      if(!acc.auth1||!acc.orgId) return {ok:false,error:"该账号需先登录 (login)"};
      var ls=await DaoCloud.listSessions(acc, a.limit||200); if(!ls.ok) return ls;
      var sessions=ls.sessions||[], results=[];
      for(var i=0;i<sessions.length;i++){ var sid=sessions[i].devin_id||sessions[i].session_id||sessions[i].id; if(!sid) continue;
        try{ var conv=await DaoCloud.exportSession(acc, sid, "conversation"); results.push({sessionId:sid, title:(conv&&conv.title)||sessions[i].title||sessions[i].name||"", events:conv&&conv.events, ok:!!(conv&&conv.ok), md:(a.includeMd?(conv&&(conv.md||conv.markdown||conv.text)):undefined)}); }
        catch(e){ results.push({sessionId:sid, ok:false, error:String(e)}); }
      }
      return {ok:true, account:acc.email, total:sessions.length, results:results};
    },
    deleteSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.deleteSession(acc, a.sid||a.sessionId); },
    backupAccount: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.backupAccount(acc, a.kind||"conversation"); },
    backupAll: async function(a){ var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var out=[]; for(var i=0;i<accs.length;i++){ try{ var b=await DaoCloud.backupAccount(accs[i], (a&&a.kind)||"conversation"); out.push({email:accs[i].email,count:b.count||0,ok:b.ok}); }catch(e){out.push({email:accs[i].email,ok:false,error:String(e)});} } return {ok:true, accounts:out}; },

    listKnowledge: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listKnowledge(acc); },
    listPlaybooks: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listPlaybooks(acc); },

    injectPlaybook: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.injectPlaybook(acc, a.title, a.body); },
    // ── P4+ 全功能 CRUD (创建/中停/归档/删除/盘点/水过无痕) ──
    createSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; if(!a.prompt&&!a.user_message)return{ok:false,error:"需 prompt"}; return await DaoCloud.createSession(acc, a.prompt||a.user_message, {title:a.title,tags:a.tags,playbookId:a.playbookId,repos:a.repos,sessionSecrets:a.sessionSecrets}); },

    // 对话追踪: 扫所有已登录账号, 即时识别"需你处理(action required)/卡住/待输入/运行"会话。
    //  关键: v2sessions 每条自带 latest_status_contents(JSON) → 内含真实 enum + user_action_required;
    //  仅看顶层 status(常年 suspended/RUNNING) 会漏掉 Devin 官方"需你处理"信号, 导致已卡住对话被判正常。
    trackStuck: async function(){
      function lsc(s){ var x=s&&s.latest_status_contents; if(!x)return null; if(typeof x==="object")return x; try{return JSON.parse(x);}catch(e){return null;} }
      // 额度耗尽官方信号 (逆流 latest_status_contents.reason, 与 switch.html QUOTA_RE 同源·正本清源)
      var QUOTA_RE=/out_of_quota|usage_limit|insufficient|overage|exceeded|\bquota\b|out of (acu|credit)|credit.*exhaust|no.*credit/i;
      var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var hits=[];
      for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.listSessions(accs[i], 50); if(!r.ok)continue;
        (r.sessions||[]).forEach(function(s){
          var o=lsc(s); var uar=o&&o.user_action_required;
          var actionReq=(uar!==undefined&&uar!==null&&uar!==""&&uar!==false&&uar!=="null");
          var en=String((o&&o.enum)||s.status_enum||s.status||"").toLowerCase();
          // 额度耗尽信号最高优先 (即便 finished/suspended 也单列, 绝不混入完成/卡住; 反者道之动核各底层字段)
          var qsig=String((o&&o.reason)||"")+" "+String(s.status||"")+" "+en+" "+String(s.activity_status||"")+" "+String(s.current_activity||"");
          var reason="";
          if(QUOTA_RE.test(qsig)) reason="quota";
          else if(actionReq) reason="action_required";
          else if(/block|stuck|fail|error/.test(en)) reason="blocked";
          else if(/await|wait|ask|question|input|need/.test(en)) reason="awaiting";
          else if(/run|working|active|execut/.test(en) && !/finish|complet|suspend|stopped|expired|archiv|cancel/.test(en)) reason="running";
          if(reason){ hits.push({email:accs[i].email,sid:s.devin_id||s.session_id||s.id,title:(s.title||"").slice(0,50),status:en,reason:reason,actionRequired:actionReq,actionLabel:(actionReq&&typeof uar==="string")?uar:undefined}); }
        });
      }catch(e){} }
      var need=hits.filter(function(h){return h.reason==="action_required"||h.reason==="blocked";});
      return {ok:true, count:hits.length, actionRequired:need.length, needAttention:need, sessions:hits};
    },

    listTabs: async function(){ var N=window.Native||{}; if(!N.listTabs)return{ok:false,error:"listTabs bridge unavailable"}; try{return{ok:true,tabs:JSON.parse(N.listTabs()||"[]")};}catch(e){return{ok:false,error:String(e)};} },

    readFile: async function(a){ var N=window.Native||{}; if(!a||!a.name)return{ok:false,error:"需 name"}; if(!N.readFile)return{ok:false,error:"readFile bridge unavailable"}; return{ok:true,name:a.name,content:N.readFile(a.name)}; },
    writeFile: async function(a){ var N=window.Native||{}; if(!a||!a.name)return{ok:false,error:"需 name+content"}; if(!N.writeFile)return{ok:false,error:"writeFile bridge unavailable"}; N.writeFile(a.name,a.content||""); return{ok:true,name:a.name}; },
    hotpatch: async function(a){
      if(!a||typeof a.js!=="string") return {ok:false,error:"缺 js"};
      try{ var r=(0,eval)(a.js); return {ok:true, result: (typeof r==="undefined")?null:r}; }catch(e){ return {ok:false,error:String(e&&e.message||e), stack:e&&e.stack}; }
    },
    persistModule: async function(a){
      if(!a||typeof a.js!=="string") return {ok:false,error:"缺 js"};
      var name=a.name||"user-module.js";
      try{ N.writeFile(name, a.js); }catch(e){ return {ok:false,error:"写盘失败 "+e}; }
      try{ (0,eval)(a.js); }catch(e){ return {ok:true, persisted:name, evalError:String(e&&e.message||e)}; }
      return {ok:true, persisted:name, evaluated:true};
    },
    reloadEngine: async function(){ try{ N.reload(); }catch(e){} return {ok:true}; },
  };

  // 路线B 加法式 P2P: 合并 WebRTC 应答方命令 (p2pConnect/p2pStatus) 进同一命令集,
  //   信令复用 /api/rpc (curl 同源), 之后数据走 P2P DataChannel。本源 curl/HTTP 不动。
  try { if (window.P2P && window.P2P.commands) Object.assign(CMDS, window.P2P.commands()); } catch(e){ log("p2p register err "+e); }

  window.CMDS = CMDS;          // 暴露给 hotpatch 增删命令
  window.DaoEngine = { loadAcc:loadAcc, saveAcc:saveAcc, getActive:getActive, setActive:setActive };

  DaoRelayApp.register(CMDS);
  DaoRelayApp.setStatusCb(function(st){ try{ N.onStatus(JSON.stringify(st)); }catch(e){} });

  // 路线B 本地隧道: 原生 LocalServer 收到 cloudflared 转发的请求后调用此桥,
  //   走与 WSS 完全相同的 serveLocal(E2E 解密→RPC→重封), 结果经 N.localServeResult 回灌原生。
  window.__localServe = function(reqId, frameJson){
    try {
      DaoRelayApp.serveLocal(frameJson).then(function(r){
        try{ N.localServeResult && N.localServeResult(reqId, r); }catch(e){}
      }, function(err){
        try{ N.localServeResult && N.localServeResult(reqId, JSON.stringify({status:500, body:{error:String(err)}})); }catch(e){}
      });
    } catch(e){
      try{ N.localServeResult && N.localServeResult(reqId, JSON.stringify({status:500, body:{error:String(e)}})); }catch(_){}
    }
  };

  // 先加载持久化的用户模块 (历史热修), 再启动穿透
  try { var um = N.readFile && N.readFile("user-module.js"); if (um) { (0,eval)(um); log("user-module loaded"); } } catch(e){ log("user-module err "+e); }

  // 穿透配置「去中心化」: 唯一真源 = 原生 relay-config.json (N.getConn)。
  //   原生层 ensureRelayIdentity() 冷启动: 设备唯一 session + token + e2eKey 均**防卸载持久化、稳定复用**
  //   (P1: token 不再每冷启动轮换, 端点长期稳定, 驱动方无需每次重拿; 仅首次或手动「刷新Token」才换)。
  //   引擎侧不再自行生成/读取 localStorage, 避免共享 session 串号; 直接采用原生身份。
  var _devSession = null, _devToken = null;
  try {
    var conn = JSON.parse(N.getConn ? (N.getConn()||"{}") : "{}");
    if (conn) { _devSession = conn.session || null; _devToken = conn.token || null; }
    if (conn && conn.url && conn.token && conn.session) {
      DaoRelayApp.start({ url: conn.url, token: conn.token, session: conn.session });
      log("relay starting → " + conn.url + " session=" + conn.session + " [设备身份·token持久复用]");
    } else { log("穿透未配置: 原生身份未就绪"); }
  } catch (e) { log("conn parse err " + e); }

  // ── 路线C 启动: 0账号·去中心化 WebRTC 信令应答方 (公共 ntfy pub/sub, 不经 Worker)。──
  //   用设备身份(session+token)既定址(topic=H(session))又鉴权(密钥=H(session+token))。
  //   公网客户端(console.html / p2p-client.html)优先走此直连, 不通才回落 Worker → 真·兜底。
  //__SIGSERVE_START__  (test/signal-reserve.test.js 切片实测此应答方生命周期: 身份漂移即 re-serve)
  (function startSignal(){
    if (!(window.DaoSignal && DaoSignal.available && DaoSignal.available())) { log("signal: webcrypto 不可用, 去中心化信令禁用 (Worker 兜底仍在)"); return; }
    // 设备身份(session/token)由原生金库在引擎加载后**异步**就绪 → 引擎首跑时 getConn() 可能还空。
    //   此前一次性放弃会导致「设备重启→引擎先于身份起来→去中心化信令永不启动(直到重开 App)」。
    //   改为定时重读 getConn() 重试至就绪, 且 serve 失败/拒绝也重试 → 启动竞态自愈, 持久稳定。
    //   且 token 轮换(rotateToken)/relay 重启会改变派生密钥 H(session+token), 旧 serve 句柄
    //   将无法解密新分享链接发来的 offer → 浏览器直开「未收到对端应答」。故每次都**实读**当前
    //   设备身份, 一旦 (session,token) 漂移即关旧句柄、按新身份重起应答方 → 分享链接恒可打通。
    var tries = 0, MAX = 60, serving = false;
    var serveHandle = null, servedSession = null, servedToken = null;
    function curId(){
      var s = null, t = null;
      try { var c2 = JSON.parse(N.getConn ? (N.getConn()||"{}") : "{}"); if (c2) { s = c2.session || null; t = c2.token || null; } } catch (e) {}
      if (!s) s = _devSession; if (!t) t = _devToken;
      return { s: s, t: t };
    }
    function tick(){
      if (serving) return;
      try {
        var id = curId();
        if (!id.s || !id.t) {
          if (!serveHandle && ++tries <= MAX) { setTimeout(tick, 2000); }
          else if (!serveHandle) { log("signal: 设备身份持续未就绪(" + tries + "次), 暂停去中心化信令"); }
          return;
        }
        _devSession = id.s; _devToken = id.t;
        // 已在应答且身份未变 → 无需动作(周期巡检的常态分支)。
        if (serveHandle && id.s === servedSession && id.t === servedToken) return;
        // 首次启动, 或身份已轮换 → (重)建应答方, 始终应答「当前分享链接」对应的 topic+key。
        serving = true;
        var _extra = null; try { _extra = conn && conn.signalServers; } catch (e) {}
        var _srv = (window.DaoSignal.DEFAULT_SERVERS || []).slice();
        if (Array.isArray(_extra)) _srv = _srv.concat(_extra);
        else if (typeof _extra === "string" && _extra) _srv = _srv.concat(_extra.split(/[\s,]+/));
        DaoSignal.serve({ session: id.s, token: id.t, servers: _srv }).then(function(r){
          serving = false;
          if (r && r.ok) {
            var old = serveHandle; serveHandle = r; servedSession = id.s; servedToken = id.t; tries = 0;
            try { if (old && old.close) old.close(); } catch (e) {}   // 关旧句柄(身份漂移时), 避免旧 topic 残留订阅
            log("signal serving (去中心化P2P) → topic=" + r.topic + " servers=" + (r.servers||[]).join(","));
          } else { log("signal serve 失败: " + (r && r.error) + (tries < MAX ? " → 稍后重试" : "")); if (++tries <= MAX) setTimeout(tick, 3000); }
        }, function(e){ serving = false; log("signal serve err " + e + (tries < MAX ? " → 稍后重试" : "")); if (++tries <= MAX) setTimeout(tick, 3000); });
      } catch (e) { serving = false; log("signal boot err " + e); if (++tries <= MAX) setTimeout(tick, 3000); }
    }
    tick();
    setInterval(tick, 5000);   // 周期巡检设备身份漂移(token 轮换/relay 重启即自动 re-serve, 持久打通)
  })();
  //__SIGSERVE_END__

  // ── 对话追踪·全局通知 (常驻引擎后台轮询, 软件被切后台/锁屏也能弹系统通知)。──
  //   仅在「状态跃迁」时通知, 不刷屏: active→卡住/待处理 弹一次; →结束 弹一次。
  //   复用 CMDS.trackStuck 的判定 (latest_status_contents.user_action_required 等真信号)。
  (function startConvWatch(){
    var PREV_KEY = "rtflow.convwatch";            // sid → {phase, title, email, ts}
    var POLL_MS = 60000, FIRST_DELAY = 15000;
    function loadPrev(){ try { return JSON.parse(localStorage.getItem(PREV_KEY)||"{}")||{}; } catch(e){ return {}; } }
    function savePrev(o){ try { localStorage.setItem(PREV_KEY, JSON.stringify(o)); } catch(e){} }
    function notify(tag, title, text){ try { if (N.notifyGlobal) N.notifyGlobal(String(tag), String(title), String(text)); } catch(e){} }
    function watchEnabled(){ try { var v = localStorage.getItem("rtflow.convwatch.off"); return v !== "1"; } catch(e){ return true; } }
    // ── 额度通知·真·系统推送 (与对话卡座同款 notifyGlobal: 锁屏/切后台亦达; 来源精确·按账号节流·不刷屏) ──
    var QKEY = "rtflow.convwatch.quota";          // email -> {ts, cnt}  额度耗尽节流
    var QLKEY = "rtflow.convwatch.qlow";          // email -> {ts}       额度即将耗尽节流
    var QUOTA_THROTTLE = 30*60*1000;              // 同账号「已耗尽」通知 >=30 分钟一次 (仍耗尽则定时提醒一次, 不扰民)
    var QLOW_THROTTLE = 6*3600*1000;              // 同账号「即将耗尽」预警 >=6 小时一次
    var QLOW_PCT = 10;                            // 日额度剩余 <= 此值且无 extra usage 缓冲 -> 即将耗尽
    function _ls(k){ try{ return JSON.parse(localStorage.getItem(k)||"{}")||{}; }catch(e){ return {}; } }
    function _ss(k,o){ try{ localStorage.setItem(k, JSON.stringify(o)); }catch(e){} }
    // 额度耗尽: 按账号聚合 N 个休眠对话, 跃迁(从无到有/数目增加)或超节流窗即真推送一次; 恢复(本轮无)即清, 下次再耗尽立报。
    function quotaWatch(byAcct, now){
      var q = _ls(QKEY), nq = {};
      Object.keys(byAcct).forEach(function(email){
        var cnt = byAcct[email]|0; if(cnt<=0) return;
        var p = q[email], transition = !p || (p.cnt|0) < cnt, stale = p && (now - (p.ts||0) >= QUOTA_THROTTLE);
        if (transition || stale) {
          var who = String(email).split("@")[0];
          notify("quota-" + email, "\uD83D\uDED1 " + who + " \u989d\u5ea6\u5df2\u8017\u5c3d", cnt + " \u4e2a\u5bf9\u8bdd\u56e0\u914d\u989d\u8017\u5c3d\u4f11\u7720, \u8bf7\u5c3d\u5feb\u5145\u503c/\u5207\u53f7");
          nq[email] = { ts: now, cnt: cnt };
        } else { nq[email] = { ts: (p&&p.ts)||now, cnt: cnt }; }
      });
      _ss(QKEY, nq);   // 未出现在本轮的账号自动清出 -> 视为恢复
    }
    // 额度即将耗尽: 主动预警 (仅当 quota.dPct 为数值且 ∈(0,阈值] 且无 extra usage 美金缓冲 -> 杜绝 stale/未知误报)。
    function quotaLowWatch(accs, now){
      var s = _ls(QLKEY), ns = {};
      accs.forEach(function(a){
        var qd = a.quota; if(!qd || typeof qd.dPct !== "number") return;
        var pct = qd.dPct, ovg = (typeof qd.overageDollars === "number") ? qd.overageDollars : 0;
        if(pct>0 && pct<=QLOW_PCT && ovg<=0){
          var p = s[a.email], last = (p&&p.ts)||0;
          if(now-last >= QLOW_THROTTLE){
            var who = String(a.email||a.id).split("@")[0];
            notify("qlow-" + a.email, "\u26a0\ufe0f " + who + " \u989d\u5ea6\u5373\u5c06\u8017\u5c3d", "\u65e5\u989d\u5ea6\u4ec5\u5269 " + pct + "%, \u5efa\u8bae\u5c3d\u5feb\u5145\u503c/\u5207\u53f7");
            ns[a.email] = { ts: now };
          } else ns[a.email] = { ts: last };
        }
      });
      _ss(QLKEY, ns);
    }
    async function tick(){
      if (!watchEnabled()) return;
      var accs = []; try { accs = loadAcc().filter(function(x){ return x.auth1 && x.orgId; }); } catch(e){}
      if (!accs.length) return;
      var r; try { r = await CMDS.trackStuck(); } catch(e){ return; }
      if (!r || !r.ok || !Array.isArray(r.sessions)) return;
      var prev = loadPrev(), next = {}, now = Date.now();
      // 本轮 active(running/awaiting) 与 attention(action_required/blocked) 集合
      var cur = Object.create(null), quotaByAcct = Object.create(null);
      r.sessions.forEach(function(s){
        var sid = s.sid; if (!sid) return;
        // 额度耗尽单独聚合 (仍登记进 cur·phase=quota -> 既不误判「已结束」, 又不触发卡住通知)。
        if (s.reason === "quota") { cur[sid] = { phase: "quota", title: s.title || sid, email: s.email || "" }; var k = s.email || "?"; quotaByAcct[k] = (quotaByAcct[k]||0) + 1; return; }
        var phase = (s.reason === "action_required" || s.reason === "blocked" || s.reason === "awaiting") ? "stuck" : "active";
        cur[sid] = { phase: phase, title: s.title || sid, email: s.email || "", reason: s.reason, label: s.actionLabel };
      });
      // 跃迁判定
      Object.keys(cur).forEach(function(sid){
        var c = cur[sid], p = prev[sid];
        next[sid] = { phase: c.phase, title: c.title, email: c.email, ts: now };
        if (c.phase === "stuck" && (!p || p.phase !== "stuck")) {
          var head = c.reason === "action_required" ? "⚠️ 待你处理" : (c.reason === "blocked" ? "⛔ 卡住/失败" : "⏳ 等待输入");
          notify("conv-" + sid, head + ": " + c.title, (c.email ? c.email + " · " : "") + (c.label || "Devin 需要你回应") );
        }
      });
      // 结束判定: 上轮在追踪(active/stuck)、本轮已不在 active/stuck 列表 → 视为结束
      Object.keys(prev).forEach(function(sid){
        if (!cur[sid] && (prev[sid].phase === "active" || prev[sid].phase === "stuck")) {
          notify("conv-" + sid, "✅ 已结束: " + (prev[sid].title || sid), (prev[sid].email ? prev[sid].email + " · " : "") + "对话已完成/停止");
        }
      });
      savePrev(next);
      // 额度通知 (真·系统推送, 与对话卡座同款): 已耗尽聚合 + 即将耗尽预警。
      try { quotaWatch(quotaByAcct, now); } catch(e){}
      try { quotaLowWatch(accs, now); } catch(e){}
    }
    setTimeout(function(){ tick(); setInterval(tick, POLL_MS); }, FIRST_DELAY);
    log("convwatch armed (对话追踪·全局通知, 轮询 " + (POLL_MS/1000) + "s)");
  })();
})();
</script>
</body>
</html>
