<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Devin Cloud 手机版 Engine</title></head>
<body>
<script src="relay-app.js"></script>
<script src="devin-core.js"></script>
<script src="devin-cloud.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════
// engine.html · APP 的 JS 引擎 (常驻前台服务的 WebView 里跑)
//   职责: 账号存储 + 25 RPC dispatch + 内网穿透客户端 + OTA 热修通道
//   原生壳子只提供 Native 桥 (开标签/读写文件/状态回调); 业务逻辑全在此 → 可隔隧道热修
// ═══════════════════════════════════════════════════════════════════════════
(function () {
  var N = window.Native || {};
  function log(s){ try{ N.log && N.log(String(s)); }catch(e){} }
  var DEVIN = "https://app.devin.ai/";
  var APP_VERSION = "0.15.14";              // 唯一版本源 (getEngineInfo 与 UI 页脚共用)
  try{ localStorage.setItem("rtflow.ver", APP_VERSION); }catch(e){}  // 供 switch/panel 页脚自同步, 永不再僵化

  // ── 浏览器自动化 execJs 异步桥 ─────────────────────────────────────────────
  //   引擎页与前台标签共用同一 WebView 渲染线程; 同步 N.browseExecJs 会把渲染线程挂死,
  //   导致前台标签的 evaluateJavascript 回调永不触发 (8s 超时返回 null)。故走非阻塞:
  //   N.browseExecJsAsync(reqId,...) 立即返回, 结果经 window.__browseCb(reqId, value) 回灌
  //   (与原生 HTTP 桥 __httpCb 同一模式)。resolve 的是 evaluateJavascript 已解析的值。
  var __bseq = 0, __bcbs = Object.create(null);
  window.__browseCb = function(id, val){ var cb = __bcbs[id]; if(cb){ delete __bcbs[id]; cb(val); } };
  function execJs(tabIndex, js){
    return new Promise(function(resolve){
      if(N.browseExecJsAsync){
        var id = "b" + (++__bseq) + "_" + Date.now();
        __bcbs[id] = function(v){ resolve(v); };
        try{ N.browseExecJsAsync(id, tabIndex|0, js); }
        catch(e){ delete __bcbs[id]; resolve(null); return; }
        setTimeout(function(){ if(__bcbs[id]){ delete __bcbs[id]; resolve(null); } }, 15000);
        return;
      }
      // 兜底: 老原生无异步桥时退回同步 (并把原始 JSON 解析一层)
      if(N.browseExecJs){ var r = N.browseExecJs(tabIndex|0, js); try{ resolve(JSON.parse(r)); }catch(e){ resolve(r); } }
      else resolve(null);
    });
  }

  // ── 账号存储 (localStorage) ──────────────────────────────────────────────
  function loadAcc(){ try{ return JSON.parse(localStorage.getItem("rtflow.accounts")||"[]"); }catch(e){ return []; } }
  function saveAcc(a){ localStorage.setItem("rtflow.accounts", JSON.stringify(a||[])); }
  function getActive(){ return localStorage.getItem("rtflow.active")||""; }
  function setActive(id){ localStorage.setItem("rtflow.active", id||""); }
  function findAcc(id){ var a=loadAcc(); for(var i=0;i<a.length;i++){ if(a[i].id===id||a[i].email===id) return a[i]; } return null; }

  // ── 渐进式暴露文档 (Progressive Disclosure) ─────────────────────────────
  //   云端 Agent 首次接入拿综合索引; 按需加载各模块详细指南
  //  设计 (道法自然·完全开放·无限制):
  //   · getCloudMd  = 完整「云端接入」文档 — 接入信息 + 三大核心板块「全部命令/参数/高级用法」全内联 + 对话整体提取工作流; 云端 Agent 读这一篇即可直接调用任意核心功能, 无需再分步拉取
  //   · getModuleIndex = 三大核心板块的机读概览 (browser/phone/software)
  //   · getModuleDoc(board) = 某一板块「全部细节」(与 getCloudMd 内联内容一致, 供单独按板块拉取)
  //   · getLocalMd  = 重型「本地操控」文档 — 直接操控软件本体 (Native.* 桥)
  var MODULE_DOCS = {
    browser: {
      core: true,
      title: "板块一 · 浏览器自动化",
      summary: "远程操控前台 WebView 标签, 不干扰用户正常使用。打开/导航/执行JS/提取DOM·Cookie·Storage/截图/导出MD + 点击·填表·等待元素·提交·滚动·提链接。共 19 命令。",
      content: "# 板块一 · 浏览器自动化\n\n## 概述\n通过内网穿透隧道远程驱动手机端浏览器 (类 Playwright MCP), 在不干扰用户正常使用的前提下, 帮用户操作/测试/记录任意网页:\n- 列举/打开/关闭标签, 前进/后退/刷新/跳转导航\n- 在指定标签执行任意 JavaScript 并取返回值\n- 提取 DOM (outerHTML) / 读 Cookie / 读 localStorage·sessionStorage\n- 截图 (base64 PNG) / 导出页面为 Markdown\n- 高级: 点击元素 / 填表 / 等待元素出现 / 提交表单 / 提取链接·输入值 / 页面概要 / 滚动\n\n## 授权 (一次性, 最小成本)\n远程操控开关默认关闭。Agent 调 `setRemoteOps({enable:true})` 即可 (或让用户在穿透面板拨一下开关)。\n\n## 命令列表 (19)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| browseListTabs | - | 列出所有前台标签 (index/url/title/account/active) |\n| browseOpen | url, account? | 打开新标签 |\n| browseClose | tabIndex | 关闭标签 |\n| browseNavigate | tabIndex, action(back/forward/reload/stop/goto), url? | 导航 |\n| browseExecJs | tabIndex, js | 执行 JS 并返回结果 |\n| browseGetDom | tabIndex | 获取完整 DOM HTML |\n| browseGetCookies | url | 获取指定 URL 的 Cookie |\n| browseGetStorage | tabIndex, type(local/session) | 获取 Storage 键值 |\n| browseScreenshot | tabIndex | 截图返回 base64 PNG |\n| browseExportMd | tabIndex, save?, name? | 导出为 Markdown |\n| browseFindInPage | tabIndex, text | 页内查找 |\n| browseClickElement | tabIndex, selector | 点击元素 (CSS 选择器) |\n| browseFillForm | tabIndex, selector, value | 填写输入框 |\n| browseScrollTo | tabIndex, x, y | 滚动页面 |\n| browseGetLinks | tabIndex | 提取所有链接 |\n| browseGetPageInfo | tabIndex | 页面概要 (title/url/meta/表单数) |\n| browseWaitForElement | tabIndex, selector, timeout? | 等待元素出现 |\n| browseSubmitForm | tabIndex, selector? | 提交表单 |\n| browseGetInputValues | tabIndex | 获取所有输入框值 |\n\n## 使用示例\n```json\n{\"cmd\":\"browseOpen\",\"url\":\"https://example.com\"}\n{\"cmd\":\"browseWaitForElement\",\"tabIndex\":0,\"selector\":\"#login\"}\n{\"cmd\":\"browseFillForm\",\"tabIndex\":0,\"selector\":\"#email\",\"value\":\"a@b.com\"}\n{\"cmd\":\"browseClickElement\",\"tabIndex\":0,\"selector\":\"button[type=submit]\"}\n{\"cmd\":\"browseScreenshot\",\"tabIndex\":0}\n```"
    },
    phone: {
      core: true,
      title: "板块二 · 手机操控 (本体 + 敏感数据 + 系统级接管)",
      summary: "文件/相册/剪贴板/通知/应用/设备信息/电池/WiFi/振动/音量 + 联系人/短信(OTP)/通话 + 无障碍系统级接管(手势·读屏·按文字点击·输入·全屏截图)。共 29 命令。",
      content: "# 板块二 · 手机操控\n\n## 概述\n通过隧道全方位接管手机 (类 ADB/scrcpy/Windows 手机连接), 三层能力:\n1. **本体操控**: 设备信息+手机号 / 文件读写 / 相册 / 剪贴板 / 分享 / 通知 / 应用 / 电池 / WiFi / 振动 / 音量\n2. **敏感数据** (辅助全链路账号注册): 联系人 / 短信收件箱(含 OTP 验证码) / 通话记录\n3. **系统级接管** (AccessibilityService, 无需 root): 坐标手势 / 全局操作 / 读屏控件树 / 按文字点击 / 文本输入 / 全屏截图\n\n## 授权 (最小成本, 一键)\n- 基础+敏感: Agent 调 `setRemoteOps({enable:true})`; 敏感数据首次自动弹运行时权限, 用户点「允许」即可 (`phoneRequestPerms`)。\n- 系统级接管: 调 `phoneEnsureControl` — 自动开启远程开关 + 跳转无障碍设置, 用户点一次「允许」开启服务即可; 之后长期有效。\n\n## 本体 (14)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneInfo | - | 设备信息+手机号+存储 |\n| phoneListFiles | dir? | 列出目录 |\n| phoneReadFile | path, base64? | 读文件 |\n| phoneWriteFile | path, content | 写文件 |\n| phoneListPhotos | limit? | 相册图片 (MediaStore) |\n| phoneClipboard | set? | 剪贴板读写 |\n| phoneShare | text, title? | 系统分享 |\n| phoneNotify | title?, text | 发通知 |\n| phoneInstalledApps | - | 已装应用 |\n| phoneLaunchApp | package | 启动应用 |\n| phoneBattery | - | 电量/温度/充电 |\n| phoneWifiInfo | - | SSID/IP |\n| phoneVibrate | ms? | 振动 |\n| phoneVolume | set? | 音量读写 |\n\n## 敏感数据 (5, 一次性授权后全开放)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneRequestPerms | - | 一次弹窗申请 联系人/短信/通话 权限 |\n| phoneHasPerm | perm | 查询权限是否已授予 |\n| phoneContacts | limit? | 读取联系人 (姓名+号码) |\n| phoneSmsInbox | limit? | 读取短信收件箱 (含 OTP) |\n| phoneCallLog | limit? | 读取通话记录 |\n\n## 系统级接管 (10, 无障碍服务)\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| phoneA11yReady | - | 无障碍服务是否已开启 |\n| phoneEnsureControl | - | 一键: 开远程开关 + 跳转无障碍设置引导开启 |\n| phoneOpenA11ySettings | - | 仅跳转系统无障碍设置 |\n| phoneTap | x, y | 坐标点击 |\n| phoneLongPress | x, y, ms? | 坐标长按 |\n| phoneSwipe | x1,y1,x2,y2, ms? | 滑动 |\n| phoneGlobalAction | action | back/home/recents/notifications/quicksettings/lockscreen/powerdialog/screenshot |\n| phoneDumpScreen | - | 导出当前界面控件树 (文本/坐标/可点击) |\n| phoneClickText | text | 按文字查找并点击 |\n| phoneInputText | text | 向焦点输入框填字 |\n| phoneScreenCapture | - | 全屏截图 base64 (API30+) |\n\n## 看屏-操作闭环示例\n```json\n{\"cmd\":\"phoneEnsureControl\"}\n{\"cmd\":\"phoneDumpScreen\"}            // 读当前界面控件 (含坐标)\n{\"cmd\":\"phoneClickText\",\"text\":\"登录\"}\n{\"cmd\":\"phoneInputText\",\"text\":\"hello\"}\n{\"cmd\":\"phoneScreenCapture\"}         // 截图验证结果\n```"
    },
    software: {
      core: true,
      title: "板块三 · Devin Cloud 软件本体",
      summary: "账号切换(多号CRUD/登录/刷额度/健康检查/对话追踪) + Devin Cloud 全功能CRUD(Sessions/Knowledge/Playbooks/Secrets/Git/备份/水过无痕) + 内网穿透 + 安全开关。",
      content: "# 板块三 · Devin Cloud 软件本体\n\n## 概述\n操控本软件自身的全部数据与功能, 等价于桌面版切号面板 + Devin Cloud 全功能。\n\n## 账号切换\n| 命令 | 参数 | 说明 |\n|------|------|------|\n| getState | - | 获取所有账号状态 |\n| addAccount | 账号字段 | 添加账号 |\n| importAccounts | text | 万法识号·批量导入 |\n| login / loginAll | id? | 单/全账号登录 (邮箱+密码→auth1) |\n| refreshQuota / refreshAll | id? | 刷新单/全额度 |\n| activate | id | 激活账号 (切号) |\n| removeAccount | id | 删除账号 |\n| healthScan | - | 健康检查扫描 |\n| trackStuck | - | 追踪卡住会话 |\n\n## Devin Cloud 全功能 CRUD\n| 命令 | 说明 |\n|------|------|\n| listSessions / sessionDetail / exportSession | 会话 列举/详情/导出 |\n| createSession / stopSession / archiveSession / deleteSession | 会话操作 |\n| listKnowledge / injectKnowledge / deleteKnowledge | 知识 |\n| listPlaybooks / injectPlaybook / deletePlaybook | 剧本 |\n| listSecrets / injectSecret / deleteSecret | 密钥 |\n| checkGit / connectGit | Git 连接/注入 PAT |\n| backupAccount / backupAll | 备份 |\n| wipeAccount | 水过无痕 (先备份再清数据) |\n| batchConnectGit / batchInjectKnowledge / batchInjectSecret / batchInjectPlaybook | 全账号批量注入 |\n\n## 内网穿透\n出站 WSS 连中继 (dao-relay 协议)。配置优先级: localStorage(rtflow.relay) > relay-config.json > conn.json 兜底。设备唯一 session + 每冷启动 SecureRandom 轮换 token, 中继按 (session,token) 配对。\n\n## 安全开关\n远程操控默认关闭, `setRemoteOps({enable:true})` 开启; browse*/phone* 全部受此门禁。状态持久化 remote-ops-flag。\n\n## 管理命令\n| 命令 | 说明 |\n|------|------|\n| ping / getEngineInfo / deviceInfo | 探活/引擎/设备 |\n| setRemoteOps / getRemoteOps | 远程开关 读写 |\n| getCloudMd / getLocalMd | 云端(轻)/本地(重) 文档 |\n| getModuleIndex / getModuleDoc | 三大板块 概览/详情 |\n| hotpatch / persistModule / reloadEngine | 热修 |"
    }
  };

  // ── 对话整体提取 工作流文档 (内联进 getCloudMd / getModuleDoc{software} / 单独 getExtractMd) ──
  //   核心: 提取只读已有数据, 不消耗额度 → 额度耗尽账号一样能登录并整体提取历史对话+文件。
  function CONV_EXTRACT_DOC(){
    return [
      "",
      "## 七、对话整体提取工作流 (额度耗尽账号亦可·最高效)",
      "",
      "> 关键认知: **提取只读取账号已有的历史数据, 完全不消耗额度。** 额度耗尽 (credits=0) 的账号照样能用「邮箱+密码」登录拿到 auth1, 再整体导出全部对话与文件。",
      "",
      "### A. 必要信息 (提取三要素)",
      "| 要素 | 取法 |",
      "|------|------|",
      "| 账号 (email + password) | 已在号池则直接用; 否则 `addAccount {email,password}` |",
      "| auth1 / orgId | `login {email}` 自动解锁 (不消耗额度) |",
      "| 会话ID (sessionId / devin_id) | `listSessions {id}` 列出, 取每条的 `devin_id` |",
      "",
      "### B. 最高效·一行整体提取 (推荐)",
      "```",
      "# 单条会话: 一次拿齐 元数据+完整对话md+工作日志md+文件清单, 并落盘共享保险箱",
      "{cmd:\"extractConversation\", id:\"<email>\", sid:\"<devin_id>\", save:true}",
      "# 整账号全部会话:",
      "{cmd:\"extractAccountConversations\", id:\"<email>\", limit:200, includeMd:true}",
      "```",
      "返回字段: `conversationMd` (完整对话), `worklogMd` (工作日志/文件编辑/命令全程), `detail` (会话元数据), `files`/`fileCount` (附件清单), `saved` (落盘文件名)。",
      "",
      "### C. 分步法 (需要精细控制时)",
      "1. `login {email}` → 解锁 auth1 (额度耗尽也可)。",
      "2. `listSessions {id, limit:200}` → 拿全部会话与 `devin_id`。",
      "3. 逐条 `exportSession {id, sid, kind:\"conversation\"}` 与 `kind:\"worklog\"`。",
      "4. `sessionMessages` / `sessionDetail` 兜底取消息与附件。",
      "5. 需落地手机: 加 `save:true` 写入共享保险箱 (卸载/重装不丢), 或 `phoneWriteFile` 指定路径。",
      "",
      "### D. 浏览器自动化提取 (无 auth1 / 只想要页面所见即所得)",
      "若不便登录, 可用板块一直接读已登录的网页:",
      "1. `browseOpen {url:\"https://app.devin.ai/sessions/<id>\", account:\"<email>\"}` (用该号上下文新开页, 不打扰用户当前页)。",
      "2. `browseWaitForElement` 等内容加载 → `browseExportMd {tabIndex, save:true}` 导出整页 Markdown。",
      "3. 或 `browseGetDom` 取完整 DOM 自行解析。",
      "",
      "### E. 拖拽提取 (页面内·最快: 一条会话整包拖入新窗口)",
      "理想交互: 在切号面板的「对话追踪」里**长按一条会话 → 拖到任意网页标签松手**, 该会话的 session md 会被整包注入目标页 (上传框/拖放区), 实现「拖一下即把整段对话+文件带进新窗口」。",
      "- 底层复用 v0.15.9 的下载拖拽通道 (ClipData 全局拖拽 + WebView OnDragListener → 注入 input[type=file]/drop)。",
      "- 程序化等价: `extractConversation {save:true}` 落盘后, 在下载面板长按该 .md 拖入页面。",
      "",
      "### F. 提取产物去向",
      "- `save:true` → 共享保险箱 `Documents/DevinCloud/` (经 Native.writeFile), 卸载/重装不丢。",
      "- 远程取回: `phoneReadFile {path}` 读回内容, 或 `phoneShare` 系统分享。",
      ""
    ];
  }

  // ── 25+ RPC + 管理命令 dispatch (与扩展同名, 行为按 APP 适配) ──────────────
  var CMDS = {
    getState: async function(){
      var accs = loadAcc();
      return { ok:true, accounts: accs, active: getActive(), count: accs.length, engine:"devin-cloud-mobile", ts: Date.now() };
    },
    addAccount: async function(a){
      var acc=a.account||a;
      if(!acc||(!acc.email&&!acc.auth1)) return {ok:false,error:"缺 email 或 auth1"};
      var saved=DaoCore.upsertAcc(acc);
      return {ok:true, id:saved.id, count:loadAcc().length};
    },
    // 邮箱+密码 真登录 → 解锁 auth1/org/额度 (修复核心: 此前缺这条链)
    login: async function(a){
      var email=a.email||(a.id||""), pw=a.password||a.pw||"";
      if(!email){ var acc0=findAcc(a.id); if(acc0){ email=acc0.email; pw=pw||acc0.password; } }
      if(!email||!pw){ var acc1=findAcc(email); if(acc1&&acc1.password) pw=acc1.password; }
      if(!email||!pw) return {ok:false,error:"需 email+password"};
      return await DaoCore.loginAndStore(email, pw);
    },
    loginAll: async function(){
      var accs=loadAcc(), done=0, fail=0, errs=[];
      for(var i=0;i<accs.length;i++){ var a=accs[i]; if(a.auth1&&a.quota) {done++;continue;} if(!a.email||!a.password){fail++;continue;}
        try{ var r=await DaoCore.loginAndStore(a.email,a.password); if(r.ok)done++; else {fail++; errs.push(a.email+": "+r.error);} }catch(e){fail++; errs.push(a.email+": "+e);} }
      return {ok:true, done:done, fail:fail, count:accs.length, errs:errs.slice(0,5)};
    },
    refreshQuota: async function(a){ return await DaoCore.refreshQuotaFor(a.id||a.email); },
    // ── P3 Devin Cloud 对话 (供中继远程驱动 + UI 共用) ──
    listSessions: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.listSessions(acc, a.limit||100); },
    sessionDetail: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.sessionDetail(acc, a.sid||a.sessionId); },
    exportSession: async function(a){ var acc=findAcc(a.id||a.email); if(!acc)return{ok:false,error:"无此账号"}; return await DaoCloud.exportSession(acc, a.sid||a.sessionId, a.kind||"conversation"); },
    // ── 对话整体提取 (额度耗尽账号亦可: 仅读已有数据, 不消耗额度) ──
    //  一次拿齐: 元数据 + 完整对话 md + 工作日志 md + 文件清单 + (可选)落盘到共享保险箱
    extractConversation: async function(a){
      var acc=findAcc(a.id||a.email); if(!acc) return {ok:false,error:"无此账号 (先 addAccount/login)"};
      if(!acc.auth1||!acc.orgId) return {ok:false,error:"该账号需先登录 (login) 解锁 auth1; 登录不消耗额度, 额度耗尽也能登录读取历史"};
      var sid=a.sid||a.sessionId; if(!sid) return {ok:false,error:"需 sid (会话ID; 可先 listSessions 取)"};
      var out={ok:true, account:acc.email, orgId:acc.orgId, sessionId:sid};
      try{ var d=await DaoCloud.sessionDetail(acc, sid); if(d&&d.ok) out.detail=d.session; }catch(e){}

    // 对话追踪: 扫所有已登录账号, 即时识别"需你处理(action required)/卡住/待输入/运行"会话。
    //  关键: v2sessions 每条自带 latest_status_contents(JSON) → 内含真实 enum + user_action_required;
    //  仅看顶层 status(常年 suspended/RUNNING) 会漏掉 Devin 官方"需你处理"信号, 导致已卡住对话被判正常。
    trackStuck: async function(){
      function lsc(s){ var x=s&&s.latest_status_contents; if(!x)return null; if(typeof x==="object")return x; try{return JSON.parse(x);}catch(e){return null;} }
      var accs=loadAcc().filter(function(x){return x.auth1&&x.orgId;}); var hits=[];
      for(var i=0;i<accs.length;i++){ try{ var r=await DaoCloud.listSessions(accs[i], 50); if(!r.ok)continue;
        (r.sessions||[]).forEach(function(s){
          var o=lsc(s); var uar=o&&o.user_action_required;
          var actionReq=(uar!==undefined&&uar!==null&&uar!==""&&uar!==false&&uar!=="null");
          var en=String((o&&o.enum)||s.status_enum||s.status||"").toLowerCase();
          var reason="";
          if(actionReq) reason="action_required";
          else if(/block|stuck|fail|error/.test(en)) reason="blocked";
          else if(/await|wait|ask|question|input|need/.test(en)) reason="awaiting";
          else if(/run|working|active|execut/.test(en) && !/finish|complet|suspend|stopped|expired|archiv|cancel/.test(en)) reason="running";
          if(reason){ hits.push({email:accs[i].email,sid:s.devin_id||s.session_id||s.id,title:(s.title||"").slice(0,50),status:en,reason:reason,actionRequired:actionReq,actionLabel:(actionReq&&typeof uar==="string")?uar:undefined}); }
        });
      }catch(e){} }
      var need=hits.filter(function(h){return h.reason==="action_required"||h.reason==="blocked";});
      return {ok:true, count:hits.length, actionRequired:need.length, needAttention:need, sessions:hits};
    },

  DaoRelayApp.register(CMDS);
  DaoRelayApp.setStatusCb(function(st){ try{ N.onStatus(JSON.stringify(st)); }catch(e){} });

  // 先加载持久化的用户模块 (历史热修), 再启动穿透
  try { var um = N.readFile && N.readFile("user-module.js"); if (um) { (0,eval)(um); log("user-module loaded"); } } catch(e){ log("user-module err "+e); }

  // 穿透配置「去中心化」: 唯一真源 = 原生 relay-config.json (N.getConn)。
  //   原生层 ensureRelayIdentity() 在每次冷启动: 设备唯一 session(防卸载持久化) + SecureRandom 轮换 token。
  //   引擎侧不再自行生成/读取 localStorage, 避免共享 session 串号; 直接采用原生身份。
  try {
    var conn = JSON.parse(N.getConn ? (N.getConn()||"{}") : "{}");
    if (conn && conn.url && conn.token && conn.session) {
      DaoRelayApp.start({ url: conn.url, token: conn.token, session: conn.session });
      log("relay starting → " + conn.url + " session=" + conn.session + " [设备身份·token已轮换]");
    } else { log("穿透未配置: 原生身份未就绪"); }
  } catch (e) { log("conn parse err " + e); }
})();
</script>
