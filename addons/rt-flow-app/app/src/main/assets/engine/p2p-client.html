<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Devin Cloud · P2P 直连客户端 (路线C · 0账号去中心化 WebRTC)</title>
<script src="signal.js"></script>
<style>
  :root{color-scheme:dark}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:#0d1117;color:#c9d1d9;margin:0;padding:16px;max-width:820px}
  h2{font-size:17px;margin:0 0 4px}
  .muted{color:#8b949e;font-size:12px;line-height:1.6}
  label{display:block;font-size:12px;color:#8b949e;margin:10px 0 3px}
  input,textarea,select{width:100%;box-sizing:border-box;background:#161b22;border:1px solid #30363d;color:#c9d1d9;border-radius:6px;padding:8px;font-size:13px;font-family:inherit}
  textarea{resize:vertical}
  button{background:#238636;border:0;color:#fff;border-radius:6px;padding:9px 14px;font-size:13px;cursor:pointer;margin:8px 6px 0 0}
  button.sec{background:#21262d;border:1px solid #30363d}
  button:disabled{opacity:.5;cursor:not-allowed}
  .pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
  .row{display:flex;gap:8px}.row>*{flex:1}
  pre{background:#010409;border:1px solid #30363d;border-radius:6px;padding:10px;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:340px;overflow:auto}
  code{background:#161b22;padding:1px 5px;border-radius:4px;font-size:12px}
  .sec-box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin:12px 0}
</style>
</head>
<body>
<h2>🛰️ Devin Cloud · P2P 直连客户端</h2>
<div class="muted">
  路线C · <b>0 账号去中心化 WebRTC</b>。只需 <b>session + token</b> 即可直连 —— 信令借公共 pub/sub (ntfy 多家公开实例) 一次性交换加密 SDP, 之后 RPC 全程走 <b>P2P DataChannel</b>, <b>完全不经你的 Worker</b>。<br>
  隧道 URL <b>可留空</b>; 仅当去中心化打洞失败时, 才用它走 Worker 兜底。curl 控制端照常 HTTP 可用。
</div>

<div class="sec-box">
  <label>设备公网入口 (隧道 URL · 可选 · 仅去中心化失败时兜底)</label>
  <input id="url" placeholder="可留空。兜底: https://xxx.trycloudflare.com">
  <div class="row">
    <div><label>Token</label><input id="token" placeholder="Bearer Token"></div>
    <div><label>Session</label><input id="session" placeholder="rtflow-xxxx"></div>
  </div>
  <label>自有 TURN (可选 · 仅对称 NAT 直连不通时填; 默认零依赖纯 STUN)</label>
  <input id="turn" placeholder='留空即可。如需: [{"urls":"turn:host:3478","username":"u","credential":"p"}]'>
  <button id="btnConnect" onclick="connect()">⚡ 建立 P2P 直连</button>
  <button class="sec" onclick="hangup()">断开</button>
  <span id="state" class="pill" style="background:#30363d">未连接</span>
  <span id="rtt" class="muted"></span>
</div>

<div class="sec-box">
  <label>发送 RPC (经 P2P DataChannel · 与 curl 同命令集)</label>
  <div class="row">
    <div style="flex:2"><input id="cmd" value="getState" placeholder="命令, 如 getState / phoneScreenCapture"></div>
    <div style="flex:3"><input id="args" value="{}" placeholder='参数 JSON, 如 {"command":"input tap 540 1200"}'></div>
  </div>
  <button id="btnSend" onclick="sendRpc()" disabled>发送</button>
  <button class="sec" id="btnPing" onclick="pingLoop()" disabled>测延迟 ×5</button>
</div>

<label>日志</label>
<pre id="log"></pre>

<script>
var STUN = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun.cloudflare.com:3478" }
];
var pc = null, dc = null, seq = 0, waiters = Object.create(null);
var sig = null;   // 去中心化直连句柄 (DaoSignal.connect 返回 {pc,dc,rpc,ping,close})
function onOpen(label){ setState(label,"#238636"); $("btnSend").disabled=false; $("btnPing").disabled=false; $("btnConnect").disabled=false; log("✓ DataChannel open — 之后 RPC 全程 P2P"); }
function $(id){ return document.getElementById(id); }
function log(s){ var p=$("log"); p.textContent += (typeof s==="string"?s:JSON.stringify(s,null,2)) + "\n"; p.scrollTop=p.scrollHeight; }
function setState(t,c){ var e=$("state"); e.textContent=t; e.style.background=c||"#30363d"; }

function waitIce(pc){
  return new Promise(function(res){
    if (pc.iceGatheringState==="complete") return res();
    var done=false; function fin(){ if(!done){ done=true; res(); } }
    pc.addEventListener("icegatheringstatechange", function(){ if(pc.iceGatheringState==="complete") fin(); });
    setTimeout(fin, 4000);
  });
}

async function connect(){
  hangup();
  var url=$("url").value.trim().replace(/\/$/,""), token=$("token").value.trim(), session=$("session").value.trim();
  if(!session||!token){ log("✗ 去中心化直连需填 session + token (隧道URL 可留空)"); return; }
  var ice=STUN.slice(), extraIce=[], turnRaw=($("turn").value||"").trim();
  if(turnRaw){ try{ var extra=JSON.parse(turnRaw); if(Array.isArray(extra)){ ice=ice.concat(extra); extraIce=extra; } }catch(e){ log("✗ TURN JSON 非法, 忽略"); } }
  $("btnConnect").disabled=true;

  // ── 路线C 优先: 0账号·去中心化信令 (公共 ntfy, 不经 Worker) ──
  if(window.DaoSignal && DaoSignal.available()){
    setState("去中心化握手中…","#9e6a03");
    log("→ 路线C: 公共信令(ntfy)交换加密 SDP, 0账号不经 Worker…");
    try{
      sig = await DaoSignal.connect({ session:session, token:token, ice:extraIce, timeout:25000 });
      onOpen("P2P 直连 🟢 (去中心化·0账号)");
      return;
    }catch(e){ var ec=String((e&&e.message)||e); var hint = ec==="ice_failed" ? "去中心化未通 (对端已应答但 P2P 打洞失败/对称NAT —— 可填 TURN 或用隧道兜底)" : (ec==="signal_timeout" ? "去中心化未通 (未收到对端应答 —— 检查手机在线与 session/token 是否一致)" : "去中心化未通 ("+ec+")"); log("• "+hint+(url?", 尝试 Worker 兜底…":"")); try{ if(sig) sig.close(); }catch(_){ } sig=null; }
  } else { log("• 本环境无 WebCrypto, 跳过去中心化"+(url?", 用 Worker 兜底":"")); }

  // ── 兜底: Worker 隧道信令 (原路径) ──
  if(!url){ log("✗ 去中心化未通且未填隧道URL, 无法兜底"); setState("失败","#da3633"); $("btnConnect").disabled=false; return; }
  setState("Worker兜底握手中…","#9e6a03");
  try{
    pc = new RTCPeerConnection({ iceServers: ice });
    dc = pc.createDataChannel("rpc");
    dc.binaryType="arraybuffer";
    dc.onopen=function(){ onOpen("P2P 已直连 🟢 (Worker兜底信令)"); };
    dc.onclose=function(){ setState("通道关闭","#30363d"); $("btnSend").disabled=true; $("btnPing").disabled=true; };
    dc.onmessage=function(ev){
      var m; try{ m=JSON.parse(ev.data); }catch(e){ return; }
      if(m.t==="pong"){ var w=waiters[m.id]; if(w){ delete waiters[m.id]; w.resolve({pong:true,ts:m.ts}); } return; }
      if(m.t==="res"){ var w2=waiters[m.id]; if(w2){ delete waiters[m.id]; w2.resolve(m.result); } }
    };
    pc.onconnectionstatechange=function(){ log("• pc: "+pc.connectionState); if(pc.connectionState==="failed") setState("打洞失败 (NAT/UDP 受限)","#da3633"); };
    var offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitIce(pc);
    log("→ 经隧道交换 SDP (一次性信令)…");
    var headers={ "Content-Type":"application/json" }; if(token) headers["Authorization"]="Bearer "+token;
    var resp = await fetch(url+"/relay/"+session, { method:"POST", headers:headers,
      body: JSON.stringify({ path:"/api/rpc", method:"POST", body:{ cmd:"p2pConnect", offer: pc.localDescription.sdp, ice: ice.filter(function(s){ return /^turn/i.test(s.urls); }) } }) });
    var j = await resp.json();
    if(!j || !j.ok || !j.answer){ log("✗ 应答方拒绝/失败: "+JSON.stringify(j)); setState("信令失败","#da3633"); $("btnConnect").disabled=false; return; }
    log("← 收到 answer, 建立 P2P 中… (STUN 打洞)");
    await pc.setRemoteDescription({ type:"answer", sdp:j.answer });
  }catch(e){ log("✗ "+String((e&&e.message)||e)); setState("异常","#da3633"); }
  $("btnConnect").disabled=false;
}

function rpcRaw(frame){
  return new Promise(function(resolve,reject){
    if(!dc || dc.readyState!=="open") return reject(new Error("datachannel 未就绪"));
    var id=String(++seq); waiters[id]={resolve:resolve,reject:reject};
    dc.send(JSON.stringify({ t:"rpc", id:id, frame:frame }));
    setTimeout(function(){ if(waiters[id]){ delete waiters[id]; reject(new Error("timeout")); } }, 30000);
  });
}
async function sendRpc(){
  var cmd=$("cmd").value.trim(); var argsObj={};
  try{ argsObj=JSON.parse($("args").value||"{}"); }catch(e){ log("✗ 参数 JSON 非法"); return; }
  var body=Object.assign({cmd:cmd}, argsObj);
  var t0=performance.now();
  try{
    var result = sig ? await sig.rpc({ path:"/api/rpc", method:"POST", body:body }) : await rpcRaw({ path:"/api/rpc", method:"POST", body:body });
    var dt=(performance.now()-t0).toFixed(0);
    var r; try{ r=JSON.parse(result); }catch(e){ r=result; }
    var out=r; try{ if(r&&r.bodyText) out=JSON.parse(r.bodyText); }catch(e){}
    log("✓ "+cmd+" ["+dt+"ms · P2P] →"); log(out);
  }catch(e){ log("✗ "+cmd+": "+String((e&&e.message)||e)); }
}
function ping(){ return new Promise(function(resolve,reject){ var id="p"+(++seq); waiters[id]={resolve:resolve,reject:reject}; var t0=performance.now(); dc.send(JSON.stringify({t:"ping",id:id})); waiters[id].resolve=function(){ resolve(performance.now()-t0); }; setTimeout(function(){ if(waiters[id]){delete waiters[id]; reject(new Error("to")); } },5000); }); }
async function pingLoop(){ for(var i=0;i<5;i++){ try{ var ms=await (sig?sig.ping():ping()); log("ping#"+(i+1)+" = "+ms.toFixed(1)+"ms (P2P RTT)"); }catch(e){ log("ping#"+(i+1)+" timeout"); } } }
function hangup(){ try{ if(sig) sig.close(); }catch(e){} sig=null; try{ if(dc) dc.close(); }catch(e){} try{ if(pc) pc.close(); }catch(e){} dc=null; pc=null; $("btnSend").disabled=true; $("btnPing").disabled=true; setState("未连接","#30363d"); }
</script>
</body>
</html>
