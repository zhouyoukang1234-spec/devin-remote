<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>用户脚本 (油猴)</title>
<style>
:root{--fg:#cdd3de;--desc:#8b949e;--link:#4daafc;--inb:#161b22;--bd:#30363d;--btn:#1f6feb;--btnh:#388bfd;background:#0e1116}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;font-size:13px;padding:10px;color:var(--fg);background:#0e1116;overflow-y:auto}
body.sel{padding-top:50px}
h3{margin:12px 0 5px;font-size:13px;color:var(--link)}
.muted{color:var(--desc);font-size:12px;line-height:1.6}
input,textarea,button,select{font-size:13px;margin:3px 0;width:100%;padding:7px 9px;background:var(--inb);color:var(--fg);border:1px solid var(--bd);border-radius:5px}
textarea{min-height:120px;font-family:monospace;font-size:11px;resize:vertical}
button{background:var(--btn);color:#fff;cursor:pointer;border:none}
button:active{opacity:.8}
.row{display:flex;gap:6px}.row button{flex:1}
.tools{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tools button{width:auto;flex:1;min-width:70px;background:#161b22;color:#cdd3de;border:1px solid var(--bd);font-size:12px;padding:8px 6px}
.tools button:active{background:#1f6feb33}
.card{border:1px solid var(--bd);border-radius:6px;padding:10px;margin-top:8px;background:#11161d}
.lbl{color:var(--desc);font-size:11px;margin-top:6px}
.section{margin-top:12px;padding-top:8px;border-top:1px solid var(--bd)}
.it{display:flex;align-items:center;gap:8px;padding:9px;border:1px solid var(--bd);border-radius:6px;margin-top:7px;background:#11161d;-webkit-user-select:none;user-select:none}
.it.on{background:#15324a;border-color:#1f6feb}
.it .meta{flex:1;min-width:0}
.it .nm{font-size:13px;color:#e6edf3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.it .sub{color:var(--desc);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.it button{width:auto;padding:6px 10px;font-size:12px;margin:0}
.ck{width:20px;height:20px;border:2px solid #6e7681;border-radius:50%;flex:none;display:none;position:relative}
body.sel .ck{display:block}
body.sel .sw,body.sel .it .act{display:none}
.it.on .ck{border-color:#1f6feb;background:#1f6feb}
.it.on .ck:after{content:'';position:absolute;left:5px;top:1px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
.sw{width:42px;height:24px;border-radius:12px;background:#30363d;position:relative;flex:none;transition:.2s}
.sw.on{background:#238636}
.sw i{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.sw.on i{left:21px}
.empty{color:var(--desc);text-align:center;padding:22px;font-size:12px}
.foot{text-align:center;color:#586069;font-size:11px;margin:16px 0 6px}
.toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:9px 14px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;z-index:120;max-width:90%}
.toast.show{opacity:1}
.selbar{position:fixed;left:0;right:0;top:0;background:#161b22;border-bottom:1px solid var(--bd);display:none;align-items:center;gap:6px;padding:8px 10px;z-index:80}
body.sel .selbar{display:flex}
.selbar .sx{font-size:19px;padding:2px 6px}.selbar .cnt{flex:1;color:#9cdcfe;font-size:13px}
.selbar .a{width:auto;padding:7px 10px;font-size:12px;background:#21262d;border:1px solid var(--bd)}
.selbar .a.del{color:#ff7b72}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:14px}
.modal.on{display:flex}
.mbox{background:#11161d;border:1px solid var(--bd);border-radius:10px;padding:14px;width:100%;max-width:560px;max-height:88vh;overflow:auto}
.mbox h4{color:#9cdcfe;font-size:14px;margin-bottom:8px}
</style></head><body>

<div class="selbar">
  <span class="sx" id="selX">&#10005;</span>
  <span class="cnt" id="selCnt">0 选中</span>
  <button class="a" data-m="en">启用</button>
  <button class="a" data-m="dis">停用</button>
  <button class="a" data-m="exp">导出</button>
  <button class="a del" data-m="del">删除</button>
</div>

<h3>🐵 用户脚本 · 油猴兼容引擎</h3>
<div class="muted">直接运行标准 <b>.user.js</b> (支持 <code>@match / @run-at / @require / GM_*</code>)。脚本与数据存于共享保险箱，卸载重装不丢。跨域请求经原生桥，绕开网站 CSP。<b>点条目可编辑</b>，长按多选。注册的菜单命令在浏览页「☰ → 脚本菜单」触发。</div>

<div class="card">
  <div class="lbl">从网址安装 (如 Greasy Fork 的 .user.js 链接)</div>
  <input id="url" placeholder="https://update.greasyfork.org/scripts/xxxxx/yyy.user.js" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button onclick="installUrl()">安装脚本</button>
  <div class="tools">
    <button onclick="newScript()">＋ 新建</button>
    <button onclick="exportAll()">导出全部</button>
    <button onclick="openImport()">导入</button>
    <button onclick="updateAll()">检查更新</button>
  </div>
</div>

<div class="section">
  <h3>已安装脚本 <span id="cnt" class="muted"></span></h3>
  <div id="list"></div>
</div>

<div class="foot" id="foot">Devin Cloud 手机版 · 道法自然</div>
<div class="toast" id="toast"></div>

<div class="modal" id="edModal"><div class="mbox">
  <h4 id="edTitle">编辑脚本</h4>
  <textarea id="edCode" spellcheck="false" autocapitalize="off" style="min-height:46vh"></textarea>
  <div class="row" style="margin-top:6px"><button onclick="closeEd()" style="background:#21262d">取消</button><button onclick="saveEd()">保存</button></div>
</div></div>

<div class="modal" id="imModal"><div class="mbox">
  <h4>导入脚本 (粘贴导出的 JSON)</h4>
  <textarea id="imCode" spellcheck="false" autocapitalize="off" placeholder='[{"source":"// ==UserScript== ..."}]' style="min-height:30vh"></textarea>
  <div class="row" style="margin-top:6px"><button onclick="closeImport()" style="background:#21262d">取消</button><button onclick="doImport()">导入</button></div>
</div></div>

<script>
var N = window.Native || {};
var SCRIPTS = [], SEL = {}, selMode = false, SWALLOW = false;
function toast(s){ var t=document.getElementById('toast'); t.textContent=s; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1800); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function byId(id){ for(var i=0;i<SCRIPTS.length;i++) if(SCRIPTS[i].id===id) return SCRIPTS[i]; return null; }

function load(){ try{ SCRIPTS=JSON.parse(N.usList()||'[]'); }catch(e){ SCRIPTS=[]; } }
function render(){
  document.getElementById('cnt').textContent = SCRIPTS.length ? ('('+SCRIPTS.length+')') : '';
  var box=document.getElementById('list');
  if(!SCRIPTS.length){ box.innerHTML='<div class="empty">还没有脚本。从上方网址安装、＋ 新建，或导入。</div>'; return; }
  box.innerHTML='';
  SCRIPTS.forEach(function(s){
    var m=(s.matches&&s.matches.length?s.matches:(s.includes||[])).join(', ')||'(无匹配规则)';
    var d=document.createElement('div'); d.className='it'+(SEL[s.id]?' on':''); d.setAttribute('data-id',s.id);
    d.innerHTML='<div class="ck"></div>'+
      '<div class="sw'+(s.enabled?' on':'')+'"><i></i></div>'+
      '<div class="meta"><div class="nm">'+esc(s.name)+(s.version?(' <span class="sub">v'+esc(s.version)+'</span>'):'')+'</div>'+
      '<div class="sub">'+esc(m)+'</div></div>'+
      '<button class="act" style="background:#a33" data-del="1">删</button>';
    box.appendChild(d);
  });
}
function refresh(){ load(); render(); }

function selCount(){ return Object.keys(SEL).length; }
function updSelBar(){ document.getElementById('selCnt').textContent = selCount()+' 选中'; }
function setSel(id,on){ var el=document.querySelector('.it[data-id="'+id+'"]'); if(on){SEL[id]=1; if(el)el.classList.add('on');} else {delete SEL[id]; if(el)el.classList.remove('on');} }
function enterSel(id){ selMode=true; document.body.classList.add('sel'); if(id)setSel(id,true); updSelBar(); try{N.vibrate&&N.vibrate(18);}catch(e){} }
function exitSel(){ selMode=false; document.body.classList.remove('sel'); SEL={}; render(); }
function toggleSel(id){ if(SEL[id])setSel(id,false); else setSel(id,true); updSelBar(); if(selCount()===0)exitSel(); }

document.getElementById('selX').onclick=exitSel;
document.querySelector('.selbar').addEventListener('click',function(ev){
  var b=ev.target.closest&&ev.target.closest('.a'); if(!b)return;
  var ids=Object.keys(SEL); if(!ids.length){exitSel();return;}
  var m=b.getAttribute('data-m');
  if(m==='en'){ try{N.usToggleMany(JSON.stringify(ids),true);}catch(e){} toast('已启用 '+ids.length+' 个'); exitSel(); refresh(); }
  else if(m==='dis'){ try{N.usToggleMany(JSON.stringify(ids),false);}catch(e){} toast('已停用 '+ids.length+' 个'); exitSel(); refresh(); }
  else if(m==='exp'){ exportIds(ids); exitSel(); }
  else if(m==='del'){ if(!confirm('删除选中的 '+ids.length+' 个脚本？'))return; try{N.usDeleteMany(JSON.stringify(ids));}catch(e){} toast('已删除 '+ids.length+' 个'); exitSel(); refresh(); }
});

var LT;
document.getElementById('list').addEventListener('touchstart',function(ev){
  var r=ev.target.closest&&ev.target.closest('.it'); if(!r)return; var id=r.getAttribute('data-id');
  LT=setTimeout(function(){LT=0;SWALLOW=true; if(!selMode)enterSel(id); else toggleSel(id);},460);
},{passive:true});
document.getElementById('list').addEventListener('touchend',function(){ if(LT){clearTimeout(LT);LT=0;} },{passive:true});
document.getElementById('list').addEventListener('touchmove',function(){ if(LT){clearTimeout(LT);LT=0;} },{passive:true});
document.getElementById('list').addEventListener('click',function(ev){
  if(SWALLOW){SWALLOW=false;ev.preventDefault();ev.stopPropagation();return;}
  var r=ev.target.closest&&ev.target.closest('.it'); if(!r)return; var id=r.getAttribute('data-id'); var s=byId(id); if(!s)return;
  if(selMode){ toggleSel(id); return; }
  if(ev.target.closest('.sw')){ var on=!s.enabled; try{N.usToggle(id,on);}catch(e){} toast(on?'已启用':'已停用'); refresh(); return; }
  if(ev.target.closest('[data-del]')){ if(!confirm('删除「'+s.name+'」？'))return; try{N.usDelete(id);}catch(e){} toast('已删除'); refresh(); return; }
  editScript(id);
});

function editScript(id){
  var src=''; try{ src=N.usGetSource(id); }catch(e){}
  document.getElementById('edTitle').textContent='编辑脚本';
  document.getElementById('edCode').value=src;
  document.getElementById('edModal').setAttribute('data-id',id);
  document.getElementById('edModal').classList.add('on');
}
function newScript(){
  document.getElementById('edTitle').textContent='新建脚本';
  document.getElementById('edCode').value='// ==UserScript==\n// @name        新脚本\n// @namespace   devin\n// @version     1.0\n// @match       *://*/*\n// @run-at      document-end\n// @grant       none\n// ==/UserScript==\n\nconsole.log("hello from userscript");\n';
  document.getElementById('edModal').removeAttribute('data-id');
  document.getElementById('edModal').classList.add('on');
}
function closeEd(){ document.getElementById('edModal').classList.remove('on'); }
function saveEd(){
  var c=document.getElementById('edCode').value;
  if(c.indexOf('==UserScript==')<0){ toast('缺少 ==UserScript== 头'); return; }
  var id=''; try{ id=N.usSaveCode(c); }catch(e){}
  if(id){ closeEd(); toast('已保存'); refresh(); } else toast('保存失败');
}

function installUrl(){
  var u=document.getElementById('url').value.trim(); if(!u){toast('请输入网址');return;}
  toast('安装中…');
  setTimeout(function(){
    var id=''; try{ id=N.usInstall(u); }catch(e){}
    if(id){ document.getElementById('url').value=''; toast('安装成功'); refresh(); }
    else toast('安装失败 (链接非 .user.js 或网络问题)');
  }, 30);
}
function exportIds(ids){
  var all=[]; try{ all=JSON.parse(N.usExportAll()||'[]'); }catch(e){}
  var pick=all.filter(function(s){ return ids.indexOf(s.id)>=0; });
  var json=JSON.stringify(pick);
  try{ N.clip(json); }catch(e){}
  try{ N.share(json); }catch(e){}
  toast('已导出 '+pick.length+' 个 (已复制/分享)');
}
function exportAll(){
  var json=''; try{ json=N.usExportAll()||'[]'; }catch(e){ json='[]'; }
  var n=0; try{ n=JSON.parse(json).length; }catch(e){}
  if(!n){ toast('暂无脚本可导出'); return; }
  try{ N.clip(json); }catch(e){}
  try{ N.share(json); }catch(e){}
  toast('已导出全部 '+n+' 个 (已复制/分享)');
}
function openImport(){ document.getElementById('imCode').value=''; document.getElementById('imModal').classList.add('on'); }
function closeImport(){ document.getElementById('imModal').classList.remove('on'); }
function doImport(){
  var c=document.getElementById('imCode').value.trim(); if(!c){toast('请粘贴 JSON');return;}
  var n=0; try{ n=N.usImport(c); }catch(e){}
  if(n>0){ closeImport(); toast('已导入 '+n+' 个'); refresh(); } else toast('导入失败 (JSON 格式或无有效脚本)');
}
function updateAll(){
  if(!SCRIPTS.length){ toast('暂无脚本'); return; }
  toast('检查更新中…');
  setTimeout(function(){
    var up=0, latest=0, no=0;
    SCRIPTS.forEach(function(s){
      var r=''; try{ r=N.usCheckUpdate(s.id); }catch(e){ r='fail'; }
      if(r==='updated')up++; else if(r==='latest')latest++; else no++;
    });
    refresh();
    toast('更新 '+up+' · 已最新 '+latest+(no?(' · 无更新源/失败 '+no):''));
  }, 30);
}

try{ var v=localStorage.getItem('rtflow.ver'); if(v) document.getElementById('foot').textContent='Devin Cloud 手机版 · v'+v+' · 道法自然'; }catch(e){}
refresh();
</script>
</body></html>
