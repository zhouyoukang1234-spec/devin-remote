<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Devin Cloud · 手机版 (网页)</title>
<style>
  /* 道法自然·页面归一(1:1): 本页外壳与手机 APK 的原生界面逐件一致 —— 两行工具栏(≡/地址/译/→ ; 🔍缩放/★/↻/📥/🗂)、
     汉堡菜单的每个模块与子菜单、下载 📥 与 全服通 🗂 两个悬浮窗, 全部按 MainActivity 原生布局复刻。
     内容区因板块绑定原生 N 桥(只能跑在手机里), 故以「实时镜像 + 反向点按」忠实呈现同一张手机页。 */
  :root{--bg:#0e1116;--fg:#cdd3de;--border:#222730;--bar:#161b22;--bar2:#161b22;--input:#0d1117;
        --input-b:#30363d;--btn:#1f6feb;--btn-h:#388bfd;--green:#4ec9b0;--muted:#7d8590;
        --red:#f85149;--amber:#f0883e;--chipbg:#21262d}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
            font:13px/1.4 -apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  /* ── 第一行工具栏: ≡ 地址 译 → (同 APK bar) ── */
  #bar{display:flex;align-items:center;gap:6px;padding:6px;background:var(--bar);flex:0 0 auto}
  .tbtn{background:var(--chipbg);color:var(--fg);border:0;border-radius:6px;height:34px;min-width:0;
        padding:0 12px;font-size:16px;cursor:pointer;line-height:1}
  .tbtn:active{background:#283041}
  .tbtn.sm{padding:0 9px;font-size:14px;height:30px}
  .tbtn.md{padding:0 10px;font-size:15px;height:31px}
  #dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--amber);margin:0 1px}
  #dot.on{background:var(--green)} #dot.off{background:var(--red)}
  #addr{flex:1;min-width:60px;height:32px;background:var(--input);color:var(--fg);border:0;
        border-radius:0;padding:0 11px;font-size:13px;outline:none}
  #addr::placeholder{color:#6e7681}
  /* ── 第二行工具栏: 🔍 缩放滑块 % ★ ↻ 📥 🗂 (同 APK btnRow) ── */
  #bar2{display:flex;align-items:center;gap:2px;padding:1px 8px 4px;background:var(--bar2);flex:0 0 auto}
  #zicon{color:#8b949e;font-size:14px;padding:0 1px 0 2px;cursor:pointer;user-select:none}
  #zoomBar{flex:1;margin:0 2px;accent-color:var(--btn)}
  #zoomLabel{color:#cdd3de;font-size:13px;min-width:40px;padding:0 3px;text-align:center}
  /* ── 标签条 (同 APK 横向标签条) ── */
  #strip{display:flex;align-items:center;gap:5px;padding:3px 4px;background:var(--bg);
         border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;scrollbar-width:thin}
  #strip::-webkit-scrollbar{height:5px}#strip::-webkit-scrollbar-thumb{background:#2a3140;border-radius:3px}
  .chip{display:flex;align-items:center;gap:6px;flex:0 0 auto;max-width:210px;height:30px;padding:0 8px 0 11px;
        background:#1a2030;border:1px solid var(--input-b);border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px}
  .chip.on{background:#13332b;border-color:#1f5f51;color:var(--green)}
  /* 道法自然·跨设备在场: 有其他设备(含手机本体)正看/控此标签 → 橙色半透明, 与 APK 标签条同款双向一致 */
  .chip.shared{background:rgba(240,136,62,.18);border-color:rgba(240,136,62,.55);color:#ffcaa0}
  .chip.on.shared{background:rgba(240,136,62,.26);border-color:rgba(240,136,62,.7)}
  .chip .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .co{flex:0 0 auto;font-size:10px;color:#ffcaa0}
  .chip .x{width:18px;height:18px;line-height:16px;text-align:center;border-radius:50%;color:#8a93a0;font-size:14px}
  .chip .x:hover{background:#3a2030;color:#f88}
  #plus{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px dashed var(--input-b);
        background:transparent;color:var(--muted);font-size:18px;cursor:pointer}
  /* ── 内容区: 实时镜像投屏 ── */
  #frames{position:relative;flex:1 1 auto;background:#06080c;overflow:auto;display:flex;align-items:center;justify-content:center}
  #frame{max-width:100%;max-height:100%;object-fit:contain;cursor:crosshair;transform-origin:center center;
         box-shadow:0 0 0 1px #000,0 8px 40px #000a;background:#fff;-webkit-user-select:none;user-select:none}
  #frame.empty{display:none}
  #hint{position:absolute;color:var(--muted);font-size:13px;text-align:center;padding:24px;pointer-events:none}
  #kbd{position:absolute;left:0;width:1px;height:1px;opacity:0;pointer-events:none}
  #status{position:fixed;left:10px;bottom:8px;font-size:11px;color:var(--muted);background:#0e1116cc;
          padding:3px 8px;border-radius:6px;pointer-events:none;max-width:70%;z-index:30}
  #health{position:fixed;left:50%;top:90px;transform:translateX(-50%);display:none;font-size:12px;color:#ffd7b0;
          background:#3a1d10ee;border:1px solid #7a3b1e;padding:5px 12px;border-radius:8px;z-index:90;max-width:88%;text-align:center;pointer-events:none}
  #health.show{display:block}
  #toast{position:fixed;right:10px;bottom:8px;font-size:11px;color:var(--fg);background:#1a2030;
         border:1px solid var(--input-b);padding:5px 10px;border-radius:7px;opacity:0;transition:opacity .2s;max-width:60%;z-index:95}
  #toast.show{opacity:1}
  /* ── 新标签/板块选择面板 ── */
  #launch{position:fixed;inset:0;background:rgba(8,11,16,.72);display:none;align-items:flex-start;justify-content:center;z-index:70}
  #launch.show{display:flex}
  #launchCard{margin-top:54px;width:min(460px,92vw);background:#11161e;border:1px solid var(--border);
              border-radius:14px;padding:14px;box-shadow:0 18px 50px #000a}
  #launchCard h3{margin:2px 0 12px;font-size:13px;color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .seg{display:flex;align-items:center;gap:9px;background:#1a2030;border:1px solid var(--input-b);
       border-radius:10px;padding:11px 12px;cursor:pointer;color:var(--fg);font-size:13px}
  .seg:hover{border-color:var(--green);background:#13332b}
  .seg .ic{font-size:18px;width:22px;text-align:center}
  /* ── 汉堡菜单下拉 (复刻 APK PopupMenu: 模块 + 页面工具 + 分享 + 镜像/连接) ── */
  #menuPop{position:fixed;top:78px;left:8px;background:#11161e;border:1px solid var(--border);border-radius:12px;
           padding:6px;display:none;z-index:96;min-width:230px;max-height:80vh;overflow-y:auto;box-shadow:0 14px 40px #000a}
  #menuPop.show{display:block}
  #menuPop .mi{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px}
  #menuPop .mi:hover{background:#1a2030}
  #menuPop .mi .ph{margin-left:auto;font-size:10px;color:#6e7681}
  #menuPop .grp{padding:8px 12px 3px;font-size:10px;color:#6e7681;letter-spacing:.5px}
  #menuPop .sep{height:1px;background:var(--border);margin:5px 4px}
  #menuPop .ic{width:20px;text-align:center}
  /* ── 悬浮窗 (下载 📥 / 全服通 🗂): 复刻 APK 可拖动悬浮面板 ── */
  .fw{position:fixed;top:90px;right:8px;width:min(320px,92vw);height:min(460px,72vh);background:#0e1116;
      border:1px solid var(--border);border-radius:10px;display:none;flex-direction:column;z-index:88;
      box-shadow:0 18px 50px #000c;overflow:hidden}
  .fw.show{display:flex}
  .fw-head{display:flex;align-items:center;background:#1f6feb;color:#fff;padding:8px 8px 8px 10px;cursor:move;flex:0 0 auto}
  .fw-head .ttl{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fw-head .cl{padding:0 6px 0 10px;font-size:16px;cursor:pointer}
  .fw-body{flex:1 1 auto;position:relative;overflow:auto;background:#06080c}
  #fwDaoImg{display:block;max-width:100%;margin:0 auto;cursor:crosshair;background:#fff;-webkit-user-select:none;user-select:none}
  #fwDlList{padding:5px}
  .dlrow{display:flex;align-items:center;gap:8px;background:#1b1f26;border-radius:7px;padding:8px;margin-bottom:4px}
  .dlrow .info{flex:1;min-width:0}
  .dlrow .nm{color:#e6edf3;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dlrow .sub{color:#8b949e;font-size:10px;margin-top:2px}
  .dlrow .act{background:#21262d;color:#cdd3de;border:0;border-radius:6px;height:28px;padding:0 9px;font-size:14px;cursor:pointer}
  .dlempty{color:#8b949e;font-size:12px;text-align:center;padding:26px 10px;white-space:pre-line}
  /* ── 设置浮层 ── */
  #cfg{position:fixed;inset:0;background:rgba(8,11,16,.78);display:none;align-items:center;justify-content:center;z-index:99}
  #cfg.show{display:flex}
  #cfgCard{width:min(420px,92vw);background:#11161e;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 18px 50px #000a}
  #cfgCard h3{margin:0 0 12px;font-size:14px}
  #cfgCard label{display:block;font-size:11px;color:var(--muted);margin:10px 0 4px}
  #cfgCard input{width:100%;height:34px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);border-radius:8px;padding:0 11px;font-size:13px;outline:none}
  #cfgCard .row{display:flex;gap:8px;margin-top:14px}
  #cfgCard button{flex:1;height:36px;border-radius:8px;border:1px solid var(--input-b);background:#1c2230;color:var(--fg);cursor:pointer;font-size:13px}
  #cfgCard button.pri{background:var(--btn);border-color:var(--btn);color:#fff}
  #pick{position:fixed;inset:0;background:rgba(8,11,16,.72);display:none;align-items:flex-start;justify-content:center;z-index:97}
  #pick.show{display:flex}
  #pickCard{margin-top:60px;width:min(440px,92vw);max-height:70%;overflow-y:auto;background:#11161e;border:1px solid var(--border);border-radius:14px;padding:14px}
  #pickCard h3{margin:2px 0 12px;font-size:13px;color:var(--muted)}
  .pr{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;background:#1a2030;border:1px solid var(--input-b);margin:5px 0;cursor:pointer;font-size:13px}
  .pr:hover{border-color:var(--green);background:#13332b}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <button class="tbtn" id="menuBtn" title="菜单">&#8801;</button>
    <span id="dot" title="连接状态"></span>
    <input id="addr" inputmode="url" autocomplete="off" spellcheck="false" placeholder="输入网址 / 搜索">
    <button class="tbtn sm" id="trBtn" title="整页翻译">译</button>
    <button class="tbtn sm" id="go" title="前往">&#8594;</button>
  </div>
  <div id="bar2">
    <span id="zicon" title="双击复位 100%">&#128269;</span>
    <input id="zoomBar" type="range" min="50" max="170" value="100" title="缩放">
    <span id="zoomLabel">100%</span>
    <button class="tbtn md" id="starBtn" title="收藏">&#9734;</button>
    <button class="tbtn md" id="reloadBtn" title="重载该标签">&#8635;</button>
    <button class="tbtn md" id="dlBtn" title="下载">&#128229;</button>
    <button class="tbtn md" id="daoBtn" title="全服通 · 近期对话 / 备份">&#128450;</button>
  </div>
  <div id="strip"><button id="plus" title="新标签">+</button></div>
  <div id="frames">
    <img id="frame" class="empty" alt="">
    <div id="hint">选择上方一个标签开始 · 任意公网浏览器与手机 APK 同款操作</div>
    <textarea id="kbd"></textarea>
  </div>
  <select id="fpsSel" style="display:none">
    <option value="0">手动</option>
    <option value="1500">~0.7 fps</option>
    <option value="700" selected>~1.4 fps</option>
    <option value="400">~2.5 fps</option>
    <option value="250">~4 fps</option>
  </select>
  <div id="menuPop"></div>
  <div id="status"></div>
  <div id="health"></div>
  <div id="toast"></div>
  <!-- 下载悬浮窗 (📥) -->
  <div class="fw" id="fwDl">
    <div class="fw-head" id="fwDlHead"><span class="ttl">下载 · 手机文件管理</span><span class="cl" id="fwDlClose">&#10005;</span></div>
    <div class="fw-body"><div id="fwDlList"></div></div>
  </div>
  <!-- 全服通悬浮窗 (🗂): 近期对话 / 备份 —— 实时镜像手机内真实 全服通 页 -->
  <div class="fw" id="fwDao">
    <div class="fw-head" id="fwDaoHead"><span class="ttl">全服通 · 近期对话 / 备份</span><span class="cl" id="fwDaoClose">&#10005;</span></div>
    <div class="fw-body"><img id="fwDaoImg" alt=""><div id="fwDaoHint" class="dlempty">正在打开 全服通…</div></div>
  </div>
  <div id="launch"><div id="launchCard">
    <h3>新标签 — 选择板块, 或输入任意网址 (各大浏览器多实例)</h3>
    <div class="grid" id="segGrid"></div>
    <div id="urlRow" style="display:flex;gap:7px;margin-top:12px">
      <input id="urlInput" inputmode="url" placeholder="https:// 任意网址"
             style="flex:1;height:36px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);border-radius:8px;padding:0 11px;font-size:13px;outline:none">
      <button id="urlGo" style="background:var(--btn);color:#fff;border:0;border-radius:8px;padding:0 16px;font-size:14px;cursor:pointer">打开</button>
    </div>
  </div></div>
  <div id="cfg"><div id="cfgCard">
    <h3>连接设置</h3>
    <label>中继入口 Endpoint</label><input id="cEndpoint" placeholder="https://...workers.dev">
    <label>Session</label><input id="cSession" placeholder="rtflow-...">
    <label>Token</label><input id="cToken" placeholder="...">
    <div class="row"><button id="cCancel">取消</button><button class="pri" id="cSave">保存并连接</button></div>
  </div></div>
  <div id="pick"><div id="pickCard"><h3>新建 / 打开</h3><div id="pickList"></div></div></div>
</div>
<script>
(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }
  function qp(k){ try{ return new URLSearchParams(location.search).get(k)||""; }catch(e){ return ""; } }

  // ── 配置: session/token/endpoint (query > localStorage > 同源) ──
  var cfg = {
    session:  qp("session") || localStorage.getItem("rtflow.con.session") || "",
    token:    qp("token") || qp("t") || localStorage.getItem("rtflow.con.token") || "",
    endpoint:(qp("endpoint") || localStorage.getItem("rtflow.con.endpoint") || location.origin).replace(/\/+$/,"")
  };
  function saveCfg(){ localStorage.setItem("rtflow.con.session",cfg.session);
    localStorage.setItem("rtflow.con.token",cfg.token); localStorage.setItem("rtflow.con.endpoint",cfg.endpoint); }

  // ── 本设备标识 (一个浏览器页 = 一台联控设备; sessionStorage → 每页独立) ──
  var CLIENT_ID = sessionStorage.getItem("rtflow.con.cid");
  if(!CLIENT_ID){ CLIENT_ID = "c_"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); sessionStorage.setItem("rtflow.con.cid",CLIENT_ID); }

  // ── RPC 传输: POST <endpoint>/relay/<session> {path:/api/rpc, body:{cmd,...}} ──
  // 道并行而不相悖: 手机端 relay 串行处理 (截图/执行 JS 都在 UI 线程), 故客户端也单线在飞 ——
  // 用一条 Promise 链把所有 RPC 串行化, 避免「主镜像 + 悬浮窗镜像 + 标签刷新」并发把手机打到超时/abort。
  var rateUntil = 0, rpcChain = Promise.resolve();
  function rpc(cmd, args, timeoutMs){
    var run = function(){ return rpcRaw(cmd, args, timeoutMs); };
    var p = rpcChain.then(run, run);
    rpcChain = p.catch(function(){});
    return p;
  }
  async function rpcRaw(cmd, args, timeoutMs){
    if(!cfg.session || !cfg.token){ throw new Error("未配置 session/token"); }
    if(Date.now() < rateUntil) await new Promise(function(r){ setTimeout(r, rateUntil-Date.now()); });
    var body = Object.assign({cmd:cmd}, args||{});
    var ctrl = new AbortController(); var to = setTimeout(function(){ try{ctrl.abort();}catch(e){} }, timeoutMs||20000);
    var r;
    try{
      r = await fetch(cfg.endpoint+"/relay/"+encodeURIComponent(cfg.session), {
        method:"POST", signal:ctrl.signal,
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+cfg.token },
        body: JSON.stringify({ path:"/api/rpc", method:"POST", body: body })
      });
    } finally { clearTimeout(to); }
    if(r.status===429){ rateUntil = Date.now()+2000; throw new Error("rate_limited"); }
    var t = await r.text(); var j;
    try{ j = JSON.parse(t); }catch(e){ throw new Error("bad_json: "+t.slice(0,80)); }
    return j;
  }
  async function cdp(tabIndex, method, params){
    var j = await rpc("cdp", {tabIndex:tabIndex, method:method, params:params||{}});
    if(j && j.ok===false) throw new Error(j.error||"cdp_err");
    return j && j.result;
  }

  // ── 状态 ──
  var tabsArr = [];        // browseListTabs 结果
  var activeIdx = -1;      // 当前投屏的 tab index
  var view = { cssW:384, cssH:602 };  // 当前 tab 的 CSS 视口 (反向坐标映射)
  var pollTimer = null, listTimer = null, loopBusy = false;
  var connected = false;
  var pageZoom = 100;
  // ── 手机端实时健康检测 ──
  var health = { fails:0, since:0 };
  function isStuckErr(m){ return /agent_timeout|timeout|aborted|Failed to fetch|NetworkError|load failed/i.test(String(m||"")); }
  function markHealth(ok, reason){
    var el=$("health"); if(!el) return;
    if(ok){ if(health.fails){ health.fails=0; health.since=0; } el.classList.remove("show"); return; }
    health.fails++; if(!health.since) health.since=Date.now();
    if(health.fails>=2){
      var sec=Math.round((Date.now()-health.since)/1000);
      el.textContent="⚠ 手机端疑卡死/无响应"+(reason?(" · "+reason):"")+" · 已重试 "+health.fails+" 次/"+sec+"s · 正自动恢复…";
      el.classList.add("show"); setDot("off");
    }
  }

  var dot=$("dot"), addr=$("addr"), frame=$("frame"), hint=$("hint"),
      statusEl=$("status"), toastEl=$("toast"), fpsSel=$("fpsSel"), kbd=$("kbd");
  var strip=$("strip"), plus=$("plus"), launch=$("launch"), menuPop=$("menuPop");

  function setDot(s){ dot.className=""; if(s) dot.classList.add(s); }
  function setStatus(s){ statusEl.textContent = s||""; }
  var toastT=null;
  function toast(s){ toastEl.textContent=s; toastEl.classList.add("show");
    if(toastT) clearTimeout(toastT); toastT=setTimeout(function(){ toastEl.classList.remove("show"); },1800); }

  function curTab(){ return tabsArr.find(function(t){return t.index===activeIdx;}); }
  function claimView(){
    var t = curTab(); if(!t || !t.id) return;
    rpc("browseClaimView",{id:t.id, clientId:CLIENT_ID},8000).catch(function(){});
  }
  function otherViewers(t){ return (t && t.viewers || []).filter(function(v){ return v && v!==CLIENT_ID; }); }
  function coControlCount(){
    var s={}; tabsArr.forEach(function(t){ otherViewers(t).forEach(function(v){ s[v]=1; }); });
    return Object.keys(s).length;
  }
  function hostOf(u){ try{ return new URL(u).host; }catch(e){ return u||""; } }

  // ── 标签列表 → 横向标签条 ──
  async function refreshTabs(){
    try{
      var j = await rpc("browseListTabs",{},12000);
      if(!j || !j.tabs){ throw new Error(j&&j.error||"no_tabs"); }
      connected=true; setDot("on"); markHealth(true);
      tabsArr = j.tabs;
      renderStrip();
      claimView();
      if(activeIdx<0){
        var act = tabsArr.find(function(t){return t.active;});
        if(act) selectTab(act.index);
        else if(tabsArr.length) selectTab(tabsArr[0].index);
      }
    }catch(e){
      connected=false; setDot("off");
      var m=String(e.message||e), stuck=isStuckErr(m);
      markHealth(false, stuck?"agent_timeout/超时":m);
      if(m.indexOf("session")>=0){ openCfg(); }
      setStatus(stuck? "手机端疑卡死/无响应, 自动重试…" : ("连接异常: "+m));
    }
  }
  function renderStrip(){
    [].slice.call(strip.querySelectorAll(".chip")).forEach(function(c){ c.remove(); });
    var co = coControlCount();
    tabsArr.forEach(function(t){
      var others = otherViewers(t);
      var shared = others.length>0;
      var c=document.createElement("div");
      c.className="chip"+(t.index===activeIdx?" on":"")+(shared?" shared":"");
      var tt=document.createElement("span"); tt.className="t";
      tt.textContent=(t.title||hostOf(t.url)||"新标签");
      c.appendChild(tt);
      if(shared){

    mi("🔗","分享本页", function(){ copyUrl(); });
    mi("📋","复制网址", copyUrl);
    mi("🏠","添加到主屏", function(){ toast("添加到主屏为手机本机操作"); }, "📱");
    sep(); grp("镜像 / 连接");
    mi("⟳","立即刷新镜像", shotNow);
    mi("🎞","镜像帧率: "+fpsText(), cycleFps);
    mi("⚙","连接设置", openCfg);
  }
  function seg(asset){ return SEGS.find(function(s){return s.asset===asset;}); }
  function fpsText(){ var o=fpsSel.options[fpsSel.selectedIndex]; return o?o.text:""; }
  function cycleFps(){ fpsSel.selectedIndex=(fpsSel.selectedIndex+1)%fpsSel.options.length; startLoop(); toast("帧率 "+fpsText()); menuPop.dataset.built=""; }
  function copyUrl(){ var t=curTab(); if(!t){ toast("无当前标签"); return; }
    try{ navigator.clipboard.writeText(t.url||""); toast("已复制网址"); }catch(e){ toast("复制失败"); } }
  function showBookmarks(){
    var bm = JSON.parse(localStorage.getItem("rtflow.con.bm")||"[]");
    if(!bm.length){ toast("暂无收藏 (点 ★ 收藏当前页)"); return; }
    var list=$("pickList"); list.innerHTML=""; $("pick").classList.add("show");
    bm.slice().reverse().forEach(function(b){ var d=document.createElement("div"); d.className="pr";
      d.textContent="⭐ "+(b.title||b.url); d.onclick=function(){ $("pick").classList.remove("show"); addr.value=b.url; goAddr(); }; list.appendChild(d); });
  }
  function grp(t){ var d=document.createElement("div"); d.className="grp"; d.textContent=t; menuPop.appendChild(d); }
  function mi(ic,label,fn,ph){ var d=document.createElement("div"); d.className="mi";
    d.innerHTML='<span class="ic">'+ic+'</span><span>'+label+'</span>'+(ph?'<span class="ph">'+ph+'</span>':'');
    d.onclick=function(){ menuPop.classList.remove("show"); fn(); }; menuPop.appendChild(d); }
  function sep(){ var s=document.createElement("div"); s.className="sep"; menuPop.appendChild(s); }
  $("menuBtn").onclick=function(e){ e.stopPropagation();
    if(!menuPop.dataset.built){ buildMenu(); menuPop.dataset.built="1"; }
    menuPop.classList.toggle("show"); };
  document.addEventListener("click", function(){ menuPop.classList.remove("show"); });

  // ── 悬浮窗通用: 拖动 ──
  function makeDraggable(panel, handle){
    var dx=0, dy=0, ox=0, oy=0, drag=false;
    handle.addEventListener("pointerdown", function(ev){ drag=true; dx=ev.clientX; dy=ev.clientY;
      var r=panel.getBoundingClientRect(); ox=r.left; oy=r.top; panel.style.right="auto";
      panel.style.left=ox+"px"; panel.style.top=oy+"px"; try{handle.setPointerCapture(ev.pointerId);}catch(e){} });
    handle.addEventListener("pointermove", function(ev){ if(!drag) return;
      panel.style.left=(ox+ev.clientX-dx)+"px"; panel.style.top=Math.max(0,oy+ev.clientY-dy)+"px"; });
    handle.addEventListener("pointerup", function(){ drag=false; });
  }
  makeDraggable($("fwDl"), $("fwDlHead"));
  makeDraggable($("fwDao"), $("fwDaoHead"));

  // ── 下载悬浮窗 (📥) ──
  function toggleDl(){ var p=$("fwDl"); if(p.classList.contains("show")){ p.classList.remove("show"); return; }
    p.classList.add("show"); loadDownloads(); }
  $("dlBtn").onclick=toggleDl;
  $("fwDlClose").onclick=function(){ $("fwDl").classList.remove("show"); };
  async function loadDownloads(){
    var box=$("fwDlList"); box.innerHTML="<div class='dlempty'>读取下载…</div>";
    var items=null;
    try{ var j=await rpc("listDownloads",{},10000); items=j&&j.items; }
    catch(e){ box.innerHTML="<div class='dlempty'>读取失败: "+e.message+"</div>"; return; }
    if(items==null){ box.innerHTML="<div class='dlempty'>需把手机端升级到 v0.35.6+\n才能在网页查看手机下载列表</div>"; return; }
    if(!items.length){ box.innerHTML="<div class='dlempty'>暂无下载\n网页里下载的文件会出现在这里</div>"; return; }
    box.innerHTML="";
    items.slice().reverse().forEach(function(it){
      var row=document.createElement("div"); row.className="dlrow";
      var info=document.createElement("div"); info.className="info";
      var nm=document.createElement("div"); nm.className="nm"; nm.textContent=it.name||"(文件)";
      var sub=document.createElement("div"); sub.className="sub"; sub.textContent=(it.sizeText||"")+" · 在手机本机操作";
      info.appendChild(nm); info.appendChild(sub);
      var act=document.createElement("button"); act.className="act"; act.innerHTML="&#8942;"; act.title="操作";
      act.onclick=function(e){ e.stopPropagation(); dlActions(it); };
      row.appendChild(info); row.appendChild(act); box.appendChild(row);
    });
  }
  function dlActions(it){
    var which=prompt("对「"+(it.name||"文件")+"」执行 (在手机本机):\n1=分享  2=用其它应用打开  3=删除\n输入数字:");
    var map={"1":"share","2":"open","3":"delete"};
    var a=map[(which||"").trim()]; if(!a) return;
    rpc("downloadAction",{index:it.index, action:a},10000)
      .then(function(){ toast(a==="delete"?"已删除":"已在手机执行"); if(a==="delete") loadDownloads(); })
      .catch(function(e){ toast("失败: "+e.message); });
  }

  // ── 全服通悬浮窗 (🗂): 实时镜像手机内真实 全服通 页 ──
  var dao = { idx:-1, view:{cssW:320,cssH:440}, timer:null, busy:false };
  function toggleDao(){ var p=$("fwDao"); if(p.classList.contains("show")){ closeDao(); return; } openDao(); }
  $("daoBtn").onclick=toggleDao;
  $("fwDaoClose").onclick=closeDao;
  function closeDao(){ $("fwDao").classList.remove("show"); if(dao.timer){ clearInterval(dao.timer); dao.timer=null; } }
  async function openDao(){
    $("fwDao").classList.add("show"); $("fwDaoHint").style.display="block"; $("fwDaoHint").textContent="正在打开 全服通…";
    var found = tabsArr.find(function(t){ return t.internal && (t.url||"").indexOf("daopan.html")>=0; });
    if(found){ dao.idx=found.index; startDao(); return; }
    try{
      await rpc("browseOpen",{url:"file:///android_asset/engine/daopan.html?session="+encodeURIComponent(cfg.session)+"&token="+encodeURIComponent(cfg.token), foreground:false},12000);
      setTimeout(function(){ refreshTabs().then(function(){
        var f=tabsArr.find(function(t){return t.internal&&(t.url||"").indexOf("daopan.html")>=0;});
        if(f){ dao.idx=f.index; startDao(); } else { $("fwDaoHint").textContent="打开 全服通 失败, 重试…"; }
      }); }, 1000);
    }catch(e){ $("fwDaoHint").textContent="打开失败: "+e.message; }
  }
  function startDao(){
    if(dao.idx<0) return;
    rpc("browseClaimView",{id:(tabsArr.find(function(t){return t.index===dao.idx;})||{}).id||0, clientId:CLIENT_ID},8000).catch(function(){});
    cdp(dao.idx,"Runtime.evaluate",{expression:"JSON.stringify({w:innerWidth,h:innerHeight})",returnByValue:true})
      .then(function(r){ try{ var v=JSON.parse(r.result.value); if(v.w) dao.view={cssW:v.w,cssH:v.h}; }catch(e){} }).catch(function(){});
    daoShot();
    if(dao.timer) clearInterval(dao.timer);
    dao.timer=setInterval(daoShot, 900);
  }
  async function daoShot(){
    if(dao.busy || dao.idx<0) return; dao.busy=true;
    try{
      var j=await rpc("browseScreenshot",{tabIndex:dao.idx, format:"jpeg", quality:55, maxWidth:720}, 15000);
      var b64=j&&(j.base64||j.data||j.image);
      if(b64){ var mime=b64.charAt(0)==="i"?"image/png":"image/jpeg";
        $("fwDaoImg").src="data:"+mime+";base64,"+b64; $("fwDaoHint").style.display="none"; }
    }catch(e){}finally{ dao.busy=false; }
  }
  $("fwDaoImg").addEventListener("click", function(ev){ ev.preventDefault(); if(dao.idx<0) return;
    var p=normIn($("fwDaoImg"), dao.view.cssW, dao.view.cssH, ev); lastTap=p;
    injectTo(dao.idx,"click",p).then(function(){ setTimeout(daoShot,160); setTimeout(daoShot,450); }); });
  $("fwDaoImg").addEventListener("wheel", function(ev){ ev.preventDefault(); if(dao.idx<0) return;
    var p=normIn($("fwDaoImg"), dao.view.cssW, dao.view.cssH, ev); p.dy=Math.round(ev.deltaY);
    injectTo(dao.idx,"scroll",p).then(function(){ setTimeout(daoShot,140); }); }, {passive:false});

  // ── 设置浮层 ──
  function openCfg(){ $("cEndpoint").value=cfg.endpoint; $("cSession").value=cfg.session; $("cToken").value=cfg.token; $("cfg").classList.add("show"); }
  $("cCancel").onclick=function(){ $("cfg").classList.remove("show"); };
  $("cSave").onclick=function(){
    cfg.endpoint=$("cEndpoint").value.trim().replace(/\/+$/,""); cfg.session=$("cSession").value.trim(); cfg.token=$("cToken").value.trim();
    saveCfg(); $("cfg").classList.remove("show"); activeIdx=-1; tabsArr=[]; refreshTabs();
  };

  // ── 启动 ──
  buildSegs(); applyZoom();
  if(!cfg.session || !cfg.token){ openCfg(); }
  else { saveCfg(); refreshTabs(); }
  listTimer = setInterval(refreshTabs, 6000);
  document.addEventListener("visibilitychange", function(){ if(!document.hidden){ startLoop(); shotNow(); } });
})();
</script>
</body>
