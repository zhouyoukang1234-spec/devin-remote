<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Devin Cloud · 手机版 (网页)</title>
<!-- ─────────────────────────────────────────────────────────────────────────
  道法自然·从根本底层换架构 (v0.37.0): 网页控台不再「截图投屏」, 改为「浏览器原生直渲」。
  本页是一个『网页套网页』的归一外壳: 每个板块(切号/对话/穿透/VPN/脚本/Shizuku/全服通/面板)
  都把 APK 自身的真实页面(同一份 HTML/CSS/JS)经零账号中继取来, 内联依赖 + 注入 remote-native
  垫片(__rn.js), 挂进一张 blob: iframe (继承本页=中继 Worker 同源) → 由浏览器自身渲染、原生交互。
    · 表层: 与手机本体逐件一致的真实页面 (非截图, 矢量清晰, 可选择/复制/滚动/输入)。
    · 底层: 页面里的 window.Native.* 经 blob 子页(与本页=Worker 严格同源, 无 CORS/无预检) 同步打回手机
            /relay/<session> 的 /api/native(读数据) 与 /api/http(手机侧原生 HTTP, 绕 CORS, 带账号
            auth1) → 与手机本体同一套金库账号、同一套方法。数据并行而不相悖, 各端各取所需。
  彻底消除截图投屏的黑屏/卡顿/反向操作慢。Devin 对话页直接在使用者自己的浏览器新标签打开。
─────────────────────────────────────────────────────────────────────────── -->
<style>
  :root{--bg:#0e1116;--fg:#cdd3de;--border:#222730;--bar:#161b22;--input:#0d1117;
        --input-b:#30363d;--btn:#1f6feb;--btn-h:#388bfd;--green:#4ec9b0;--muted:#7d8590;
        --red:#f85149;--amber:#f0883e;--chipbg:#21262d}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
            font:13px/1.4 -apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  #bar{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bar);
       border-bottom:1px solid var(--border);flex:0 0 auto}
  /* 与原生 APK buildChrome 同款: #21262d 芯片按钮, 两行工具栏 */
  #bar button,#bar2 button{background:#21262d;color:var(--fg);border:1px solid var(--input-b);
       border-radius:7px;height:32px;min-width:30px;padding:0 11px;font-size:14px;cursor:pointer;flex:0 0 auto}
  #bar button:active,#bar2 button:active{background:#283041}
  /* 第二行: 缩放滑块 + 收藏/刷新/下载/全服通 (复刻原生 btnRow) */
  #bar2{display:flex;align-items:center;gap:6px;padding:1px 8px 4px;background:var(--bar);
        border-bottom:1px solid var(--border);flex:0 0 auto}
  #bar2 .act{font-size:15px;padding:0 12px}
  #zicon{flex:0 0 auto;font-size:14px;color:#8b949e;cursor:pointer;padding:0 1px;user-select:none}
  #zoom{flex:1 1 auto;min-width:40px;height:26px;accent-color:var(--green);cursor:pointer}
  #zlabel{flex:0 0 auto;min-width:40px;text-align:center;font-size:13px;color:var(--fg)}
  #menuPop .hd{padding:7px 12px 5px;font-size:11px;color:var(--muted)}
  #menuPop .hd b.ok{color:var(--green)} #menuPop .hd b.bad{color:var(--red)}
  /* 下载面板 (复刻原生悬浮下载管理) */
  #dlPanel{position:absolute;top:46px;right:8px;width:min(340px,92vw);max-height:74vh;overflow-y:auto;
           background:#11161e;border:1px solid var(--border);border-radius:12px;padding:10px;display:none;z-index:60;box-shadow:0 14px 40px #000a}
  #dlPanel.show{display:block}
  #dlPanel h4{margin:2px 4px 8px;font-size:13px;display:flex;align-items:center;gap:6px}
  #dlPanel .dlrow{padding:8px 9px;border:1px solid var(--input-b);border-radius:8px;margin-bottom:6px;font-size:12px;word-break:break-all}
  #dlPanel .dlrow .nm{color:var(--green)} #dlPanel .empty{color:var(--muted);font-size:12px;padding:10px 6px;text-align:center}
  #addr{flex:1;min-width:60px;height:32px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);
        border-radius:8px;padding:0 11px;font-size:13px;outline:none}
  #addr:focus{border-color:var(--btn)} #addr::placeholder{color:#6e7681}
  #strip{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#11161e;
         border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;scrollbar-width:thin}
  #strip::-webkit-scrollbar{height:5px}#strip::-webkit-scrollbar-thumb{background:#2a3140;border-radius:3px}
  .chip{display:flex;align-items:center;gap:6px;flex:0 0 auto;max-width:200px;height:30px;padding:0 8px 0 11px;
        background:#1a2030;border:1px solid var(--input-b);border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px}
  .chip.on{background:#13332b;border-color:#1f5f51;color:var(--green)}
  .chip .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .x{width:18px;height:18px;line-height:16px;text-align:center;border-radius:50%;color:#8a93a0;font-size:14px}
  .chip .x:hover{background:#3a2030;color:#f88}
  #plus{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px dashed var(--input-b);
        background:transparent;color:var(--muted);font-size:18px;cursor:pointer}
  /* 📱 手机标签实时镜像条 (与 APK 当前开着的网页 1:1, 数量/标题/账号/橙色在看 同步) */
  #mirror{display:flex;align-items:center;gap:5px;padding:4px 8px;background:#0c1016;
          border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;scrollbar-width:thin;white-space:nowrap}
  #mirror::-webkit-scrollbar{height:5px}#mirror::-webkit-scrollbar-thumb{background:#2a3140;border-radius:3px}
  #mirror.empty{display:none}
  #mirror .mlab{flex:0 0 auto;font-size:11px;color:#7d8590;margin-right:3px}
  .mchip{display:flex;align-items:center;gap:6px;flex:0 0 auto;max-width:210px;height:28px;padding:0 9px;
         background:#161b22;border:1px solid var(--input-b);border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px}
  .mchip.on{border-color:#1f5f51;color:var(--green)}
  /* 道法自然·跨设备在场: 任意用户(手机/网页)当前最前端停留此页 → 橙色半透明标记 (与 APK 标签条 0xFF3A2C1B 同款·双向一致) */
  .mchip.live{background:rgba(255,159,28,.14);border-color:rgba(255,159,28,.55);color:#ffcf8f}
  .mchip.me{background:rgba(255,159,28,.26);border-color:rgba(255,159,28,.9)}
  .mchip .dot{width:7px;height:7px;border-radius:50%;background:#30363d;flex:0 0 auto}
  .mchip.live .dot{background:#ff9f1c;box-shadow:0 0 5px #ff9f1c}
  .mchip .mt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
  .mchip .ma{color:#6e7681;font-size:10px;white-space:nowrap;flex:0 0 auto}
  #mirror .mpeople{flex:0 0 auto;font-size:11px;color:#ff9f1c;font-weight:600;margin-right:5px}
  #frames{position:relative;flex:1 1 auto;background:var(--bg)}
  #frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff}
  #frames iframe.hidden{display:none}
  .load{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:13px;background:var(--bg);color:var(--muted);padding:24px;text-align:center;font-size:13px}
  .load .sp{width:30px;height:30px;border:3px solid #2a3140;border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
  .load b{color:var(--green)} .load .er{color:var(--amber);max-width:380px}
  .load button{background:var(--btn);color:#fff;border:0;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer}
  @keyframes spin{to{transform:rotate(360deg)}}
  #launch{position:absolute;inset:0;background:rgba(8,11,16,.72);display:none;align-items:flex-start;justify-content:center;z-index:50}
  #launch.show{display:flex}
  #launchCard{margin-top:48px;width:min(470px,93vw);background:#11161e;border:1px solid var(--border);
              border-radius:14px;padding:14px;box-shadow:0 18px 50px #000a}
  #launchCard h3{margin:2px 0 12px;font-size:13px;color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .seg{display:flex;align-items:center;gap:9px;background:#1a2030;border:1px solid var(--input-b);
       border-radius:10px;padding:11px 12px;cursor:pointer;color:var(--fg);font-size:13px}
  .seg:hover{border-color:var(--green);background:#13332b}
  .seg .ic{font-size:18px;width:22px;text-align:center}
  #urlRow{display:flex;gap:7px;margin-top:12px}
  #urlInput{flex:1;height:36px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);
            border-radius:8px;padding:0 11px;font-size:13px;outline:none}
  #urlGo{background:var(--btn);color:#fff;border:0;border-radius:8px;padding:0 16px;font-size:14px;cursor:pointer}
  #menuPop{position:absolute;top:46px;left:8px;background:#11161e;border:1px solid var(--border);border-radius:12px;
           padding:6px;display:none;z-index:60;min-width:210px;max-height:78vh;overflow-y:auto;box-shadow:0 14px 40px #000a}
  #menuPop.show{display:block}
  #menuPop .mi{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px}
  #menuPop .mi:hover{background:#1a2030}
  #menuPop .sep{height:1px;background:var(--border);margin:5px 4px}
  #menuPop .ic{width:20px;text-align:center}
  #menuPop .mi .arr{margin-left:auto;color:var(--muted);font-size:11px;transition:transform .15s}
  #menuPop .mi.open .arr{transform:rotate(90deg)}
  #menuPop .subwrap{display:none;margin:2px 0 4px 8px;padding-left:6px;border-left:1px solid var(--border)}
  #menuPop .subwrap.open{display:block}
  #menuPop .mi.apkonly{opacity:.62}
  #histPanel{position:absolute;top:46px;left:8px;width:min(360px,93vw);max-height:76vh;overflow-y:auto;
             background:#11161e;border:1px solid var(--border);border-radius:12px;padding:8px;display:none;z-index:60;box-shadow:0 14px 40px #000a}
  #histPanel.show{display:block}
  #histPanel h4{margin:2px 4px 8px;font-size:13px;display:flex;align-items:center;gap:6px}
  #histPanel h4 .clr{margin-left:auto;font-size:11px;color:var(--muted);cursor:pointer}
  #histPanel .hrow{padding:8px 9px;border:1px solid var(--input-b);border-radius:8px;margin-bottom:6px;font-size:12px;cursor:pointer}
  #histPanel .hrow:hover{border-color:var(--green);background:#13332b}
  #histPanel .hrow .ht{color:var(--fg);word-break:break-all} #histPanel .hrow .hu{color:#6e7681;word-break:break-all;font-size:11px}
  #histPanel .empty{color:var(--muted);font-size:12px;padding:10px 6px;text-align:center}
  #cfg{position:absolute;inset:0;background:rgba(8,11,16,.82);display:none;align-items:center;justify-content:center;z-index:99}
  #cfg.show{display:flex}
  #cfgCard{width:min(420px,93vw);background:#11161e;border:1px solid var(--border);border-radius:14px;padding:16px}
  #cfgCard h3{margin:0 0 10px;font-size:14px} #cfgCard p{color:var(--muted);font-size:12px;margin:0 0 10px}
  #cfgCard label{display:block;font-size:11px;color:var(--muted);margin:10px 0 4px}
  #cfgCard input{width:100%;height:34px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);border-radius:8px;padding:0 11px;font-size:13px;outline:none}
  #cfgCard .row{display:flex;gap:8px;margin-top:14px}
  #cfgCard button{flex:1;height:36px;border-radius:8px;border:1px solid var(--input-b);background:#1c2230;color:var(--fg);cursor:pointer;font-size:13px}
  #cfgCard button.pri{background:var(--btn);border-color:var(--btn);color:#fff}
  #toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:#222;color:#fff;padding:9px 15px;
         border-radius:9px;font-size:13px;z-index:120;opacity:0;transition:.2s;max-width:84%;pointer-events:none}
  #toast.show{opacity:1}
  /* 📥 下载: 可拖拽悬浮窗 (复刻 APK showDownloadPanel 的标题栏拖动) */
  #dlPanel .dlhead{display:flex;align-items:center;gap:6px;margin:-10px -10px 8px;padding:9px 10px;background:#1f6feb;border-radius:12px 12px 0 0;cursor:move;user-select:none}
  #dlPanel .dlhead .t{flex:1;color:#fff;font-size:13px} #dlPanel .dlhead .x{color:#fff;font-size:15px;cursor:pointer;padding:0 4px}
  .dlrow .nm{color:var(--fg)} .dlact{font-size:12px}
  /* 🌊 全服通 · 近期对话/备份: 可拖拽悬浮窗 (复刻 APK daoPanel, 不再是整页标签) */
  #daoFloat{position:absolute;top:6px;right:8px;width:min(340px,92vw);height:min(72vh,560px);background:#0e1116;border:1px solid var(--border);
            border-radius:12px;display:none;flex-direction:column;z-index:70;box-shadow:0 16px 46px #000b;overflow:hidden}
  #daoFloat.show{display:flex}
  #daoFloat .dfhead{display:flex;align-items:center;gap:6px;padding:9px 10px;background:#1f6feb;cursor:move;user-select:none;flex:0 0 auto}
  #daoFloat .dfhead .t{flex:1;color:#fff;font-size:13px} #daoFloat .dfhead .x{color:#fff;font-size:16px;cursor:pointer;padding:0 4px}
  #daoFloat .dfbody{flex:1;position:relative;background:#0e1116}
  #daoFloat iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#0e1116}
  #daoFloat .dfload{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
  /* 🕐 浏览历史 / ⭐ 书签收藏: 独立整页 (复刻 APK openBrowserListTab, 不再是小浮层) */
  #listPage{position:absolute;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:55}
  #listPage.show{display:flex}
  #listPage .lphead{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bar);border-bottom:1px solid var(--border);flex:0 0 auto}
  #listPage .lphead .t{flex:1;color:#9cdcfe;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #listPage .lphead .btn{background:#161b22;color:var(--fg);border:1px solid var(--input-b);border-radius:6px;padding:6px 11px;font-size:12px;cursor:pointer}
  #listPage .lpbody{flex:1;overflow-y:auto;padding:8px 12px 40px}
  #listPage .sec{color:#7ee787;font-size:13px;font-weight:600;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
  #listPage .sec.b{color:#9cdcfe}
  #listPage .it{display:flex;align-items:center;border-bottom:1px solid var(--border)}
  #listPage .it.dv{border-left:3px solid #2ea043}
  #listPage .it .row{flex:1;min-width:0;padding:9px 8px;cursor:pointer}
  #listPage .it .row:active{background:#1f3a45}
  #listPage .it .t2{color:#e6edf3;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #listPage .it .u{color:#8b949e;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #listPage .more{padding:10px 12px;color:#8b949e;font-size:18px;cursor:pointer;user-select:none}#listPage .more:active{color:#fff}
  #listPage .empty{color:#6e7681;padding:10px 4px;font-size:12px}
  #lpSheet{position:absolute;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;z-index:80}
  #lpSheet.show{display:flex}
  #lpSheet .sheet{background:#161b22;width:100%;border-radius:14px 14px 0 0;padding:4px 0 14px;box-shadow:0 -4px 20px #0008}
  #lpSheet .sh-u{color:#8b949e;font-size:12px;padding:12px 16px 10px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #lpSheet .sh-b{padding:14px 16px;color:#e6edf3;font-size:15px;cursor:pointer}#lpSheet .sh-b:active{background:#1f6feb33}#lpSheet .sh-b.del{color:#ff7b72}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <button id="menuBtn" title="菜单">&#9776;</button>
    <input id="addr" inputmode="url" autocomplete="off" spellcheck="false" placeholder="输入网址 / 搜索">
    <button id="trBtn" title="翻译整页">译</button>
    <button id="go" title="前往">&#8594;</button>
  </div>
  <div id="bar2">
    <span id="zicon" title="点按复位 100%">&#128269;</span>
    <input id="zoom" type="range" min="50" max="170" value="100" title="整页缩放">
    <span id="zlabel">100%</span>
    <button id="starBtn" class="act" title="收藏本页">&#9734;</button>
    <button id="reload" class="act" title="重载">&#8635;</button>
    <button id="dlBtn" class="act" title="下载管理">&#128229;</button>
    <button id="daoBtn" class="act" title="全服通">&#128450;</button>
  </div>
  <div id="strip"><button id="plus" title="新标签">+</button></div>
  <div id="mirror" class="empty"></div>
  <div id="frames">
    <div id="menuPop"></div>
    <div id="histPanel"><h4>&#128340; 浏览历史<span class="clr" id="histClr">清空</span></h4><div id="histList"></div></div>
    <div id="dlPanel"><div class="dlhead"><span class="t">&#128229; 下载管理</span><span class="x" id="dlClose">&#10005;</span></div><div id="dlList"></div></div>
    <div id="daoFloat"><div class="dfhead"><span class="t">&#127754; 全服通 · 近期对话 / 备份</span><span class="x" id="daoClose">&#10005;</span></div><div class="dfbody"><div class="dfload">正在加载…</div></div></div>
    <div id="listPage"><div class="lphead"><span class="t" id="lpTitle">浏览历史</span><button class="btn" id="lpClear">清空</button><button class="btn" id="lpClose">关闭</button></div><div class="lpbody" id="lpBody"></div><div id="lpSheet"><div class="sheet" id="lpSheetInner"></div></div></div>
    <div id="launch"><div id="launchCard">
      <h3>新标签 — 选择板块, 或打开任意网址 / Devin 对话</h3>
      <div class="grid" id="segGrid"></div>
      <div id="urlRow"><input id="urlInput" inputmode="url" placeholder="https:// 任意网址"><button id="urlGo">打开</button></div>
    </div></div>
  </div>
</div>
<div id="cfg"><div id="cfgCard">
  <h3>接入设置</h3>
  <p>填入零账号中继的 Session 与 Token (复制接入链接里的同名参数)。Endpoint 留空即用本站。</p>
  <label>Session</label><input id="cfgSession" placeholder="rtflow-xxxxxxxx">
  <label>Token</label><input id="cfgToken" placeholder="xxxxxxxxxxxxxxxx">
  <label>Endpoint (可选)</label><input id="cfgEndpoint" placeholder="https://dao-relay-do.xxx.workers.dev">
  <div class="row"><button id="cfgCancel">取消</button><button id="cfgSave" class="pri">保存并连接</button></div>
</div></div>
<div id="toast"></div>
<!-- remote-native 垫片(__rn.js)内联于此: 由 tools/inline-rn.js 从 engine/__rn.js 自动生成, 切勿手改。
     内联的意义: 本控台经中继 Worker 取自 GitHub main(见 worker.js /console), 故 __rn.js 随控台一并下发,
     用户无需安装新 APK 即可拿到最新垫片(旧版投屏故事的痛点正是"装不上更新")。未内联时回退取手机 APK 内副本。 -->
<script type="text/plain" id="__rnsrc">
/* ─────────────────────────────────────────────────────────────────────────
 * remote-native (rn) shim — 让 APK 自身的真实页面 (switch/tunnel/cloud/vpn/…)
 * 原样跑在任意浏览器里。页面零改动: 它们调用的 window.Native.* 在这里被替换为
 *   · 数据/配置 读写  → 同步打回手机 LocalServer /relay/<session> 的 /api/native
 *   · 网络请求         → 异步打回手机 /api/http (手机侧执行, 绕 CORS, 用账号 auth1)
 *   · 输出到"人"的动作 (复制/下载/看文本) → 直接落到使用者自己的浏览器/设备 (更合理)
 * 于是浏览器里的页面"表层(同一份 HTML/CSS/JS) + 底层(同一套手机方法)"与 APK 完全一致。
 * ───────────────────────────────────────────────────────────────────────── */
(function () {
  if (window.__rnReady) return; window.__rnReady = true;
  function qp(k) { try { return new URLSearchParams(location.search).get(k) || ""; } catch (e) { return ""; } }
  function ls(k) { try { return localStorage.getItem(k) || ""; } catch (e) { return ""; } }

  makeDraggable(daoFloat, daoFloat.querySelector(".dfhead"));

  // ── 🕐 浏览历史 / ⭐ 书签收藏: 独立整页 (复刻 APK openBrowserListTab; 数据取手机金库) ──
  //   两段: ⚡多实例 Devin (带账号·重开注入鉴权) + 🌐常规网页; 逐条 ⋮ → 打开/复制/分享/删除; 历史可清空。
  var listPage=document.getElementById("listPage"), lpBody=document.getElementById("lpBody"),
      lpTitle=document.getElementById("lpTitle"), lpSheet=document.getElementById("lpSheet"), lpSheetInner=document.getElementById("lpSheetInner");
  var _lpMode="hist", _lpData=[], _lpSheetIdx=-1;
  function openListPage(mode){
    _lpMode=mode; lpTitle.textContent = mode==="bm" ? "⭐ 书签收藏" : "🕐 浏览历史";
    document.getElementById("lpClear").style.display = mode==="bm" ? "none" : "";
    menuPop.classList.remove("show"); dlPanel.classList.remove("show"); daoFloat.classList.remove("show");
    listPage.classList.add("show"); lpSheet.classList.remove("show");
    lpBody.innerHTML='<div class="empty">加载中…</div>';
    if(mode==="bm"){
      vaultGetAsync("bookmarks").then(function(raw){ var arr=_parseArr(raw), dv=[], nm=[];
        for(var i=arr.length-1;i>=0;i--){ var e=arr[i]||{}; ((e.devin&&e.account)?dv:nm).push(e); }
        renderListPage([{h:"⚡ 多实例 Devin 收藏", items:dv, empty:"暂无多实例收藏", dv:true},
                        {h:"🌐 网页 / 板块收藏", items:nm, empty:"暂无书签 — 点地址栏 ☆ 收藏本页", dv:false}]); });
    } else {
      Promise.all([vaultGetAsync("history_devin"), vaultGetAsync("history")]).then(function(r){
        var dvA=_parseArr(r[0]), nmA=_parseArr(r[1]), dv=[], nm=[];
        for(var i=dvA.length-1;i>=0;i--) dv.push(dvA[i]); for(var j=nmA.length-1;j>=0;j--) nm.push(nmA[j]);
        renderListPage([{h:"⚡ 多实例 Devin 登录历史", items:dv, empty:"暂无多实例登录记录", dv:true},
                        {h:"🌐 常规网页浏览历史", items:nm, empty:"暂无常规浏览历史", dv:false}]); });
    }
  }
  function renderListPage(sections){
    _lpData=[]; var html="";
    sections.forEach(function(sec){
      html+='<div class="sec'+(sec.dv?"":" b")+'">'+_esc(sec.h)+'</div>';
      if(!sec.items.length){ html+='<div class="empty">'+_esc(sec.empty)+'</div>'; return; }
      sec.items.forEach(function(e){ if(!e||!e.url) return; var idx=_lpData.length;
        _lpData.push({ url:e.url, title:e.title||"", account:e.account||"", devin:!!(e.devin&&e.account) });
        var al=e.account?_acctLabel(e.account):""; var tt=e.title||e.url;
        html+='<div class="it'+(sec.dv?" dv":"")+'"><div class="row" data-i="'+idx+'">'
            +'<div class="t2">'+_esc(tt)+(al?(' · '+_esc(al)):'')+'</div>'
            +'<div class="u">'+_esc(e.url)+'</div></div>'
            +'<div class="more" data-i="'+idx+'">\u22EE</div></div>';
      });
    });
    lpBody.innerHTML = html || '<div class="empty">暂无记录</div>';
  }
  function _lpOpen(e){ if(!e||!e.url) return;
    if(/^rtflow:\/\//i.test(e.url)){ openPage(e.url.replace(/^rtflow:\/\//i,"").trim()); return; }
    openInPage(e.url, e.devin?_acctLabel(e.account):"", e.title);
  }
  function lpSheetOpen(i){ var e=_lpData[i]; if(!e) return; _lpSheetIdx=i;
    lpSheetInner.innerHTML='<div class="sh-u">'+_esc(e.title||e.url)+'</div>'
      +'<div class="sh-b" data-a="open">在新标签打开</div>'
      +'<div class="sh-b" data-a="copy">复制链接</div>'
      +'<div class="sh-b" data-a="share">分享</div>'
      +'<div class="sh-b del" data-a="del">删除</div>';
    lpSheet.classList.add("show");
  }
  function _lpDelete(e){ var key = _lpMode==="bm" ? "bookmarks" : (e.devin?"history_devin":"history");
    vaultGetAsync(key).then(function(raw){ var arr=_parseArr(raw).filter(function(h){ return h && h.url!==e.url; });
      vaultSetAsync(key, arr).then(function(){ openListPage(_lpMode); toast("已删除"); }); });
  }
  lpBody.addEventListener("click", function(ev){
    var more=ev.target.closest&&ev.target.closest(".more"); if(more){ lpSheetOpen(+more.getAttribute("data-i")); return; }
    var row=ev.target.closest&&ev.target.closest(".row"); if(row){ var e=_lpData[+row.getAttribute("data-i")]; if(e){ listPage.classList.remove("show"); _lpOpen(e); } }
  });
  lpSheet.addEventListener("click", function(ev){
    if(ev.target===lpSheet){ lpSheet.classList.remove("show"); return; }
    var b=ev.target.closest&&ev.target.closest(".sh-b"); if(!b) return;
    var a=b.getAttribute("data-a"), e=_lpData[_lpSheetIdx]; lpSheet.classList.remove("show"); if(!e) return;
    if(a==="open"){ listPage.classList.remove("show"); _lpOpen(e); }
    else if(a==="copy"){ try{ navigator.clipboard.writeText(e.url); toast("已复制链接"); }catch(x){ toast(e.url); } }
    else if(a==="share"){ if(navigator.share){ navigator.share({ url:e.url }).catch(function(){}); } else { try{ navigator.clipboard.writeText(e.url); toast("已复制"); }catch(x){} } }
    else if(a==="del"){ _lpDelete(e); }
  });
  document.getElementById("lpClose").onclick=function(){ listPage.classList.remove("show"); };
  document.getElementById("lpClear").onclick=function(){ if(!confirm("清空全部浏览历史？")) return;
    Promise.all([vaultSetAsync("history_devin",[]), vaultSetAsync("history",[])]).then(function(){ openListPage("hist"); toast("历史已清空"); }); };

  // ── 地址栏 ──
  function goAddr(){ var v=addr.value.trim(); if(!v) return;
    if(/^rtflow:\/\//i.test(v)){ openPage(v.replace(/^rtflow:\/\//i,"").trim()); return; } openWeb(v); }
  document.getElementById("go").onclick=goAddr;
  addr.addEventListener("keydown",function(e){ if(e.key==="Enter") goAddr(); });
  // 刷新按钮: 除重载当前页外, 同时通知所有已开板块子页立刻刷新账号各项数据(美金额度 + 对话追踪 + 重渲),
  //   不只刷当前停留页 → 「刷新页面 = 顺带刷新账号的额度及相关各项数据」。
  function rtRefreshAccounts(){
    var hit=0;
    for(var i=0;i<tabs.length;i++){ var t=tabs[i];
      if(t && t.pageKey && t.fr){ try{ (t.fr.contentWindow||{}).postMessage&&t.fr.contentWindow.postMessage({__rtflow:"rtRefresh"},"*"); hit++; }catch(e){} } }
    if(hit) toast("正在刷新账号额度与数据…");
  }
  document.getElementById("reload").onclick=function(){ rtRefreshAccounts(); var t=tabs[active]; if(!t) return;
    if(t.kind==="web"){ var s=t.fr.src; t.fr.src="about:blank"; setTimeout(function(){ t.fr.src=s; },60); return; }
    // 板块手动重载 = 强制取最新代码: 清掉内存与持久缓存, 再原生重渲 (避免「重载仍是旧板」的疑虑)。
    if(t.pageKey){ var k=t.pageKey; ASSETS=Object.create(null); cacheClearAll(); closeTab(t.id); openPage(k); } };

  // ── 新标签面板 ──
  var launch=document.getElementById("launch"), segGrid=document.getElementById("segGrid");
  PAGES.forEach(function(p){ var s=document.createElement("div"); s.className="seg";
    s.innerHTML='<span class="ic">'+p.ic+'</span><span>'+p.label+'</span>';
    s.onclick=function(){ hideLaunch(); openPage(p.key); }; segGrid.appendChild(s); });
  (function(){ var s=document.createElement("div"); s.className="seg";
    s.innerHTML='<span class="ic">🟢</span><span>新标签 (Devin 对话)</span>';
    s.onclick=function(){ hideLaunch(); openInPage("https://app.devin.ai/", "", "Devin"); }; segGrid.appendChild(s); })();
  function showLaunch(){ launch.classList.add("show"); var u=document.getElementById("urlInput"); u.value=""; setTimeout(function(){u.focus();},50); }
  function hideLaunch(){ launch.classList.remove("show"); }
  plus.onclick=showLaunch;
  launch.onclick=function(e){ if(e.target===launch) hideLaunch(); };
  document.getElementById("urlGo").onclick=function(){ var v=document.getElementById("urlInput").value.trim(); if(v){ hideLaunch(); openWeb(v); } };
  document.getElementById("urlInput").addEventListener("keydown",function(e){ if(e.key==="Enter"){ var v=this.value.trim(); if(v){ hideLaunch(); openWeb(v); } } });

  // ── 菜单 ──
  var menuPop=document.getElementById("menuPop");
  // mi: 普通项 (点后收起菜单)。opts.cls 加类; opts.parent 落到子菜单容器而非顶层。
  function mi(ic,label,fn,opts){ opts=opts||{}; var d=document.createElement("div"); d.className="mi"+(opts.cls?(" "+opts.cls):"");
    d.innerHTML='<span class="ic">'+ic+'</span><span>'+label+'</span>';
    d.onclick=function(e){ e.stopPropagation(); menuPop.classList.remove("show"); fn(); };
    (opts.parent||menuPop).appendChild(d); return d; }
  function sep(parent){ var s=document.createElement("div"); s.className="sep"; (parent||menuPop).appendChild(s); }
  // miSub: 折叠子菜单 (点表头展开/收起, 不关菜单), builder(sub) 往 sub 容器加 mi。复刻原生 ▸ 子菜单。
  function miSub(ic,label,builder){
    var h=document.createElement("div"); h.className="mi";
    h.innerHTML='<span class="ic">'+ic+'</span><span>'+label+'</span><span class="arr">▸</span>';
    var wrap=document.createElement("div"); wrap.className="subwrap";
    h.onclick=function(e){ e.stopPropagation(); var op=wrap.classList.toggle("open"); h.classList.toggle("open",op); };
    menuPop.appendChild(h); menuPop.appendChild(wrap); builder(wrap);
  }
  function buildMenu(){
    menuPop.innerHTML="";
    var hd=document.createElement("div"); hd.className="hd"; hd.id="__connhd";
    hd.innerHTML="中继: "+(_connOk==null?"检测中…":(_connOk?'<b class="ok">已连通</b>':'<b class="bad">未连通 (检查穿透/Token 或开 VPN)</b>'));
    menuPop.appendChild(hd); sep();
    // ── 与原生 APK ☰ 菜单同序同项 (MainActivity.showMenu) ──
    mi("🔁","切号面板",        function(){ openPage("switch"); });
    mi("☁","对话 / Cloud",     function(){ openPage("cloud"); });
    mi("🌐","公网穿透",        function(){ openPage("tunnel"); });
    mi("🚀","VPN 加速",        function(){ openPage("vpn"); });
    mi("🟢","新标签 (Devin)",  function(){ openInPage("https://app.devin.ai/", "", "Devin"); });
    mi("🕶","无痕标签",        function(){ openInPage("https://app.devin.ai/", "", "Devin (无痕)", {incognito:true}); toast("无痕标签 (不记浏览历史)"); });
    mi("🕐","浏览历史",        function(){ openListPage("hist"); });
    mi("⭐","书签收藏",        function(){ openListPage("bm"); });
    mi("🐵","用户脚本 (油猴)", function(){ openPage("scripts"); });
    mi("🔑","Shizuku 权限 (自我 ADB)", function(){ openPage("shizuku"); });
    miSub("🧰","页面工具", function(sub){
      mi("◀","后退",            function(){ tabNav(-1); }, {parent:sub});
      mi("▶","前进",            function(){ tabNav(1); },  {parent:sub});
      mi("⌂","主页 (切号面板)", function(){ openPage("switch"); }, {parent:sub});
      mi("🔍","页内查找",        function(){ tabFind(); },   {parent:sub});
      mi("🖥","桌面版网站",      function(){ tabDesktop(); }, {parent:sub});
      mi("📖","阅读模式",        function(){ tabReader(); },  {parent:sub});
      mi("🌙","夜间模式",        function(){ tabNight(); },   {parent:sub});
      mi("🐵","脚本菜单 (油猴)", function(){ openPage("scripts"); }, {parent:sub});
      mi("📦","导出整机分享包",  function(){ toast("整机分享包为 APK 专属 (含 APK 本体+数据)。网页端用「复制接入链接」分享访问"); }, {parent:sub, cls:"apkonly"});
      mi("📥","导入分享包",      function(){ toast("导入分享包为 APK 专属。网页端经接入链接 (session/token) 即同步金库数据"); }, {parent:sub, cls:"apkonly"});
    });
    miSub("🔗","分享 / 快捷", function(sub){
      mi("📤","分享本页",  function(){ shareCurrent(); },  {parent:sub});
      mi("🔗","复制网址",  function(){ copyCurrentUrl(); }, {parent:sub});
      mi("➕","添加到主屏", function(){ toast("「添加到主屏」为 APK/系统能力; 网页端请用浏览器自带「添加到主屏幕」"); }, {parent:sub, cls:"apkonly"});
    });
    mi("📌","后台常驻 · 保活", function(){ toast("后台常驻·保活为 APK 专属 (防系统杀进程致整页重载)。网页端由浏览器标签托管, 切后台不被杀"); }, {cls:"apkonly"});
    mi("⟳","检查更新 · 网页端", function(){ toast("网页端始终为最新 (随中继下发 GitHub main); 正在硬刷新…"); setTimeout(function(){ location.reload(); }, 600); });
    sep();
    mi("📋","复制接入链接", function(){ var u=location.origin+"/console?session="+encodeURIComponent(SESSION)+"&token="+encodeURIComponent(TOKEN);
      try{ navigator.clipboard.writeText(u); toast("已复制接入链接"); }catch(e){ toast(u); } });
    mi("⚙","接入设置 (Session/Token)", function(){ showCfg(); });
  }
  document.getElementById("menuBtn").onclick=function(e){ e.stopPropagation();
    if(!menuPop.dataset.built){ buildMenu(); menuPop.dataset.built="1"; }
    dlPanel.classList.remove("show"); histPanel.classList.remove("show");
    menuPop.classList.toggle("show"); };
  document.addEventListener("click", function(){ menuPop.classList.remove("show"); dlPanel.classList.remove("show"); histPanel.classList.remove("show"); });
  // 点进 iframe 内容(板块/网页)时, 点击落在子文档里 → 父文档的 document click 收不到, 旧逻辑下浮层不收
  // (要再点一次外壳才关 = 「菜单/下载要点两次」)。改为窗口失焦且焦点进入某 iframe 时即收起, 一次点击即关。
  window.addEventListener("blur", function(){
    if(document.activeElement && document.activeElement.tagName==="IFRAME"){
      menuPop.classList.remove("show"); dlPanel.classList.remove("show"); histPanel.classList.remove("show");
    }
  });

  // ── 接入设置浮层 ──
  var cfg=document.getElementById("cfg");
  function showCfg(){ document.getElementById("cfgSession").value=SESSION;
    document.getElementById("cfgToken").value=TOKEN; document.getElementById("cfgEndpoint").value=ENDPOINT; cfg.classList.add("show"); }
  function hideCfg(){ cfg.classList.remove("show"); }
  document.getElementById("cfgCancel").onclick=hideCfg;
  document.getElementById("cfgSave").onclick=function(){
    SESSION=document.getElementById("cfgSession").value.trim();
    TOKEN=document.getElementById("cfgToken").value.trim();
    var ep=document.getElementById("cfgEndpoint").value.trim(); ENDPOINT=(ep||location.origin).replace(/\/+$/,"");
    persist(); hideCfg(); ASSETS=Object.create(null);
    // 重开当前板块
    var cur=tabs[active]&&tabs[active].pageKey; tabs.slice().forEach(function(t){ closeTab(t.id); });
    openPage(cur||"switch"); ping();
  };

  // ── 连接状态 (折入 ≡ 菜单顶, 顶栏与原生 buildChrome 逐件一致) ──
  var _connOk=null;
  function setStatus(ok){ _connOk=ok; var h=document.getElementById("__connhd");
    if(h) h.innerHTML="中继: "+(ok?'<b class="ok">已连通</b>':'<b class="bad">未连通 (检查穿透/Token 或开 VPN)</b>'); }
  function ping(){ relay("/api/health",{},12000).then(function(r){ setStatus(r.status===200 && r.body && r.body.status==="ok"); })
    .catch(function(){ setStatus(false); }); }

  function toast(msg){ var el=document.getElementById("toast"); el.textContent=String(msg==null?"":msg);
    el.classList.add("show"); clearTimeout(el._t); el._t=setTimeout(function(){ el.classList.remove("show"); }, 2200); }

  // ── 启动 ──
  if(!SESSION || !TOKEN){ showCfg(); }
  else { openPage("switch"); }
  ping(); setInterval(ping, 9000);
  // 首屏 switch 画完后, 空闲预热其余板块 → 切板秒开。
  if(SESSION && TOKEN){ (window.requestIdleCallback||function(f){setTimeout(f,2000);})(prefetchBoards); }
})();
</script>
</body>
</html>
