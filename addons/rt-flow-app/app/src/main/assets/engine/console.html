<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Devin Cloud · 手机版 (网页)</title>
<style>
  /* 道法自然·页面归一: 外壳与 app.html 逐令牌一致 —— 任意公网浏览器打开本页, 视觉/标签条/菜单
     与手机 APK 那张 app.html 完全相同, 不再「另起炉灶」。内容区因板块绑定原生 N 桥(只能跑在手机里),
     故以「实时镜像 + 反向点按」忠实呈现手机当前标签 —— 这就是同一张手机页, 只是经中继投到本端。 */
  :root{--bg:#0e1116;--fg:#cdd3de;--border:#222730;--bar:#161b22;--input:#161b22;
        --input-b:#30363d;--btn:#1f6feb;--btn-h:#388bfd;--green:#4ec9b0;--muted:#7d8590;
        --red:#f85149;--amber:#f0883e}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
            font:13px/1.4 -apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100%}
  /* ── 工具栏 (同 app.html) ── */
  #bar{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bar);
       border-bottom:1px solid var(--border);flex:0 0 auto}
  #bar button{background:#1c2230;color:var(--fg);border:1px solid var(--input-b);
       border-radius:7px;height:32px;min-width:34px;padding:0 9px;font-size:14px;cursor:pointer}
  #bar button:active{background:#283041}
  #dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:var(--amber)}
  #dot.on{background:var(--green)} #dot.off{background:var(--red)}
  #addr{flex:1;min-width:60px;height:32px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);
        border-radius:8px;padding:0 11px;font-size:13px;outline:none}
  #addr:focus{border-color:var(--btn)}
  #fpsSel{height:32px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);border-radius:7px;font-size:12px}
  /* ── 标签条 (同 app.html) ── */
  #strip{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#11161e;
         border-bottom:1px solid var(--border);overflow-x:auto;flex:0 0 auto;scrollbar-width:thin}
  #strip::-webkit-scrollbar{height:5px}#strip::-webkit-scrollbar-thumb{background:#2a3140;border-radius:3px}
  .chip{display:flex;align-items:center;gap:6px;flex:0 0 auto;max-width:210px;height:30px;padding:0 8px 0 11px;
        background:#1a2030;border:1px solid var(--input-b);border-radius:8px;cursor:pointer;color:var(--muted);font-size:12px}
  .chip.on{background:#13332b;border-color:#1f5f51;color:var(--green)}
  /* 道法自然·跨设备在场: 有其他设备(含手机本体)正看/控此标签 → 橙色半透明, 与 APK 标签条同款双向一致 */
  .chip.shared{background:rgba(240,136,62,.18);border-color:rgba(240,136,62,.55);color:#ffcaa0}
  .chip.on.shared{background:rgba(240,136,62,.26);border-color:rgba(240,136,62,.7)}
  .chip .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .co{flex:0 0 auto;font-size:10px;color:#ffcaa0}
  .chip .x{width:18px;height:18px;line-height:16px;text-align:center;border-radius:50%;color:#8a93a0;font-size:14px}
  .chip .x:hover{background:#3a2030;color:#f88}
  #plus{flex:0 0 auto;width:30px;height:30px;border-radius:8px;border:1px dashed var(--input-b);
        background:transparent;color:var(--muted);font-size:18px;cursor:pointer}
  /* ── 内容区: 实时镜像投屏 (因板块绑原生桥, 远端以镜像忠实呈现同一张手机页) ── */
  #frames{position:relative;flex:1 1 auto;background:#06080c;overflow:hidden;display:flex;align-items:center;justify-content:center}
  #frame{max-width:100%;max-height:100%;object-fit:contain;cursor:crosshair;
         box-shadow:0 0 0 1px #000,0 8px 40px #000a;background:#fff;-webkit-user-select:none;user-select:none}
  #frame.empty{display:none}
  #hint{position:absolute;color:var(--muted);font-size:13px;text-align:center;padding:24px;pointer-events:none}
  #kbd{position:absolute;left:0;width:1px;height:1px;opacity:0;pointer-events:none}
  #status{position:absolute;left:10px;bottom:8px;font-size:11px;color:var(--muted);background:#0e1116cc;
          padding:3px 8px;border-radius:6px;pointer-events:none;max-width:70%}
  #health{position:absolute;left:50%;top:10px;transform:translateX(-50%);display:none;font-size:12px;color:#ffd7b0;
          background:#3a1d10ee;border:1px solid #7a3b1e;padding:5px 12px;border-radius:8px;z-index:60;max-width:88%;text-align:center;pointer-events:none}
  #health.show{display:block}
  #toast{position:absolute;right:10px;bottom:8px;font-size:11px;color:var(--fg);background:#1a2030;
         border:1px solid var(--input-b);padding:5px 10px;border-radius:7px;opacity:0;transition:opacity .2s;max-width:60%}
  #toast.show{opacity:1}
  /* ── 新标签/板块选择面板 (同 app.html) ── */
  #launch{position:absolute;inset:0;background:rgba(8,11,16,.72);display:none;align-items:flex-start;justify-content:center;z-index:50}
  #launch.show{display:flex}
  #launchCard{margin-top:54px;width:min(460px,92vw);background:#11161e;border:1px solid var(--border);
              border-radius:14px;padding:14px;box-shadow:0 18px 50px #000a}
  #launchCard h3{margin:2px 0 12px;font-size:13px;color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .seg{display:flex;align-items:center;gap:9px;background:#1a2030;border:1px solid var(--input-b);
       border-radius:10px;padding:11px 12px;cursor:pointer;color:var(--fg);font-size:13px}
  .seg:hover{border-color:var(--green);background:#13332b}
  .seg .ic{font-size:18px;width:22px;text-align:center}
  /* ── 菜单下拉 (同 app.html) ── */
  #menuPop{position:absolute;top:46px;left:8px;background:#11161e;border:1px solid var(--border);border-radius:12px;
           padding:6px;display:none;z-index:60;min-width:210px;box-shadow:0 14px 40px #000a}
  #menuPop.show{display:block}
  #menuPop .mi{padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:9px}
  #menuPop .mi:hover{background:#1a2030}
  #menuPop .sep{height:1px;background:var(--border);margin:5px 4px}
  #menuPop .ic{width:20px;text-align:center}
  /* ── 设置浮层 ── */
  #cfg{position:absolute;inset:0;background:rgba(8,11,16,.78);display:none;align-items:center;justify-content:center;z-index:80}
  #cfg.show{display:flex}
  #cfgCard{width:min(420px,92vw);background:#11161e;border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 18px 50px #000a}
  #cfgCard h3{margin:0 0 12px;font-size:14px}
  #cfgCard label{display:block;font-size:11px;color:var(--muted);margin:10px 0 4px}
  #cfgCard input{width:100%;height:34px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);border-radius:8px;padding:0 11px;font-size:13px;outline:none}
  #cfgCard .row{display:flex;gap:8px;margin-top:14px}
  #cfgCard button{flex:1;height:36px;border-radius:8px;border:1px solid var(--input-b);background:#1c2230;color:var(--fg);cursor:pointer;font-size:13px}
  #cfgCard button.pri{background:var(--btn);border-color:var(--btn);color:#fff}
  #pick{position:absolute;inset:0;background:rgba(8,11,16,.72);display:none;align-items:flex-start;justify-content:center;z-index:70}
  #pick.show{display:flex}
  #pickCard{margin-top:60px;width:min(440px,92vw);max-height:70%;overflow-y:auto;background:#11161e;border:1px solid var(--border);border-radius:14px;padding:14px}
  #pickCard h3{margin:2px 0 12px;font-size:13px;color:var(--muted)}
  .pr{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;background:#1a2030;border:1px solid var(--input-b);margin:5px 0;cursor:pointer;font-size:13px}
  .pr:hover{border-color:var(--green);background:#13332b}
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <button id="menuBtn" title="菜单">&#9776;</button>
    <span id="dot" title="连接状态"></span>
    <input id="addr" inputmode="url" autocomplete="off" spellcheck="false" placeholder="输入网址 / 板块 (切号·穿透·对话…)">
    <button id="reloadBtn" title="重载该标签">&#8635;</button>
    <button id="go" title="前往">&#8594;</button>
    <select id="fpsSel" title="刷新频率">
      <option value="0">手动</option>
      <option value="1500">~0.7 fps</option>
      <option value="700" selected>~1.4 fps</option>
      <option value="400">~2.5 fps</option>
      <option value="250">~4 fps</option>
    </select>
    <button id="shotBtn" title="立即刷新">&#10227;</button>
    <button id="backBtn" title="后退" style="display:none">◀</button>
    <button id="fwdBtn" title="前进" style="display:none">▶</button>
    <button id="cfgBtn" title="设置">&#9881;</button>
  </div>
  <div id="strip"><button id="plus" title="新标签">+</button></div>
  <div id="frames">
    <div id="menuPop"></div>
    <img id="frame" class="empty" alt="">
    <div id="hint">选择上方一个标签开始 · 任意公网浏览器与手机 APK 同款操作</div>
    <textarea id="kbd"></textarea>
    <div id="status"></div>
    <div id="health"></div>
    <div id="toast"></div>
    <div id="launch"><div id="launchCard">
      <h3>新标签 — 选择板块, 或输入任意网址 (各大浏览器多实例)</h3>
      <div class="grid" id="segGrid"></div>
      <div id="urlRow" style="display:flex;gap:7px;margin-top:12px">
        <input id="urlInput" inputmode="url" placeholder="https:// 任意网址"
               style="flex:1;height:36px;background:var(--input);color:var(--fg);border:1px solid var(--input-b);border-radius:8px;padding:0 11px;font-size:13px;outline:none">
        <button id="urlGo" style="background:var(--btn);color:#fff;border:0;border-radius:8px;padding:0 16px;font-size:14px;cursor:pointer">打开</button>
      </div>
    </div></div>
    <div id="cfg"><div id="cfgCard">
      <h3>连接设置</h3>
      <label>中继入口 Endpoint</label><input id="cEndpoint" placeholder="https://...workers.dev">
      <label>Session</label><input id="cSession" placeholder="rtflow-...">
      <label>Token</label><input id="cToken" placeholder="...">
      <div class="row"><button id="cCancel">取消</button><button class="pri" id="cSave">保存并连接</button></div>
    </div></div>
    <div id="pick"><div id="pickCard"><h3>新建 / 打开</h3><div id="pickList"></div></div></div>
  </div>
</div>
<script>
(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }
  function qp(k){ try{ return new URLSearchParams(location.search).get(k)||""; }catch(e){ return ""; } }

  // ── 配置: session/token/endpoint (query > localStorage > 同源) ──
  var cfg = {
    session:  qp("session") || localStorage.getItem("rtflow.con.session") || "",
    token:    qp("token") || qp("t") || localStorage.getItem("rtflow.con.token") || "",
    endpoint:(qp("endpoint") || localStorage.getItem("rtflow.con.endpoint") || location.origin).replace(/\/+$/,"")
  };
  function saveCfg(){ localStorage.setItem("rtflow.con.session",cfg.session);
    localStorage.setItem("rtflow.con.token",cfg.token); localStorage.setItem("rtflow.con.endpoint",cfg.endpoint); }

  // ── 本设备标识 (一个浏览器页 = 一台联控设备; sessionStorage → 每页独立) ──
  var CLIENT_ID = sessionStorage.getItem("rtflow.con.cid");
  if(!CLIENT_ID){ CLIENT_ID = "c_"+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); sessionStorage.setItem("rtflow.con.cid",CLIENT_ID); }

  // ── RPC 传输: POST <endpoint>/relay/<session> {path:/api/rpc, body:{cmd,...}} ──
  var rateUntil = 0;
  async function rpc(cmd, args, timeoutMs){
    if(!cfg.session || !cfg.token){ throw new Error("未配置 session/token"); }
    if(Date.now() < rateUntil) await new Promise(function(r){ setTimeout(r, rateUntil-Date.now()); });
    var body = Object.assign({cmd:cmd}, args||{});
    var ctrl = new AbortController(); var to = setTimeout(function(){ try{ctrl.abort();}catch(e){} }, timeoutMs||20000);
    var r;
    try{
      r = await fetch(cfg.endpoint+"/relay/"+encodeURIComponent(cfg.session), {
        method:"POST", signal:ctrl.signal,
        headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+cfg.token },
        body: JSON.stringify({ path:"/api/rpc", method:"POST", body: body })
      });
    } finally { clearTimeout(to); }
    if(r.status===429){ rateUntil = Date.now()+2000; throw new Error("rate_limited"); }
    var t = await r.text(); var j;
    try{ j = JSON.parse(t); }catch(e){ throw new Error("bad_json: "+t.slice(0,80)); }
    return j;
  }
  async function cdp(tabIndex, method, params){
    var j = await rpc("cdp", {tabIndex:tabIndex, method:method, params:params||{}});
    if(j && j.ok===false) throw new Error(j.error||"cdp_err");
    return j && j.result;
  }

  // ── 状态 ──
  var tabsArr = [];        // browseListTabs 结果
  var activeIdx = -1;      // 当前投屏的 tab index
  var view = { cssW:384, cssH:602 };  // 当前 tab 的 CSS 视口 (反向坐标映射)
  var pollTimer = null, listTimer = null, loopBusy = false;
  var connected = false;
  // ── 手机端实时健康检测: 连续 RPC 失败/agent_timeout → 判定疑卡死, 横幅提示并持续自愈重试 ──
  var health = { fails:0, since:0 };
  function isStuckErr(m){ return /agent_timeout|timeout|aborted|Failed to fetch|NetworkError|load failed/i.test(String(m||"")); }
  function markHealth(ok, reason){
    var el=$("health"); if(!el) return;
    if(ok){ if(health.fails){ health.fails=0; health.since=0; } el.classList.remove("show"); return; }
    health.fails++; if(!health.since) health.since=Date.now();
    if(health.fails>=2){
      var sec=Math.round((Date.now()-health.since)/1000);
      el.textContent="⚠ 手机端疑卡死/无响应"+(reason?(" · "+reason):"")+" · 已重试 "+health.fails+" 次/"+sec+"s · 正自动恢复…";
      el.classList.add("show"); setDot("off");
    }
  }

  var dot=$("dot"), addr=$("addr"), frame=$("frame"), hint=$("hint"),
      statusEl=$("status"), toastEl=$("toast"), fpsSel=$("fpsSel"), kbd=$("kbd");
  var strip=$("strip"), plus=$("plus"), launch=$("launch"), menuPop=$("menuPop");

  function setDot(s){ dot.className=""; if(s) dot.classList.add(s); }
  function setStatus(s){ statusEl.textContent = s||""; }
  var toastT=null;
  function toast(s){ toastEl.textContent=s; toastEl.classList.add("show");
    if(toastT) clearTimeout(toastT); toastT=setTimeout(function(){ toastEl.classList.remove("show"); },1800); }

  function accLabel(a){
    if(!a) return "";
    if(typeof a==="string") return a;
    return (a.orgName? a.orgName+" · ":"") + (a.email||a.id||"");
  }
  function curTab(){ return tabsArr.find(function(t){return t.index===activeIdx;}); }
  // 在场登记: 声明本设备正看/控当前标签 (按稳定 vid)。非阻塞·失败无碍。
  function claimView(){
    var t = curTab(); if(!t || !t.id) return;
    rpc("browseClaimView",{id:t.id, clientId:CLIENT_ID},8000).catch(function(){});
  }
  // 某标签除「本设备」外的其他在场设备 (含手机本体 __phone__) → 据此判定冲突/上橙色。
  function otherViewers(t){ return (t && t.viewers || []).filter(function(v){ return v && v!==CLIENT_ID; }); }
  // 全局联控设备数 = 所有标签 viewers 去重(排除本设备)的个数 (几台在前端操控)。
  function coControlCount(){
    var s={}; tabsArr.forEach(function(t){ otherViewers(t).forEach(function(v){ s[v]=1; }); });
    return Object.keys(s).length;
  }
  function hostOf(u){ try{ return new URL(u).host; }catch(e){ return u||""; } }

  // ── 标签列表 → 横向标签条 (同 app.html 的 #strip 芯片) ──
  async function refreshTabs(){
    try{
      var j = await rpc("browseListTabs",{},12000);
      if(!j || !j.tabs){ throw new Error(j&&j.error||"no_tabs"); }
      connected=true; setDot("on"); markHealth(true);
      tabsArr = j.tabs;
      renderStrip();
      claimView();   // 续期本设备「正看/控当前标签」的在场登记
      if(activeIdx<0){
        var act = tabsArr.find(function(t){return t.active;});
        if(act) selectTab(act.index);
        else if(tabsArr.length) selectTab(tabsArr[0].index);
      }
    }catch(e){
      connected=false; setDot("off");
      var m=String(e.message||e), stuck=isStuckErr(m);
      markHealth(false, stuck?"agent_timeout/超时":m);
      if(m.indexOf("session")>=0){ openCfg(); }
      setStatus(stuck? "手机端疑卡死/无响应, 自动重试…" : ("连接异常: "+m));
    }
  }
  function renderStrip(){
    [].slice.call(strip.querySelectorAll(".chip")).forEach(function(c){ c.remove(); });
    var co = coControlCount();
    tabsArr.forEach(function(t){
      var others = otherViewers(t);          // 其他设备(含手机本体)是否正前置此页
      var shared = others.length>0;
      var c=document.createElement("div");
      c.className="chip"+(t.index===activeIdx?" on":"")+(shared?" shared":"");
      var tt=document.createElement("span"); tt.className="t";
      tt.textContent=(t.title||hostOf(t.url)||"新标签");
      c.appendChild(tt);
      if(shared){
        var hasPhone = others.indexOf("__phone__")>=0;
        var cob=document.createElement("span"); cob.className="co";
        cob.textContent = "☁"+others.length;
        cob.title = hasPhone? "手机本体在前 + 其他设备共 "+others.length+" 台正看/控此页" : (others.length+" 台其他设备正看/控此页");
        c.appendChild(cob);
      }
      var x=document.createElement("span"); x.className="x"; x.textContent="×"; x.title="关闭";
      c.appendChild(x);
      c.onclick=function(e){
        if(e.target===x){ closeTab(t.index); return; }
        // 道法自然·冲突即复刻: 点已被其他设备前置的标签 → 不抢同一个(否则互相干扰), 而弹出独立副本各操各的。
        if(shared){ duplicateTab(t); return; }
        selectTab(t.index);
      };
      strip.insertBefore(c, plus);
    });
    addr.value = (function(){ var t=curTab(); return t? (t.internal? ("rtflow://"+(t.title||"板块")) : (t.url||"")) : ""; })();
    document.title = "Devin Cloud · 手机版 (网页)"+(co>0? " · "+co+" 设备联控":"");
  }
  // 复刻一张「内容一致」的新标签 (后台静默开, 不抢手机前台), 开后自动选中投屏到本端。
  function duplicateTab(t){
    toast("该页其他设备在操控 · 正为你弹出独立副本…");
    var before = tabsArr.map(function(x){return x.id;});
    var p;
    if(t.internal){
      var asset = (t.url||"").replace(/^.*\/engine\//,"file:///android_asset/engine/");
      if(asset.indexOf("session=")<0) asset += (asset.indexOf("?")>=0?"&":"?")+"session="+encodeURIComponent(cfg.session)+"&token="+encodeURIComponent(cfg.token);
      p = rpc("browseOpen",{url:asset, foreground:false},15000);
    } else if(t.account && (t.account.id||t.account.email)){
      p = rpc("openAccountTab",{account:(t.account.id||t.account.email), url:t.url||"https://app.devin.ai/", foreground:false},15000);
    } else {
      p = rpc("browseOpen",{url:t.url||"https://app.devin.ai/", foreground:false},15000);
    }
    p.then(function(){ setTimeout(function(){ refreshTabs().then(function(){
        var fresh = tabsArr.filter(function(x){ return before.indexOf(x.id)<0; });
        if(fresh.length){ selectTab(fresh[fresh.length-1].index); }
        else { toast("已弹出副本"); }
      }); }, 1000); })
     .catch(function(e){ toast("复刻失败: "+e.message); });
  }

  // ── 选标签 / 投屏循环 ──
  // 道法自然·共享一切但互不干扰: 选标签是「本浏览器本地」行为 —— 仅决定本端投屏/反控哪张标签,
  // 绝不调 browseActivateTab 去改手机本体的全局当前标签 (否则多设备会互抢前台、并打扰手机本体)。
  var selGen = 0;
  async function selectTab(idx){
    var gen = ++selGen;
    activeIdx = idx; renderStrip();
    claimView();   // 立刻登记本设备前置此标签 (其他端随即看到橙色)
    var t = tabsArr.find(function(x){return x.index===idx;});
    hint.style.display="none";
    frame.classList.add("empty"); setStatus("切换到标签 "+idx+" … (首帧合成约 1s)");
    try{
      var r = await cdp(idx,"Runtime.evaluate",{expression:"JSON.stringify({w:innerWidth,h:innerHeight})",returnByValue:true});
      var v = JSON.parse(r.result.value); if(v.w) view={cssW:v.w,cssH:v.h};
    }catch(e){}
    if(gen!==selGen) return;
    await new Promise(function(r2){ setTimeout(r2, 650); });
    if(gen!==selGen) return;
    shotNow(); startLoop();
  }
  function startLoop(){
    if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
    var ms = parseInt(fpsSel.value,10)||0;
    if(ms>0) pollTimer = setInterval(shotNow, ms);
  }
  async function shotNow(){
    if(loopBusy || activeIdx<0) return;
    loopBusy=true;
    var want = activeIdx;
    try{
      var j = await rpc("browseScreenshot",{tabIndex:want, format:"jpeg", quality:50, maxWidth:1024}, 18000);
      if(want!==activeIdx) return;   // 切换期间到达的旧帧 → 丢弃
      var b64 = j && (j.base64||j.data||j.image);
      if(j && (j.ok===false || j.error)){
        var em=String(j.error||"");
        if(isStuckErr(em)){ markHealth(false, "agent_timeout/超时"); setStatus("手机端疑卡死/无响应, 自动重试…"); }
        else setStatus("截图失败: "+em);
      }
      else if(b64){
        var mime = b64.charAt(0)==="/" ? "image/jpeg" : (b64.charAt(0)==="i"?"image/png":"image/jpeg");
        frame.src = "data:"+mime+";base64,"+b64;
        frame.classList.remove("empty");
        connected=true; setDot("on"); markHealth(true);
        setStatus("● 实时 · "+view.cssW+"×"+view.cssH+" · 标签 "+want);
      }
    }catch(e){
      var m=String(e.message||e);
      if(m.indexOf("rate")>=0){ setStatus("限流, 自动降速…"); }
      else if(isStuckErr(m)){ markHealth(false,"agent_timeout/超时"); setStatus("手机端疑卡死/无响应, 自动重试…"); }
      else { setDot("off"); setStatus("掉线: "+m); }
    }finally{ loopBusy=false; }
  }

  // ── 反向控制: 点击 / 滚动 / 输入 (忠实注入, 与原生 ipcMirrorInput 同核心) ──
  var MIRROR_CORE =
    "var x=Math.round(A.nx*window.innerWidth),y=Math.round(A.ny*window.innerHeight);" +
    "var el=document.elementFromPoint(x,y);" +
    "function fire(t,tg){var ev;try{ev=new MouseEvent(t,{bubbles:true,cancelable:true,composed:true,clientX:x,clientY:y,view:window,button:0});}catch(_){ev=document.createEvent('MouseEvents');ev.initMouseEvent(t,true,true,window,0,0,0,x,y,false,false,false,false,0,null);}(tg||el).dispatchEvent(ev);}" +
    "function fp(t,tg){try{(tg||el).dispatchEvent(new PointerEvent(t,{bubbles:true,cancelable:true,composed:true,clientX:x,clientY:y,view:window,pointerType:'touch',isPrimary:true,button:0}));}catch(_){}}" +
    "function setv(t,v){var p=(t.tagName==='TEXTAREA')?window.HTMLTextAreaElement.prototype:window.HTMLInputElement.prototype;var s=Object.getOwnPropertyDescriptor(p,'value').set;s.call(t,v);t.dispatchEvent(new Event('input',{bubbles:true}));t.dispatchEvent(new Event('change',{bubbles:true}));}" +
    "function isEd(n){return n&&(n.isContentEditable||n.tagName==='INPUT'||n.tagName==='TEXTAREA');}" +
    "function findEd(n){for(var i=0;i<5&&n;i++){if(n.matches&&n.matches('[contenteditable=true],input:not([type=hidden]):not([type=button]):not([type=submit]),textarea'))return n;var q=n.querySelector&&n.querySelector('[contenteditable=true],textarea,input:not([type=hidden]):not([type=button]):not([type=submit])');if(q)return q;n=n.parentElement;}return null;}" +
    "function caret(ed){if(!ed||!ed.isContentEditable)return;try{var rg=document.createRange();rg.selectNodeContents(ed);rg.collapse(false);var sl=getSelection();sl.removeAllRanges();sl.addRange(rg);}catch(_){}}" +
    "if(A.action==='click'||A.action==='tap'){if(!el)return'noel';fp('pointerdown');fire('mousedown');try{el.focus&&el.focus();}catch(_){}fp('pointerup');fire('mouseup');fire('click');if(!isEd(document.activeElement)){var ed=findEd(el);if(ed){try{ed.focus();}catch(_){}caret(ed);}}return'click';}" +
    "if(A.action==='scroll'){var sc=el;while(sc&&sc!==document.body&&sc!==document.documentElement){var st=getComputedStyle(sc);if(/(auto|scroll)/.test(st.overflowY)&&sc.scrollHeight>sc.clientHeight)break;sc=sc.parentElement;}if(sc&&sc!==document.body&&sc!==document.documentElement){sc.scrollTop+=A.dy;}else{window.scrollBy(0,A.dy);}return'scroll';}" +
    "if(A.action==='type'||A.action==='settext'){var t=document.activeElement;if(!t||t===document.body){if(el&&el.focus){try{el.focus();}catch(_){}}t=document.activeElement;}if(!t)return'nofocus';var tg=(t.tagName||'').toLowerCase();if(tg==='input'||tg==='textarea'){setv(t,A.action==='settext'?A.text:((t.value||'')+A.text));return'type';}if(t.isContentEditable){var sl=getSelection();if(!sl.rangeCount||(sl.anchorNode&&!t.contains(sl.anchorNode))){caret(t);}document.execCommand('insertText',false,A.text);return'type-ce';}return'notinput';}" +
    "if(A.action==='key'){var t=document.activeElement||document.body;var k=A.key||'Enter';var kc=k==='Enter'?13:(k==='Backspace'?8:0);['keydown','keypress','keyup'].forEach(function(tp){if(tp==='keypress'&&k!=='Enter')return;try{t.dispatchEvent(new KeyboardEvent(tp,{bubbles:true,cancelable:true,key:k,code:k,keyCode:kc,which:kc,view:window}));}catch(_){}});if(k==='Backspace'){if(t.tagName==='INPUT'||t.tagName==='TEXTAREA'){setv(t,(t.value||'').slice(0,-1));}else if(t.isContentEditable){document.execCommand('delete',false,null);}}return'key';}" +
    "if(A.action==='back'){history.back();return'back';}return'noop';";
  var lastTap = {nx:0.5, ny:0.5};
  async function inject(action, opts){
    if(activeIdx<0) return;
    var A = Object.assign({action:action, nx:lastTap.nx, ny:lastTap.ny, text:"", key:"", dy:0}, opts||{});
    var js = "(function(A){try{"+MIRROR_CORE+"}catch(e){return 'err:'+e}})("+JSON.stringify(A)+")";
    try{ await rpc("browseExecJs",{tabIndex:activeIdx, js:js}, 12000); }
    catch(e){ toast("操作失败: "+e.message); }
  }
  function frameToNorm(ev){
    var r = frame.getBoundingClientRect();
    var aw = (view&&view.cssW)||frame.naturalWidth||r.width;
    var ah = (view&&view.cssH)||frame.naturalHeight||r.height;
    var scale = Math.min(r.width/aw, r.height/ah);
    var dw = aw*scale, dh = ah*scale;
    var ox = r.left + (r.width-dw)/2, oy = r.top + (r.height-dh)/2;
    var nx = (ev.clientX-ox)/dw, ny = (ev.clientY-oy)/dh;
    return { nx:Math.max(0,Math.min(1,nx)), ny:Math.max(0,Math.min(1,ny)) };
  }
  frame.addEventListener("click", function(ev){
    ev.preventDefault(); if(activeIdx<0) return;
    kbd.focus();
    lastTap = frameToNorm(ev);
    inject("click", lastTap).then(function(){ setTimeout(shotNow,140); setTimeout(shotNow,420); });
  });
  frame.addEventListener("wheel", function(ev){
    ev.preventDefault(); if(activeIdx<0) return;
    var p=frameToNorm(ev); p.dy=Math.round(ev.deltaY);
    inject("scroll", p).then(function(){ setTimeout(shotNow,120); });
  }, {passive:false});

  var typeBuf="", typeTimer=null;
  function flushType(){
    if(typeTimer){ clearTimeout(typeTimer); typeTimer=null; }
    if(!typeBuf) return;
    var s=typeBuf; typeBuf="";
    inject("type",{text:s}).then(function(){ setTimeout(shotNow,120); });
  }
  function queueType(ch){
    typeBuf+=ch;
    if(typeTimer) clearTimeout(typeTimer);
    typeTimer=setTimeout(flushType, 160);
  }
  kbd.addEventListener("keydown", function(ev){
    if(activeIdx<0) return;
    if(ev.isComposing) return;
    if(ev.key==="Enter"){ ev.preventDefault(); flushType(); inject("key",{key:"Enter"}).then(function(){setTimeout(shotNow,160);}); }
    else if(ev.key==="Backspace"){ ev.preventDefault(); flushType(); inject("key",{key:"Backspace"}).then(function(){setTimeout(shotNow,150);}); }
    else if(ev.key.length===1 && !ev.ctrlKey && !ev.metaKey && !ev.altKey){ ev.preventDefault(); queueType(ev.key); }
  });
  kbd.addEventListener("compositionend", function(ev){
    if(activeIdx<0) return;
    var s=ev.data||""; if(s) queueType(s);
    flushType();
    kbd.value="";
  });

  // ── 工具栏 ──
  $("shotBtn").onclick=shotNow;
  fpsSel.onchange=startLoop;
  $("reloadBtn").onclick=function(){ if(activeIdx<0)return; cdp(activeIdx,"Runtime.evaluate",{expression:"location.reload()"}).then(function(){setTimeout(shotNow,800);}); };
  $("backBtn").onclick=function(){ if(activeIdx<0)return; cdp(activeIdx,"Runtime.evaluate",{expression:"history.back()"}).then(function(){setTimeout(shotNow,600);}); };
  $("fwdBtn").onclick=function(){ if(activeIdx<0)return; cdp(activeIdx,"Runtime.evaluate",{expression:"history.forward()"}).then(function(){setTimeout(shotNow,600);}); };
  function goAddr(){
    var v=addr.value.trim(); if(!v) return;
    var map={"切号":"switch.html","穿透":"tunnel.html","公网穿透":"tunnel.html","对话":"cloud.html","cloud":"cloud.html",
             "vpn":"vpn.html","脚本":"userscripts.html","用户脚本":"userscripts.html","shizuku":"shizuku.html","全服通":"daopan.html","面板":"panel.html","控制面板":"panel.html"};
    var asset=map[v.toLowerCase()]||map[v];
    if(asset){ var seg=SEGS.find(function(s){return s.asset===asset;}); if(seg){ openPanel(seg); return; } }
    if(!/^[a-z]+:\/\//i.test(v)) v="https://"+v;
    rpc("browseOpen",{url:v, foreground:false},15000)
      .then(function(){ toast("已打开 "+hostOf(v)); setTimeout(refreshTabs,1000); })
      .catch(function(e){ toast("打开失败: "+e.message); });
  }
  $("go").onclick=goAddr;
  addr.addEventListener("keydown",function(e){ if(e.key==="Enter") goAddr(); });

  // ── 板块 / 新实例 (新标签面板 + 菜单, 同 app.html 序与名) ──
  var SEGS = [
    {label:"切号面板", ic:"🔁", asset:"switch.html"},
    {label:"对话 / Cloud", ic:"☁", asset:"cloud.html"},
    {label:"公网穿透", ic:"🌐", asset:"tunnel.html"},
    {label:"VPN 加速", ic:"🚀", asset:"vpn.html"},
    {label:"用户脚本 (油猴)", ic:"🐵", asset:"userscripts.html"},
    {label:"Shizuku 权限", ic:"🔑", asset:"shizuku.html"},
    {label:"全服通", ic:"🌊", asset:"daopan.html"},
    {label:"控制面板", ic:"🎛", asset:"panel.html"}
  ];
  function buildSegs(){
    var box=$("segGrid"); box.innerHTML="";
    SEGS.forEach(function(s){
      var d=document.createElement("div"); d.className="seg";
      d.innerHTML='<span class="ic">'+s.ic+'</span><span>'+s.label+'</span>';
      d.onclick=function(){ hideLaunch(); openPanel(s); };
      box.appendChild(d);
    });
    var d=document.createElement("div"); d.className="seg";
    d.innerHTML='<span class="ic">🟢</span><span>新 Devin 实例</span>';
    d.onclick=function(){ hideLaunch(); openPick(); }; box.appendChild(d);
  }
  // 板块已开 → 切过去; 否则后台静默 browseOpen 资源页 (foreground:false: 远程控台绝不抢占手机本体前台)。
  function openPanel(s){
    var found = tabsArr.find(function(t){ return t.internal && (t.url||"").indexOf(s.asset)>=0; });
    if(found){ selectTab(found.index); return; }
    rpc("browseOpen",{url:"file:///android_asset/engine/"+s.asset+"?session="+encodeURIComponent(cfg.session)+"&token="+encodeURIComponent(cfg.token), foreground:false},12000)
      .then(function(){ toast("已打开 "+s.label); setTimeout(function(){ refreshTabs().then(function(){ var f=tabsArr.find(function(t){return t.internal&&(t.url||"").indexOf(s.asset)>=0;}); if(f) selectTab(f.index); }); },900); })
      .catch(function(e){ toast("打开失败: "+e.message); });
  }
  async function openPick(){
    var list=$("pickList"); list.innerHTML="<div style='color:var(--muted);padding:8px'>读取账号…</div>";
    $("pick").classList.add("show");
    var accs=[];
    try{ var j=await rpc("getState",{},12000); accs=(j&&(j.accounts||j.state&&j.state.accounts))||[]; }catch(e){}
    list.innerHTML="";
    var add=function(label,fn){ var d=document.createElement("div"); d.className="pr"; d.textContent=label; d.onclick=fn; list.appendChild(d); };
    add("➕ 新建空白 Devin 标签 (默认账号)", function(){ doOpenAccount("_"); });
    (accs||[]).forEach(function(a){
      var id=a.id||a.email; if(!id) return;
      add("🟢 "+(a.orgName?a.orgName+" · ":"")+(a.email||id), function(){ doOpenAccount(id); });
    });
    if(!(accs&&accs.length)) add("(未读到账号, 仍可用默认账号新开)", function(){});
  }
  function doOpenAccount(id){
    $("pick").classList.remove("show");
    rpc("openAccountTab",{account:id, url:"https://app.devin.ai/", foreground:false},15000)
      .then(function(){ toast("已新开实例"); setTimeout(refreshTabs,1200); })
      .catch(function(e){
        rpc("browseOpen",{url:"https://app.devin.ai/",foreground:false},15000)
          .then(function(){ toast("已新开标签"); setTimeout(refreshTabs,1200); })
          .catch(function(e2){ toast("新开失败: "+e2.message); });
      });
  }
  $("pick").onclick=function(e){ if(e.target===$("pick")) $("pick").classList.remove("show"); };

  function closeTab(idx){
    rpc("browseCloseTab",{tabIndex:idx},10000).catch(function(){ return rpc("closeTab",{tabIndex:idx},10000); })
      .then(function(){ if(activeIdx===idx) activeIdx=-1; setTimeout(refreshTabs,500); })
      .catch(function(e){ toast("关闭失败: "+e.message); });
  }

  // ── 新标签面板 (+ / launch) ──
  function showLaunch(){ launch.classList.add("show"); var u=$("urlInput"); u.value=""; setTimeout(function(){u.focus();},50); }
  function hideLaunch(){ launch.classList.remove("show"); }
  plus.onclick=showLaunch;
  launch.onclick=function(e){ if(e.target===launch) hideLaunch(); };
  $("urlGo").onclick=function(){ var v=$("urlInput").value.trim(); if(v){ hideLaunch(); addr.value=v; goAddr(); } };
  $("urlInput").addEventListener("keydown",function(e){ if(e.key==="Enter"){ var v=this.value.trim(); if(v){ hideLaunch(); addr.value=v; goAddr(); } } });

  // ── 菜单 (复刻 app.html 板块入口 + 页面工具) ──
  function buildMenu(){
    menuPop.innerHTML="";
    SEGS.forEach(function(s){ mi(s.ic, s.label, function(){ openPanel(s); }); });
    mi("🟢","新 Devin 实例", openPick);
    sep();
    mi("◀","后退", function(){ $("backBtn").onclick(); });
    mi("▶","前进", function(){ $("fwdBtn").onclick(); });
    mi("⟲","重载该标签", function(){ $("reloadBtn").onclick(); });
    mi("⌂","主页 (切号面板)", function(){ openPanel(SEGS[0]); });
    mi("🔗","复制本标签网址", function(){ var t=curTab(); if(!t) return;
      try{ navigator.clipboard.writeText(t.url||""); toast("已复制"); }catch(e){} });
    mi("⚙","连接设置", openCfg);
  }
  function mi(ic,label,fn){ var d=document.createElement("div"); d.className="mi";
    d.innerHTML='<span class="ic">'+ic+'</span><span>'+label+'</span>';
    d.onclick=function(){ menuPop.classList.remove("show"); fn(); }; menuPop.appendChild(d); }
  function sep(){ var s=document.createElement("div"); s.className="sep"; menuPop.appendChild(s); }
  $("menuBtn").onclick=function(e){ e.stopPropagation();
    if(!menuPop.dataset.built){ buildMenu(); menuPop.dataset.built="1"; }
    menuPop.classList.toggle("show"); };
  document.addEventListener("click", function(){ menuPop.classList.remove("show"); });

  // ── 设置浮层 ──
  function openCfg(){ $("cEndpoint").value=cfg.endpoint; $("cSession").value=cfg.session; $("cToken").value=cfg.token; $("cfg").classList.add("show"); }
  $("cfgBtn").onclick=openCfg;
  $("cCancel").onclick=function(){ $("cfg").classList.remove("show"); };
  $("cSave").onclick=function(){
    cfg.endpoint=$("cEndpoint").value.trim().replace(/\/+$/,""); cfg.session=$("cSession").value.trim(); cfg.token=$("cToken").value.trim();
    saveCfg(); $("cfg").classList.remove("show"); activeIdx=-1; tabsArr=[]; refreshTabs();
  };

  // ── 启动 ──
  buildSegs();
  if(!cfg.session || !cfg.token){ openCfg(); }
  else { saveCfg(); refreshTabs(); }
  listTimer = setInterval(refreshTabs, 6000);
  document.addEventListener("visibilitychange", function(){ if(!document.hidden){ startLoop(); shotNow(); } });
})();
</script>
