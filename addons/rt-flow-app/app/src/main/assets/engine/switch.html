<!DOCTYPE html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Devin Cloud 切号</title>
<style>
/* 桌面 RT Flow buildHtml 原始 CSS (--vscode 变量 → 手机具体值) */
:root{
  --vscode-editor-background:#0e1116;--vscode-editor-foreground:#cdd3de;
  --vscode-panel-border:#222730;--vscode-input-background:#161b22;
  --vscode-input-border:#30363d;--vscode-button-background:#1f6feb;
  --vscode-button-hoverBackground:#388bfd;--pool:#4ec9b0;
}
:root{--bg:var(--vscode-editor-background);--fg:var(--vscode-editor-foreground);--border:var(--vscode-panel-border,#2d2d2d);--input-bg:var(--vscode-input-background,#1e1e1e);--input-border:var(--vscode-input-border,#3c3c3c);--btn:var(--vscode-button-background,#0e639c);--btn-h:var(--vscode-button-hoverBackground,#1177bb);--green:#4ec9b0;--orange:#ce9178;--red:#f44;--blue:#9cdcfe}
*{margin:0;padding:0;box-sizing:border-box}
body{font:12px/1.5 -apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);padding:6px 8px;overflow-x:hidden;-webkit-text-size-adjust:100%}
.hd{margin-bottom:8px}
.pool-bar{height:5px;background:#252525;border-radius:3px;margin:6px 0;overflow:hidden}
.pool-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pool)88,var(--pool));transition:width .4s}
.st{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:#777;margin:4px 0}
.st b{color:#ccc}.st .ex{color:var(--red)}
.act-info{background:#264f7833;border-left:3px solid var(--blue);padding:4px 8px;margin:6px 0;font-size:11px;color:var(--blue);border-radius:0 4px 4px 0}
.act-info.empty{color:#777;border-left-color:#555;background:#1a1a1a}
.act-info b{color:var(--blue)}
.act-info .tag{background:#264f78;color:var(--blue);padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px}
.add-section{margin:6px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.add-header{background:#1a1a1a;padding:4px 8px;font-size:11px;color:#888;cursor:pointer;display:flex;justify-content:space-between}
.add-body{padding:6px 8px;display:none}.add-body.open{display:block}
.add-body textarea{width:100%;min-height:80px;background:var(--input-bg);border:1px solid var(--input-border);color:#ccc;padding:6px 8px;border-radius:4px;font-size:11px;outline:none;resize:vertical;font-family:monospace}
.add-body .add-actions{display:flex;gap:4px;margin-top:4px}
.add-body .add-actions button{background:var(--btn);color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px}
.add-body .add-hint{font-size:10px;color:#555;margin-top:4px}
.sec{display:flex;justify-content:space-between;align-items:center;color:#777;font-size:11px;margin:8px 0 3px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.row{display:flex;align-items:center;padding:3px 2px;border-bottom:1px solid #1a1a1a;gap:4px;user-select:none;flex-wrap:wrap;cursor:pointer}
.row:hover,.row:active{background:#2a2d2e}
.row.sel{background:#1f3a45;box-shadow:inset 2px 0 0 var(--blue)}
.row.sel:hover{background:#254655}
.row.act{background:#264f7844;border-left:2px solid var(--blue)}
.row.banned{opacity:.5;background:#2a1a1a}
.row.inuse{background:#1a2a3a;border-left:2px solid #6cb3ff66}
.iu{font-size:9px;background:#1a3a5a;color:#6cb3ff;padding:0 4px;border-radius:3px;font-weight:600}
.eua{font-size:9px;background:#1a3a1a;color:#4ec9b0;padding:0 4px;border-radius:3px;font-weight:700;letter-spacing:.2px;flex-shrink:0}
.eua0{font-size:9px;background:#1e1e1e;color:#444;padding:0 4px;border-radius:3px;font-weight:600;letter-spacing:.2px;flex-shrink:0;border:1px solid #2a2a2a}
.chk{width:14px;height:14px;cursor:pointer;flex-shrink:0}
.acc-no{flex-shrink:0;min-width:14px;height:14px;line-height:14px;text-align:center;font-size:9px;font-weight:700;color:#9cdcfe;background:#1c2733;border:1px solid #2d4a63;border-radius:3px;padding:0 2px}
.dm{width:24px;height:14px;border-radius:2px;font-size:9px;font-weight:700;text-align:center;line-height:14px;flex-shrink:0;color:#aaa}
.dm.shop{background:#553399;color:#cdb}
.dm.yh{background:#4a1564;color:#cce}
.dm.gm{background:#3a3a3a;color:#9cdcfe}
.dm.ms{background:#1a3a5a;color:#9cf}
.dm.o{background:#333;color:#999}
.em{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.uc{font-size:9px;background:#333;color:#888;padding:0 4px;border-radius:3px}
.plan-tag{font-size:9px;background:#1a3a1a;color:var(--blue);padding:0 4px;border-radius:3px}
.days{font-size:9px;color:#666;min-width:32px;display:inline-block;text-align:center;flex-shrink:0}
.acts{display:flex;gap:2px;flex-wrap:wrap}
.b{width:20px;height:20px;border:none;border-radius:3px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0}
.b.sw{background:var(--btn);color:#fff}.b.sw:hover{background:var(--btn-h)}
.b.dv{background:#1e3a4a;color:#9cdcfe;width:auto;padding:0 3px;font-size:10px}.b.dv:hover{background:#2a4a5a}
.b.wp{background:#1a2e3a;color:#4ec9b0}.b.wp:hover{background:#2a3e4a;color:#7fffd4}
.b.sk{background:transparent;color:#666;font-size:12px}.b.sk:hover{color:#f0c674}
.b.vf,.b.cp{background:#333;color:var(--blue)}.b.vf:hover,.b.cp:hover{background:#444}
.b.rm{background:transparent;color:#555;font-size:14px}.b.rm:hover{color:var(--red)}
.b.rt{background:#1a2a3a;color:#9cdcfe}.b.rt:hover{background:#2a3a4a}
.b.sb{background:#1a2a1a;color:var(--green)}.b.sb:hover{background:#2a3a2a}
.b.clicked{transform:scale(0.85);transition:transform .1s}
.toast{position:fixed;bottom:8px;left:8px;right:8px;background:#264f78;color:var(--blue);padding:6px 10px;border-radius:4px;font-size:11px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.toast.ok{background:#1a3a1a;color:var(--green);border:1px solid #2a5a2a}
.toast.fail{background:#3a1a1a;color:var(--red);border:1px solid #5a2a2a}
.dv-detail{display:none;background:#101417;border:1px solid #233;border-radius:4px;margin:0 2px 4px;padding:6px 8px;font-size:11px}
.dv-detail.open{display:block}
.dv-detail .dv-h{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.dv-detail .dv-stat{color:#9cdcfe;font-size:10px;background:#16232c;border:1px solid #244;border-radius:3px;padding:1px 5px}
.dv-detail .dv-stat-c{cursor:pointer;text-decoration:underline dotted #555}
.dv-detail .dv-stat-c:hover{color:#9cdcfe;text-decoration-color:#9cdcfe}
.dv-detail .dv-sess{padding:3px 4px;border-bottom:1px solid #1a2226;display:flex;gap:6px;align-items:center}
.dv-detail .dv-sess .st{font-size:9px;border-radius:3px;padding:0 4px;white-space:nowrap}
.dv-detail .dv-sess .st.running{color:#4ec9b0;background:#13332b}
.dv-detail .dv-sess .st.awaiting{color:#d29922;background:#332a13}
.dv-detail .dv-sess .st.blocked{color:#f44;background:#3a1a1a}
.dv-detail .dv-sess .st.finished{color:#888;background:#222}
.dv-detail .dv-sess .tt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dv-detail .dv-acts{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
.dv-board{margin:3px 0 5px;padding:4px 6px;background:#10151c;border:1px solid #243;border-radius:4px;max-height:160px;overflow:auto;display:none}
.dv-board.open{display:block}
.dv-board-item{font-size:10px;color:#cdd;padding:2px 4px;border-bottom:1px solid #1c2530;display:flex;align-items:center;gap:5px}
.dv-board-item .bd-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dv-board-item .bd-acts{display:flex;gap:3px;flex:none;opacity:.5;transition:opacity .15s}
.dv-board-item:hover .bd-acts{opacity:1}
.dv-board-empty{font-size:10px;color:#666}
.dvc-b{background:#16232c;color:#9cdcfe;border:1px solid #244;border-radius:3px;cursor:pointer;font-size:10px;line-height:1;padding:2px 5px}
.dvc-b:hover{background:#1e3340;border-color:#4ec9b0}
.dvc-b.dvc-b-s{color:#c87a7a;border-color:#4a2a2a;background:#2a1414}
.dvc-b.dvc-b-s:hover{background:#3a1a1a;border-color:#f44}
.dv-git{margin:5px 0;padding:5px 6px;background:#0d1a14;border:1px solid #1f3a2a;border-radius:4px}
.dv-git-h{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.dv-git-tag{color:#4ec9b0;font-size:10px;font-weight:bold}
.dv-git-acts{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.dv-git-pat{flex:1;min-width:100px;background:#0a0f0c;border:1px solid #2a3a2a;color:#cdd;border-radius:3px;padding:2px 6px;font-size:10px;font-family:monospace}
.dv-git-pat:focus{outline:none;border-color:#4ec9b0}
.conv-btn{background:#16232c;color:#9cdcfe;border:1px solid #244;border-radius:4px;cursor:pointer;font-size:10px;padding:3px 8px}
.conv-btn:hover{background:#1e3340;border-color:#4ec9b0}
.conv-btn.conv-btn-s{color:#ce9178;border-color:#3a2a1a}
.conv-btn.conv-btn-s:hover{background:#2a1a0a;border-color:#ce9178}
.dv-tb{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0;align-items:center}
.footer{margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:10px;color:#555;text-align:center}
.footer .v{color:var(--blue)}
/* 穿透配置面板 */
.relay-cfg{margin:6px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.relay-cfg .rh{background:#1a1a2a;padding:4px 8px;font-size:11px;color:#888;cursor:pointer;display:flex;justify-content:space-between}
.relay-cfg .rb{padding:6px 8px;display:none}.relay-cfg .rb.open{display:block}
.relay-cfg input{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:#ccc;padding:4px 8px;border-radius:4px;font-size:11px;outline:none;margin:3px 0}
.relay-cfg label{font-size:10px;color:#888;display:block;margin-top:4px}
/* 手机微调 */
.b{width:28px!important;height:28px!important;font-size:14px!important}
.b.dv{width:auto!important;padding:0 6px!important;font-size:11px!important}
.row{padding:8px 4px!important}
.chk{width:18px!important;height:18px!important}
.acc-no{min-width:20px!important;height:20px!important;line-height:20px!important;font-size:11px!important;font-weight:800!important}
.em{font-size:13px!important;font-weight:600!important;color:#e8ecf0!important}
.acts{margin-left:auto}
/* 备份管理面板 */
.bk-panel{margin:6px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.bk-panel .bk-h{background:#1a1a1a;padding:4px 8px;font-size:11px;color:#888;cursor:pointer;display:flex;justify-content:space-between}
.bk-panel .bk-body{padding:6px 8px;display:none;max-height:300px;overflow:auto}.bk-panel .bk-body.open{display:block}
.bk-item{padding:4px;border-bottom:1px solid #1a2226;display:flex;align-items:center;gap:6px}
.bk-item .bk-title{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-item .bk-meta{font-size:9px;color:#666}
/* 下载管理悬浮 */
.dl-float{position:fixed;bottom:40px;right:8px;width:260px;max-height:200px;background:#161b22;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px #000a;overflow:auto;z-index:90;display:none}
.dl-float.open{display:block}
.dl-float .dl-h{padding:4px 8px;font-size:10px;color:#888;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}

@media (orientation:landscape){
  body{padding:8px 16px}
  .em{font-size:14px!important}
  .dv-tb{gap:8px}
  .row{gap:6px!important}
}
</style></head><body>
<div class="hd">
<div class="st">
  <span><b id="st-cnt">0</b> 号</span>
  <span style="color:var(--blue)"><b id="st-tok">0</b> 已登</span>
  <span><b id="st-avail">0</b> 可注入</span>
</div>

</div>

<!-- 穿透配置 (动态, 非固定) -->
<div class="relay-cfg">
<div class="rh" onclick="toggleRelayCfg()"><span>🔗 穿透配置</span><span id="relayArrow">▼</span></div>
<div class="rb" id="relayCfgBody">
<label>中继 URL</label><input id="cfgUrl" placeholder="wss://your-relay.workers.dev" />
<label>Token</label><input id="cfgToken" type="password" placeholder="Bearer Token" />
<label>Session ID</label><input id="cfgSession" placeholder="my-phone-session" />

  <button onclick="saveRelayCfg()">保存并重连</button>

</div></div>

<div class="add-section">
<div class="add-header" onclick="toggleAdd()"><span>&#43; 添加账号</span><span id="addArrow">&#9660;</span></div>
<div class="add-body" id="addBody">
<textarea id="addInput" placeholder="万法识号 v2.7 · 任意格式·自动识号：&#10;email password / email:password / JSON / token"></textarea>
<div class="add-actions"><button onclick="doAdd()">添加</button><button onclick="copyAll()" style="background:#333;color:var(--blue);margin-left:auto">&#128203; 一键导出</button></div>
<div class="add-hint">万法识号 v2.7 · JSON/token/邮箱密码 皆通 · 重复跳过</div>
</div></div>

<div class="sec"><span>▼ 账号列表 (<span id="secCnt">0</span>)</span></div>
<div class="dv-tb">
<button onclick="doLoginAll()" class="conv-btn" title="全部登录">🔑 全部登录</button>

<button onclick="doBatchGit()" class="conv-btn" title="批量连Git">🔗 批量连Git</button>

</div>

<!-- 备份管理面板 (映射 dao-vsix backups panel) -->
<div class="bk-panel">

<div class="bk-body" id="bkBody">
<div id="bkContent" style="color:#666">点击刷新加载备份数据</div>

  <button onclick="loadBackups()">⟳ 刷新</button>
  <button onclick="clearBackups()" style="background:#3a1a1a;color:#f44">清空本地备份</button>
</div>
</div></div>

<!-- 下载管理悬浮窗 -->
<div class="dl-float" id="dlFloat">

<div id="dlList"></div>
</div>
<button onclick="toggleDl()" style="position:fixed;bottom:8px;right:8px;background:#16232c;color:#9cdcfe;border:1px solid #244;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;z-index:89;display:flex;align-items:center;justify-content:center" title="下载管理">📥</button>

<script src="devin-cloud.js"></script>
<script src="rtflow-parse.js"></script>
<script>
var N = window.Native || {};
var DEVIN = "https://app.devin.ai/";
function _esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function loadAcc(){ try{ return JSON.parse(localStorage.getItem("rtflow.accounts")||"[]"); }catch(e){ return []; } }
function saveAcc(a){ localStorage.setItem("rtflow.accounts", JSON.stringify(a||[])); }
function getActive(){ return localStorage.getItem("rtflow.active")||""; }
function setActive(id){ localStorage.setItem("rtflow.active", id||""); }
function toast(msg,bad){ var t=document.getElementById("toast"); t.textContent=msg; t.className="toast show"+(bad?" fail":" ok"); setTimeout(function(){t.className="toast";},2000); }
function hasAuth(a){ return !!(a.auth1 && a.orgId); }
function domBadge(email){
  var d=(String(email||"").split("@")[1]||"").toLowerCase();
  if(/gmail/.test(d)) return ["gm","gmail"];
  if(/outlook|hotmail|live|msn/.test(d)) return ["ms","outlook"];
  if(/qq\.com/.test(d)) return ["yh","qq"];
  if(/shop|store/.test(d)) return ["shop","shop"];
  if(d) return ["o", d];
  return ["o","token"];
}

// ── 行渲染 (化简: 去DW, 去sw, 行点击=切号, 突出编号+账号名) ──
function rowHtml(a,i){
  var active = (a.id===getActive());
  var auth = hasAuth(a);
  var db = domBadge(a.email);
  var emailShort = String(a.email||a.id||("acc"+i));
  if(emailShort.length>30) emailShort = emailShort.slice(0,28)+"…";
  var planTag = a.plan?('<span class="plan-tag">'+_esc(a.plan)+'</span>'):"";
  var authTag = auth?'<span class="eua" title="已登录·可注入">登</span>':'<span class="uc" title="需登录解锁">需登</span>';
  return ''+
  '<div class="row'+(active?" act":"")+(auth?"":" expired-row")+'" data-i="'+i+'" data-id="'+_esc(a.id)+'" data-email="'+_esc((a.email||"").toLowerCase())+'" onclick="rowClick(event,'+i+')">'+
    '<input type="checkbox" class="chk" data-i="'+i+'" onclick="event.stopPropagation()" />'+
    '<span class="acc-no" title="编号 '+(i+1)+'">'+(i+1)+'</span>'+
    '<span class="dm '+db[0]+'" title="'+_esc(db[1])+'">'+db[0]+'</span>'+
    '<span class="em" title="'+_esc(a.email||a.id)+'">'+_esc(emailShort)+'</span>'+
    planTag+authTag+
    '<span class="acts" onclick="event.stopPropagation()">'+
      '<button class="b dv" onclick="dv('+i+')" title="Devin Cloud 展开(Sessions/知识库/剧本/密钥)">&#9729;&#9662;</button>'+
      (auth?
        '<button class="b vf" onclick="rq('+i+')" title="刷新额度">&#128260;</button>'
      :
        '<button class="b sw" onclick="doLogin('+i+')" title="登录解锁" style="background:#0e639c;color:#fff">&#128273;</button>'
      )+
      '<button class="b cp" onclick="cp('+i+')" title="复制 JSON">&#128203;</button>'+
      '<button class="b wp" onclick="wp('+i+')" title="水过无痕">&#127754;</button>'+
      '<button class="b rm" onclick="rm('+i+')" title="删除">&times;</button>'+
    '</span>'+
  '</div>'+
  '<div class="dv-detail" id="dvDetail'+i+'" data-i="'+i+'" data-email="'+_esc((a.email||"").toLowerCase())+'"></div>';
}
function rowClick(e,i){ if(e.target.closest&&e.target.closest(".acts,.chk"))return; openTab(i); }

// ── 统计 & 渲染 ──
function render(){
  var accs=loadAcc();
  var list=document.getElementById("list");
  list.innerHTML = accs.length?accs.map(rowHtml).join(""):'<div style="padding:10px 4px;color:#666">暂无账号 · 在上方「添加账号」粘贴</div>';
  document.getElementById("secCnt").textContent=accs.length;
  document.getElementById("st-cnt").textContent=accs.length;
  var authed=accs.filter(hasAuth).length;
  document.getElementById("st-tok").textContent=authed;
  document.getElementById("st-avail").textContent=authed;
  // 当前
  var act=accs.filter(function(x){return x.id===getActive();})[0];
  var ai=document.getElementById("actInfo");
  if(act){ ai.className="act-info"; ai.innerHTML='当前: <b>'+_esc(act.email||act.id)+'</b><span class="tag">'+(hasAuth(act)?"可注入":"需登录")+'</span>'; }
  else { ai.className="act-info empty"; ai.textContent="点 ⚡ 或 🖥 打开某账号的注入浏览器 (即切号)"; }
}

// ── 核心操作 ──
function sw(i){ openTab(i); }
function openTab(i){
  var a=loadAcc()[i]; if(!a)return;
  if(!hasAuth(a)){ toast("此号无 auth1, 需先登录(点 🔑)", true); return; }
  setActive(a.id);
  try{ N.openAccountTab(JSON.stringify(a)); toast("已打开 "+(a.email||a.id)); }
  catch(e){ toast("打开失败 "+e, true); }
  render();
}
function cp(i){ var a=loadAcc()[i]; if(!a)return; try{N.clip&&N.clip(JSON.stringify(a));}catch(e){} toast("已复制 JSON"); }
function rm(i){ var accs=loadAcc(); var a=accs[i]; if(!a)return; if(!confirm("删除 "+(a.email||a.id)+"?"))return; accs.splice(i,1); saveAcc(accs); render(); toast("已删除"); }
function wp(i){ var a=loadAcc()[i]; if(!a||!hasAuth(a)){toast("需先登录",true);return;} if(!confirm("水过无痕: 清理 "+(a.email||a.id)+" 全部知识库/密钥/剧本/归档对话?"))return; toast("清理中…"); DaoCloud.wipeAccount(a,{confirm:true,archiveSessions:true}).then(function(r){toast(r.ok?"✓ 清理完成":"清理失败: "+(r.error||""),!r.ok);}); }

// ── Devin Cloud 展开 (核心: 下拉加载 Sessions/Knowledge/Playbook/Secret) ──
function dv(i){
  var d=document.getElementById("dvDetail"+i);
  if(!d)return;
  if(d.classList.contains("open")){ d.classList.remove("open"); d.innerHTML=""; return; }
  d.classList.add("open");
  var a=loadAcc()[i];
  if(!a||!hasAuth(a)){ d.innerHTML='<span style="color:#f44">此号未登录, 无法拉取 Devin Cloud 数据</span>'; return; }
  d.innerHTML='<span style="color:#888">拉取 Devin Cloud 概览…</span>';
  dvFetch(a,i,d);
}
async function dvFetch(a,i,d){
  try{
    var sess=[],kn=[],pb=[],sc=[],git={};
    var results = await Promise.allSettled([
      DaoCloud.listSessions(a,50),
      DaoCloud.listKnowledge(a),
      DaoCloud.listPlaybooks(a),
      DaoCloud.listSecrets(a),
      DaoCloud.checkGit(a)
    ]);
    if(results[0].status==="fulfilled"&&results[0].value.ok) sess=results[0].value.sessions||[];
    if(results[1].status==="fulfilled"&&results[1].value.ok) kn=results[1].value.learnings||[];
    if(results[2].status==="fulfilled"&&results[2].value.ok) pb=results[2].value.playbooks||[];
    if(results[3].status==="fulfilled"&&results[3].value.ok) sc=results[3].value.secrets||[];
    if(results[4].status==="fulfilled"&&results[4].value.ok) git=results[4].value;
    d.innerHTML = dvOverviewHtml(a,i,sess,kn,pb,sc,git);
  }catch(e){ d.innerHTML='<span style="color:#f44">拉取失败: '+_esc(String(e))+'</span>'; }
}
function dvOverviewHtml(a,i,sess,kn,pb,sc,git){
  var running=0,awaiting=0,blocked=0;
  sess.forEach(function(s){ var st=String(s.status_enum||s.status||"").toLowerCase(); if(/running|working|active/.test(st))running++; else if(/await|wait|input/.test(st))awaiting++; else if(/block|stuck/.test(st))blocked++; });
  var h='<div class="dv-h">';
  h+='<span class="dv-stat">对话 '+sess.length+(running?' · <span style="color:#4ec9b0">运行 '+running+'</span>':'')+(awaiting?' · <span style="color:#d29922">待输入 '+awaiting+'</span>':'')+(blocked?' · <span style="color:#f44">卡住 '+blocked+'</span>':'')+'</span>';
  h+='<span class="dv-stat dv-stat-c" onclick="dvTog(\'dvB'+i+'kn\')">知识库 '+kn.length+'</span>';
  h+='<span class="dv-stat dv-stat-c" onclick="dvTog(\'dvB'+i+'pb\')">剧本 '+pb.length+'</span>';
  h+='<span class="dv-stat dv-stat-c" onclick="dvTog(\'dvB'+i+'sc\')">密钥 '+sc.length+'</span>';
  h+='<span class="dv-stat">Git '+(git.connections||[]).length+'</span>';
  h+='</div>';
  // 知识库/剧本/密钥 面板
  h+=dvBoardHtml(i,"kn","知识库",kn,true);
  h+=dvBoardHtml(i,"pb","剧本",pb,true);
  h+=dvBoardHtml(i,"sc","密钥",sc,false);
  // Git 简要
  if((git.connections||[]).length>0){ h+='<div class="dv-git"><div class="dv-git-h"><span class="dv-git-tag">Git · GitHub</span><span style="color:#9cdcfe;font-size:10px">'+_esc((git.connections[0].login||git.connections[0].name||""))+'</span></div></div>'; }
  // Sessions 列表
  if(!sess.length) h+='<div style="color:#666">（无对话）</div>';
  var limit=sess.slice(0,40);
  for(var si=0;si<limit.length;si++){
    var s=limit[si]; var cls="idle"; var stTxt="空闲"; var st=String(s.status_enum||s.status||"").toLowerCase();
    if(/running|working|active/.test(st)){cls="running";stTxt="运行";}else if(/await|wait|input/.test(st)){cls="awaiting";stTxt="待输入";}else if(/block|stuck/.test(st)){cls="blocked";stTxt="卡住";}else if(/finish|complet|done/.test(st)){cls="finished";stTxt="完成";}
    var did=_esc(s.devin_id||s.session_id||s.id||"");
    h+='<div class="dv-sess"><span class="st '+cls+'">'+stTxt+'</span><span class="tt" title="'+_esc(s.title||"")+'">'+_esc((s.title||did||"").slice(0,60))+'</span>';
    h+='<span class="bd-acts"><button class="dvc-b dvc-b-s" onclick="dvArchive('+i+',\''+did+'\')" title="归档此对话">&#128465;</button></span>';
    h+='</div>';
  }
  if(sess.length>40) h+='<div style="color:#666">… 共 '+sess.length+' 个</div>';
  // 底部操作
  h+='<div class="dv-acts">';
  h+='<button class="conv-btn" onclick="dvBackup('+i+')" title="增量备份">💾 备份</button>';
  h+='<button class="conv-btn conv-btn-s" onclick="dvCreate('+i+')" title="发起新对话">☁ 发起对话</button>';
  h+='<button class="conv-btn conv-btn-s" onclick="wp('+i+')" title="水过无痕">🌊 水过无痕</button>';
  h+='</div>';
  return h;
}
function dvBoardHtml(i,key,label,list,viewable){
  var s='<div class="dv-board" id="dvB'+i+key+'">';
  if(!list.length){ s+='<div class="dv-board-empty">（无'+label+'）</div>'; }
  else { list.forEach(function(it){ var nm=it.name||it.title||it.id||"(未命名)"; s+='<div class="dv-board-item"><span class="bd-nm">'+_esc(String(nm))+'</span><span class="bd-acts">'+(viewable?'<button class="dvc-b" onclick="dvBoardView('+i+',\''+key+'\',\''+_esc(it.id||"")+'\')">&#128065;</button>':'')+'<button class="dvc-b dvc-b-s" onclick="dvBoardDel('+i+',\''+key+'\',\''+_esc(it.id||"")+'\')">&#128465;</button></span></div>'; }); }
  s+='</div>';
  return s;
}
function dvTog(id){ var el=document.getElementById(id); if(el) el.classList.toggle("open"); }
async function dvArchive(i,sid){ var a=loadAcc()[i]; if(!a)return; toast("归档中…"); var r=await DaoCloud.archiveSession(a,sid); toast(r.ok?"✓ 已归档":"归档失败",!r.ok); dv(i);dv(i); }
async function dvCreate(i){ var a=loadAcc()[i]; if(!a)return; var prompt=window.prompt("输入对话内容/指令:"); if(!prompt)return; toast("发起中…"); var r=await DaoCloud.createSession(a,prompt); toast(r.ok?"✓ 已发起 "+_esc(r.devinId||""):"失败: "+(r.error||""),!r.ok); dv(i);dv(i); }
async function dvBackup(i){ var a=loadAcc()[i]; if(!a)return; toast("备份中…"); var r=await DaoCloud.backupAccount(a,"conversation"); toast(r.ok?"✓ 备份 "+(r.count||0)+" 条":"备份失败",!r.ok); }
function dvBoardView(i,key,id){ toast("查看 "+key+"/"+id+" (功能开发中)"); }
async function dvBoardDel(i,key,id){ var a=loadAcc()[i]; if(!a)return; if(!confirm("删除 "+key+" "+id+"?"))return; var r; if(key==="kn") r=await DaoCloud.deleteKnowledge(a,id); else if(key==="pb") r=await DaoCloud.deletePlaybook(a,id); else r=await DaoCloud.deleteSecret(a,id); toast(r&&r.ok?"✓ 已删除":"删除失败: "+((r&&r.error)||""),!(r&&r.ok)); dv(i);dv(i); }

// ── 登录/额度 ──
function doLogin(i){
  var a=loadAcc()[i]; if(!a)return;
  if(!a.email||!a.password){ toast("此号无邮箱密码", true); return; }
  toast("登录中… "+(a.email));
  DaoCore.loginAndStore(a.email, a.password).then(function(r){ render(); toast(r.ok?"✓ 已解锁 "+a.email:"登录失败: "+(r.error||""),!r.ok); });
}
function rq(i){
  var a=loadAcc()[i]; if(!a)return;
  toast("刷新额度… "+(a.email||a.id));
  DaoCore.refreshQuotaFor(a.id).then(function(r){ render(); toast(r.ok?("✓ D"+(r.quota&&r.quota.dPct||0)+" W"+(r.quota&&r.quota.wPct||0)):("失败: "+(r.error||"")),!r.ok); });
}
async function doLoginAll(){
  var accs=loadAcc(); var todo=accs.filter(function(a){return a.email&&a.password&&!a.auth1;});
  if(!todo.length){ toast("无需登录"); return; }
  var done=0, fail=0;
  for(var i=0;i<todo.length;i++){ toast("登录 "+(i+1)+"/"+todo.length); try{ var r=await DaoCore.loginAndStore(todo[i].email, todo[i].password); if(r.ok)done++; else fail++; }catch(e){ fail++; } render(); }
  toast("✓ 登录完成 · 成功 "+done+" · 失败 "+fail);
}
async function doRefreshAll(){
  var accs=loadAcc().filter(hasAuth);
  if(!accs.length){ toast("无已登录账号"); return; }
  var ok=0;
  for(var i=0;i<accs.length;i++){ toast("刷额度 "+(i+1)+"/"+accs.length); try{ var r=await DaoCore.refreshQuotaFor(accs[i].id); if(r.ok)ok++; }catch(e){} render(); }
  toast("✓ 额度刷新完成 · "+ok+"/"+accs.length);
}

// ── 批量工具 ──
function copyAll(){ var accs=loadAcc(); try{N.clip&&N.clip(JSON.stringify(accs,null,2));}catch(e){} toast("已导出 "+accs.length+" 个账号 JSON"); }
function dvExportMd(){
  var accs=loadAcc();
  var md=["# Devin Cloud 手机版 · 账号操作 MD","","共 "+accs.length+" 个账号 ("+accs.filter(hasAuth).length+" 个已登录)。","",
    "| # | 账号 | 状态 |","|---|---|---|"]
    .concat(accs.map(function(a,i){return "| "+(i+1)+" | "+(a.email||a.id)+" | "+(hasAuth(a)?"可注入":"需登录")+" |";}))
    .join("\n");
  try{N.clip&&N.clip(md);}catch(e){} try{N.openText&&N.openText("账号操作 MD",md);}catch(e){}
  toast("MD 已复制");
}
async function doHealthScan(){
  var accs=loadAcc(); var todo=accs.filter(function(a){return a.email&&a.password;});
  if(!todo.length){ toast("无可检测账号"); return; }
  var live=0,dead=0;
  for(var i=0;i<todo.length;i++){ toast("检查 "+(i+1)+"/"+todo.length);
    try{ var r=await DaoCore.loginAndStore(todo[i].email,todo[i].password); if(r.ok)live++; else dead++; }catch(e){ dead++; } render(); }
  toast("✓ 存活 "+live+" · 失效 "+dead);
}
async function doBatchGit(){
  var accs=loadAcc().filter(hasAuth);
  if(!accs.length){ toast("无已登录账号"); return; }
  var pat=prompt("GitHub PAT (批量连接 "+accs.length+" 个账号):");
  if(!pat) return;
  var done=0;
  for(var i=0;i<accs.length;i++){ toast("连Git "+(i+1)+"/"+accs.length); try{ var r=await DaoCloud.injectGitHubPAT(accs[i],pat); if(r.ok)done++; }catch(e){} }
  toast("✓ 批量连Git "+done+"/"+accs.length);
}
async function doTrack(){
  var accs=loadAcc().filter(hasAuth);
  if(!accs.length){ toast("无已登录账号"); return; }
  var hits=[];
  for(var i=0;i<accs.length;i++){ toast("追踪 "+(i+1)+"/"+accs.length);
    try{ var r=await DaoCloud.listSessions(accs[i],50); if(!r.ok)continue; (r.sessions||[]).forEach(function(s){ var st=String(s.status_enum||s.status||"").toLowerCase(); if(/block|wait|stuck|running|working|active/.test(st)) hits.push("["+(accs[i].email||"")+"] "+st+" · "+(s.title||"").slice(0,50)); }); }catch(e){} }
  var md=["# 对话追踪","","共 "+hits.length+" 条运行中/受阻",""].concat(hits.length?hits:["(无)"]).join("\n");
  try{N.openText&&N.openText("对话追踪 ("+hits.length+")",md);}catch(e){} toast("✓ "+hits.length+" 条");
}

// ── 添加账号 ──
function toggleAdd(){ var b=document.getElementById("addBody"); var open=b.classList.toggle("open"); document.getElementById("addArrow").innerHTML=open?"&#9650;":"&#9660;"; }
function doAdd(){
  var raw=document.getElementById("addInput").value||"";
  if(!raw.trim()){ toast("请粘贴", true); return; }
  var accs=loadAcc(); var added=0, updated=0;
  var jsonOk=false;
  try{ var j=JSON.parse(raw.trim()); var arr=Array.isArray(j)?j:(j&&typeof j==="object"?[j]:null);
    if(arr&&arr.length&&arr.some(function(o){return o&&(o.auth1||o.email);})){
      arr.forEach(function(o){ if(!o||(!o.email&&!o.auth1))return; o.id=o.id||o.email||("acc"+Math.random().toString(36).slice(2,8)); var k=accs.findIndex(function(x){return x.id===o.id||(o.email&&x.email===o.email);}); if(k>=0){accs[k]=Object.assign(accs[k],o);updated++;}else{accs.push(o);added++;} });
      jsonOk=true; }
  }catch(e){}
  if(!jsonOk){ var r=window.parseAccountText?window.parseAccountText(raw):{accounts:[],tokens:[]};
    (r.accounts||[]).forEach(function(p){ var id=p.email; var k=accs.findIndex(function(x){return x.id===id||x.email===id;}); var rec={id:id,email:p.email,password:p.password}; if(k>=0){accs[k]=Object.assign(accs[k],rec);updated++;}else{accs.push(rec);added++;} });
    (r.tokens||[]).forEach(function(t){ var id="tok-"+t.slice(-8); var k=accs.findIndex(function(x){return x.id===id||x.auth1===t;}); var rec={id:id,email:id,auth1:t}; if(k>=0){accs[k]=Object.assign(accs[k],rec);updated++;}else{accs.push(rec);added++;} });
  }
  saveAcc(accs); render();
  document.getElementById("addInput").value="";
  toast("识号完成 · 新增 "+added+" · 更新 "+updated);
  if(!jsonOk && (added+updated)>0) setTimeout(doLoginAll, 200);
}

// ── 穿透配置 (动态) ──
function toggleRelayCfg(){ var b=document.getElementById("relayCfgBody"); var open=b.classList.toggle("open"); document.getElementById("relayArrow").textContent=open?"▲":"▼"; }
function loadRelayCfg(){ try{ return JSON.parse(localStorage.getItem("rtflow.relay")||"{}"); }catch(e){ return {}; } }
function saveRelayCfg(){
  var cfg={url:(document.getElementById("cfgUrl").value||"").trim(), token:(document.getElementById("cfgToken").value||"").trim(), session:(document.getElementById("cfgSession").value||"").trim()};
  if(!cfg.url||!cfg.token||!cfg.session){ toast("请填写完整 (url/token/session)", true); return; }
  var json=JSON.stringify(cfg);
  localStorage.setItem("rtflow.relay", json);
  try{ N.saveRelayConfig&&N.saveRelayConfig(json); }catch(e){}
  toast("已保存穿透配置 · 重启服务中…");
  try{ N.relayRestart&&N.relayRestart(); }catch(e){}
}
function testRelay(){ toast("测试: 请保存配置后观察通知栏连接状态"); }
function initRelayCfg(){
  var cfg=loadRelayCfg();
  if(cfg.url) document.getElementById("cfgUrl").value=cfg.url;
  if(cfg.token) document.getElementById("cfgToken").value=cfg.token;
  if(cfg.session) document.getElementById("cfgSession").value=cfg.session;
  // 无配置时自动展开
  if(!cfg.url) toggleRelayCfg();
}

// ── 备份管理 ──
function toggleBackup(){ var b=document.getElementById("bkBody"); var open=b.classList.toggle("open"); document.getElementById("bkArrow").textContent=open?"▲":"▼"; if(open) loadBackups(); }
function getBackups(){ try{ return JSON.parse(localStorage.getItem("rtflow.backups")||"[]"); }catch(e){ return []; } }
function saveBackups(b){ localStorage.setItem("rtflow.backups", JSON.stringify(b||[])); }
async function loadBackups(){
  var bc=document.getElementById("bkContent");
  bc.innerHTML='<span style="color:#888">扫描各账号备份中…</span>';
  var accs=loadAcc().filter(hasAuth);
  var all=getBackups();
  // 如果无历史备份数据, 尝试从各账号拉取最近对话作为"备份索引"
  if(!all.length && accs.length){
    for(var i=0;i<accs.length;i++){
      try{ var r=await DaoCloud.listSessions(accs[i],20); if(r.ok)(r.sessions||[]).forEach(function(s){ all.push({account:accs[i].email,title:s.title||"(无标题)",id:s.devin_id||s.session_id||s.id,status:s.status_enum||s.status||"",ts:Date.now()}); }); }catch(e){}
    }
    saveBackups(all);
  }
  renderBackups(all);
}
function renderBackups(all){
  var bc=document.getElementById("bkContent");
  if(!all.length){ bc.innerHTML='<div style="color:#666">暂无备份 · 使用「备份」按钮下载对话后出现在此</div>'; return; }
  var byAcc={};
  all.forEach(function(b){ var k=b.account||"unknown"; if(!byAcc[k])byAcc[k]=[]; byAcc[k].push(b); });
  var h='<div style="font-size:10px;color:#888;margin-bottom:4px">'+Object.keys(byAcc).length+' 账号 · '+all.length+' 条备份</div>';
  Object.keys(byAcc).forEach(function(acc){
    var items=byAcc[acc];
    h+='<div style="margin-bottom:4px"><div style="font-size:11px;font-weight:600;color:#9cdcfe;padding:2px 0">'+_esc(acc)+' ('+items.length+')</div>';
    items.slice(0,50).forEach(function(it){
      h+='<div class="bk-item"><span class="bk-title" title="'+_esc(it.id||"")+'">'+_esc((it.title||"").slice(0,40))+'</span><span class="bk-meta">'+_esc(it.status||"")+'</span>';
      h+='<button class="dvc-b" onclick="bkOpen(\''+_esc(it.id||"")+'\',\''+_esc(acc)+'\')" title="查看">&#128065;</button>';
      h+='</div>';
    });
    h+='</div>';
  });
  bc.innerHTML=h;
}
function bkOpen(id,acc){ toast("查看对话 "+id+" (打开 Devin Cloud)"); try{ N.openUrlTab&&N.openUrlTab("https://app.devin.ai/sessions/"+id); }catch(e){} }
function clearBackups(){ if(!confirm("清空所有本地备份索引?"))return; saveBackups([]); renderBackups([]); toast("已清空"); }

// ── 下载管理 ──
function toggleDl(){ document.getElementById("dlFloat").classList.toggle("open"); renderDl(); }
function getDl(){ try{ return JSON.parse(localStorage.getItem("rtflow.downloads")||"[]"); }catch(e){ return []; } }
function addDl(name,url){ var dl=getDl(); dl.unshift({name:name,url:url,ts:Date.now()}); if(dl.length>50)dl=dl.slice(0,50); localStorage.setItem("rtflow.downloads",JSON.stringify(dl)); }
function renderDl(){
  var dl=getDl();
  var h=dl.length?'':'<div style="padding:8px;color:#666;font-size:10px">无下载记录</div>';
  dl.slice(0,20).forEach(function(d,i){
    h+='<div class="dl-item"><span class="dl-name" title="'+_esc(d.url||"")+'">'+_esc(d.name||"file")+'</span><button class="dvc-b" onclick="dlOpen('+i+')" title="打开">&#128065;</button></div>';
  });
  document.getElementById("dlList").innerHTML=h;
}
function dlOpen(i){ var dl=getDl(); var d=dl[i]; if(d&&d.url){ try{N.openUrlTab&&N.openUrlTab(d.url);}catch(e){} } }

// ── 初始化 ──
render();
initRelayCfg();
window.addEventListener("focus", render);
setInterval(render, 5000);
</script>
