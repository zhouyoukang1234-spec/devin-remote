<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>全服通 · 近期对话 / 备份</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#0e1116;color:#cdd3de;font:13px/1.5 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{display:flex;flex-direction:column;height:100%}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #21262d;flex:0 0 auto}
.tab{flex:1;text-align:center;padding:9px 4px;font-size:13px;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#e6edf3;border-bottom-color:#1f6feb;font-weight:600}
.bar{display:flex;gap:6px;align-items:center;padding:6px 8px;border-bottom:1px solid #21262d;background:#0e1116;flex:0 0 auto}
.search{flex:1;min-width:80px;background:#0d1117;color:#cdd3de;border:1px solid #30363d;border-radius:6px;padding:6px 9px;font-size:12px;outline:none}
.search:focus{border-color:#1f6feb}
.mini{background:#21262d;color:#cdd3de;border:1px solid #30363d;border-radius:6px;padding:6px 9px;font-size:12px;cursor:pointer;white-space:nowrap}
.body{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow:auto;display:none}
.view.on{display:block}
#recentList{padding:6px 8px 40px}
.rc{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:8px 9px;margin-bottom:7px;cursor:grab;touch-action:pan-y}
.rc.drag-arm{outline:2px solid #1f6feb;outline-offset:-1px;background:#172131}
.rc .r1{display:flex;align-items:center;gap:7px}
.grip{flex:0 0 auto;width:22px;height:30px;line-height:30px;text-align:center;color:#6e7681;font-size:15px;cursor:grab;border-radius:5px;background:#1b212b;border:1px solid #2a313c;touch-action:none;user-select:none}
.grip:active{background:#23303f;color:#9cdcfe}
.st{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:#6e7681}
.st.running{background:#3fb950}.st.finished{background:#58a6ff}.st.blocked{background:#f0883e}.st.expired{background:#f85149}
.acc-no{flex:0 0 auto;min-width:20px;height:18px;line-height:18px;text-align:center;font-size:11px;font-weight:800;color:#9cdcfe;background:#1c2733;border:1px solid #2d4a63;border-radius:4px;padding:0 3px}
.ti{flex:1;font-size:13px;color:#e6edf3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.meta{font-size:11px;color:#8b949e;margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;padding-left:30px}
.acts{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;padding-left:30px}
.b{flex:1;min-width:60px;text-align:center;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:6px 0;font-size:12px;cursor:pointer;color:#cdd3de}
.b.pri{background:#0e639c;border-color:#0e639c;color:#fff}
.empty{text-align:center;color:#6e7681;padding:26px 12px;font-size:13px}
.tip{font-size:11px;color:#6e7681;padding:0 10px 6px}
iframe{border:0;width:100%;height:100%;display:block;background:#0e1116}
/* 对话查看: 悬浮窗内多标签"网页式"查看(可开多个对话·切换·单独关闭) */
#convView{position:absolute;inset:0;background:#0e1116;display:none;flex-direction:column;z-index:20}
#convView.on{display:flex}
.cv-top{display:flex;align-items:center;gap:6px;padding:6px 7px;background:#161b22;border-bottom:1px solid #21262d;flex:0 0 auto}
.cv-back{background:#21262d;border:1px solid #30363d;border-radius:6px;color:#cdd3de;padding:6px 9px;font-size:12px;cursor:pointer;flex:0 0 auto}
.cv-tabs{flex:1;display:flex;gap:5px;overflow-x:auto;overflow-y:hidden}
.cv-tab{flex:0 0 auto;max-width:160px;display:flex;align-items:center;gap:6px;background:#1b212b;border:1px solid #2a313c;border-radius:6px;padding:5px 8px;font-size:12px;color:#9aa4b2;cursor:pointer;white-space:nowrap}
.cv-tab.on{background:#11304d;border-color:#1f6feb;color:#e6edf3}
.cv-tab .nm{overflow:hidden;text-overflow:ellipsis;max-width:118px}
.cv-tab .x{color:#6e7681;font-weight:700;padding:0 1px}
.cv-tab.on .x{color:#9aa4b2}
.cv-actions{display:flex;gap:6px;padding:5px 8px;border-bottom:1px solid #21262d;flex:0 0 auto}
.cv-body{flex:1;overflow:auto;padding:12px 12px 50px;white-space:pre-wrap;word-break:break-word;font:12.5px/1.6 -apple-system,Segoe UI,Roboto,monospace;color:#cdd3de}
.toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:8px 14px;font-size:12.5px;opacity:0;transition:.2s;pointer-events:none;z-index:30;max-width:90%}
.toast.show{opacity:1}.toast.fail{border-color:#f85149}.toast.ok{border-color:#3fb950}
</style></head>
<body>
<div class="wrap">
  <div class="tabs">
    <div class="tab on" id="tabRecent" onclick="showTab('recent')">☁ 近期对话</div>
    <div class="tab" id="tabBackup" onclick="showTab('backup')">🗂 备份网页端</div>
  </div>

  <!-- 近期对话 -->
  <div class="bar" id="recentBar">
    <input class="search" id="q" placeholder="检索 账号 / 对话名称…" oninput="renderRecent()" autocomplete="off"/>
    <button class="mini" onclick="loadRecent(true)">&#128260; 刷新</button>
  </div>
  <div class="body">
    <div class="view on" id="recentView">
      <div class="tip">跨全部已解锁账号 · 近期更新对话 · 实时刷新 · <b>长按对话卡</b>拖到网页窗口(已备份秒拖)</div>
      <div id="recentList"><div class="empty">加载中…</div></div>
    </div>
    <div class="view" id="backupView">
      <iframe id="bkFrame" src="about:blank"></iframe>
    </div>
    <!-- 对话查看: 悬浮窗内多标签"网页式"查看 -->
    <div id="convView">
      <div class="cv-top"><button class="cv-back" onclick="hideConv()">‹ 返回</button><div class="cv-tabs" id="cvTabs"></div></div>
      <div class="cv-actions" id="cvActions"></div>
      <div class="cv-body" id="cvBody"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="devin-core.js"></script>
<script src="devin-cloud.js"></script>
<script src="dao-zip.js"></script>
<script>
var N = window.Native || {};
var REC = [];               // 聚合排序后的近期对话 [{acc,no,sid,title,status,t,s}]
var CONV_TABS = [];         // 多标签查看: [{acc,sid,title,md,loading}]
var CONV_ACTIVE = -1;
var _busy = false, _bkLoaded = false;
var _accSess = Object.create(null); // accId -> [item] 每账号最近会话缓存(增量合并)
var _rot = 0, _seeded = false;
var CONC = 6, PERACC = 6, BATCH = 16, MAXREC = 40, CACHE_KEY = "rtflow.recentConv", CACHE_TTL = 45000;
function _accId(a){ return (a&&(a.id||a.email))||""; }
function _itemOf(a,no,s){ return { acc:a, no:no, sid:sidOf(s), title:titleOf(s), status:(s.status_enum||s.status||s.state||""), t:recencyMs(s), s:s }; }
// 有限并发池(与原生 HttpBridge 线程池对齐): 把 68 号串行等待压成 6 路并发
async function _pool(items, conc, fn){
  var idx=0, n=items.length; conc=Math.max(1,Math.min(conc, n||1));
  async function w(){ while(idx<n){ var i=idx++; try{ await fn(items[i]); }catch(e){} } }
  var ws=[]; for(var c=0;c<conc;c++) ws.push(w()); await Promise.all(ws);
}
// 重建 REC: 平铺所有账号缓存 → 按时间降序 → 按 sid 去重 → 取前 MAXREC
function _rebuild(){
  var all=[]; for(var k in _accSess){ var arr=_accSess[k]; if(arr) for(var i=0;i<arr.length;i++) all.push(arr[i]); }
  all.sort(function(x,y){ return y.t-x.t; });
  var seen=Object.create(null), out=[];
  for(var j=0;j<all.length;j++){ var id=all[j].sid; if(id&&seen[id])continue; if(id)seen[id]=1; out.push(all[j]); }
  REC=out.slice(0, MAXREC);
}
function _saveCache(){
  try{ localStorage.setItem(CACHE_KEY, JSON.stringify({ ts:Date.now(), list:REC.slice(0,MAXREC).map(function(it){ return {accId:_accId(it.acc),no:it.no,sid:it.sid,title:it.title,status:it.status,t:it.t}; }) })); }catch(e){}
}
// 秒开瘦物: 缓存 + 实时追踪(活跃对话)种子 → 打开面板立刻有内容, 后台再拉准
function _seedFromCache(){
  var byId=Object.create(null), byEmail=Object.create(null);
  accList().forEach(function(a){ byId[_accId(a)]=a; byEmail[(a.email||"").toLowerCase()]=a; });
  var cacheTs=0;
  try{
    var raw=JSON.parse(localStorage.getItem(CACHE_KEY)||"null");
    var list = raw && (raw.list || (Array.isArray(raw)?raw:null));
    if(raw && raw.ts) cacheTs=raw.ts;
    if(list && list.length){
      list.forEach(function(r){ var a=byId[r.accId]; if(!a)return; var k=_accId(a); (_accSess[k]=_accSess[k]||[]).push({acc:a,no:r.no,sid:r.sid,title:r.title,status:r.status,t:r.t,s:{}}); });
    }
  }catch(e){}
  try{
    var trk=JSON.parse(localStorage.getItem("rtflow.trk")||"{}");
    for(var em in trk){ var rec=trk[em], a=byEmail[em]; if(!a||!rec||!rec.items)continue; var k=_accId(a); var arr=_accSess[k]=_accSess[k]||[];
      rec.items.forEach(function(it){ if(!it.uuid)return; var dup=false; for(var z=0;z<arr.length;z++){ if(arr[z].sid===it.uuid){dup=true;break;} } if(dup)return;
        arr.push({acc:a,no:rec.no||(accList().indexOf(a)+1),sid:it.uuid,title:it.title||it.uuid,status:it.cls||"running",t:rec.ts||Date.now(),s:{}}); });
    }
  }catch(e){}
  _rebuild();
  return cacheTs;
}

function _esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
function toast(m,bad){ var t=document.getElementById("toast"); t.textContent=m; t.className="toast show"+(bad?" fail":" ok"); setTimeout(function(){t.className="toast";},2000); }
function stClass(s){ s=String(s||"").toLowerCase(); if(/run|work|active/.test(s))return"running"; if(/finish|complete|done/.test(s))return"finished"; if(/block|wait|stuck/.test(s))return"blocked"; if(/expir|fail|error/.test(s))return"expired"; return""; }
function safeName(s){ return String(s||"").replace(/[\\\/:*?"<>|]/g,"_").slice(0,60); }
function accList(){ try{ return DaoCore.loadAcc(); }catch(e){ return []; } }
function hasAuth(a){ return !!(a&&a.auth1&&a.orgId); }
function sidOf(s){ return s.devin_id||s.session_id||s.id||""; }
function titleOf(s){ var sid=sidOf(s); return s.title||s.name||s.prompt||sid; }
function recencyMs(s){
  var t=s.updated_at||s.updated_at_ms||s.last_updated_at||s.last_message_at||s.last_message_sent_at||s.last_event_at||s.last_activity_at||s.modified_at||s.created_at||s.created||0;
  if(typeof t==="number") return t>1e12?t:t*1000;
  var p=Date.parse(t); return isNaN(p)?0:p;
}
function fmtAgo(ms){
  if(!ms) return "";
  var d=Date.now()-ms; if(d<0)d=0;
  var m=Math.floor(d/60000); if(m<1)return"刚刚"; if(m<60)return m+"分钟前";
  var h=Math.floor(m/60); if(h<24)return h+"小时前";
  var dd=Math.floor(h/24); if(dd<30)return dd+"天前";
  try{ return new Date(ms).toLocaleDateString(); }catch(e){ return ""; }
}

function showTab(t){
  var rec=t==="recent";
  document.getElementById("tabRecent").classList.toggle("on",rec);
  document.getElementById("tabBackup").classList.toggle("on",!rec);
  document.getElementById("recentView").classList.toggle("on",rec);
  document.getElementById("backupView").classList.toggle("on",!rec);
  document.getElementById("recentBar").style.display=rec?"flex":"none";
  hideConv();
  if(!rec && !_bkLoaded){ document.getElementById("bkFrame").src="cloud.html"; _bkLoaded=true; }
  if(rec) loadRecent(false);
}

// ── 跨账号聚合近期对话 (缓存优先 + 并发拉取 + 增量渲染 + 轮转刷新) ──
// full=true: 全量扫(首次/手动刷新); 否则: 仅刷「活跃账号 + 轮转批次」→ 控网络不锁死 6 线程池
async function loadRecent(full){
  if(_busy){ return; }
  _busy=true;
  try{
    var all=accList(), unlocked=[];
    for(var i=0;i<all.length;i++){ if(hasAuth(all[i])) unlocked.push({a:all[i],no:i+1}); }
    var box=document.getElementById("recentList");
    if(!unlocked.length){ box.innerHTML='<div class="empty">无已解锁账号 · 先到切号面板登录</div>'; _busy=false; return; }
    var batch;
    if(full || !_seeded){ batch=unlocked; }
    else {
      var trkActive=Object.create(null);
      try{ var trk=JSON.parse(localStorage.getItem("rtflow.trk")||"{}"); for(var em in trk) trkActive[em]=1; }catch(e){}
      var live=unlocked.filter(function(u){ return trkActive[(u.a.email||"").toLowerCase()]; });
      var start=_rot%unlocked.length; _rot+=BATCH;
      var rot=[]; for(var r=0;r<BATCH&&r<unlocked.length;r++) rot.push(unlocked[(start+r)%unlocked.length]);
      var seen=Object.create(null); batch=[];
      live.concat(rot).forEach(function(u){ var id=_accId(u.a); if(!seen[id]){ seen[id]=1; batch.push(u); } });
    }
    var cold = !REC.length;
    if(cold) box.innerHTML='<div class="empty" id="ldp">加载中… 0/'+batch.length+'</div>';
    var done=0, lastPaint=0;
    await _pool(batch, CONC, async function(u){
      var r=null; try{ r=await DaoCloud.listSessions(u.a, PERACC); }catch(e){}
      if(r&&r.ok&&r.sessions){ _accSess[_accId(u.a)]=r.sessions.map(function(s){ return _itemOf(u.a,u.no,s); }); }
      done++;
      var now=Date.now(); if(now-lastPaint>300){ lastPaint=now; _rebuild(); renderRecent(); }
      if(cold){ var p=document.getElementById("ldp"); if(p) p.textContent="加载中… "+done+"/"+batch.length; }
    });
    _seeded=true; _rebuild(); renderRecent(); _saveCache();
  }catch(e){}
  _busy=false;
}

function renderRecent(){
  var q=(document.getElementById("q").value||"").trim().toLowerCase();
  var box=document.getElementById("recentList");
  if(!REC.length){ box.innerHTML='<div class="empty">暂无近期对话</div>'; return; }
  var html="", n=0;
  REC.forEach(function(it,idx){
    if(q){
      var hay=((it.acc.email||"")+" "+(it.acc.id||"")+" "+it.title+" "+it.sid+" "+it.no).toLowerCase();
      if(hay.indexOf(q)<0) return;
    }
    n++;
    html+='<div class="rc" data-idx="'+idx+'">'+
      '<div class="r1">'+
        '<span class="grip" title="长按整张卡片拖到网页">&#10303;</span>'+
        '<span class="acc-no">'+it.no+'</span>'+
        '<span class="st '+stClass(it.status)+'" title="'+_esc(it.status)+'"></span>'+
        '<span class="ti" title="'+_esc(it.title)+'">'+_esc(String(it.title).slice(0,70))+'</span>'+
      '</div>'+
      '<div class="meta"><span>'+_esc((it.acc.email||it.acc.id||"").split("@")[0])+'</span>'+(it.status?'<span>'+_esc(it.status)+'</span>':'')+(it.t?'<span>'+fmtAgo(it.t)+'</span>':'')+'</div>'+
      '<div class="acts">'+
        '<span class="b" onclick="viewConv('+idx+')">&#128065; 查看</span>'+
        '<span class="b" onclick="openAcc('+idx+')" title="切到该账号并在网页端打开此对话">&#127760; 进入</span>'+
        '<span class="b" onclick="dlMd('+idx+')">&#11015; MD</span>'+
        '<span class="b pri" onclick="dlZip('+idx+')">&#128230; 全部文件</span>'+
      '</div></div>';
  });
  box.innerHTML = html || '<div class="empty">无匹配 · 清空搜索查看全部</div>';
  bindCards();
}

// ── 长按整张对话卡拖拽: 触发原生全局拖拽(两形态由原生侧据本地备份/产出文件决定)。
//    在动作按钮区(.acts)起按不触发拖拽, 保证 查看/MD/全部文件 仍可点。 ──
function bindCards(){
  var cards=document.querySelectorAll(".rc[data-idx]");
  for(var i=0;i<cards.length;i++){ (function(card){
    var timer=null, sx=0, sy=0;
    function onBtn(t){ return !!(t && t.closest && t.closest(".acts")); }
    function start(x,y,t){ if(onBtn(t)) return; sx=x; sy=y; card.classList.add("drag-arm"); timer=setTimeout(function(){ card.classList.remove("drag-arm"); fireCard(card); }, 360); }
    function cancel(){ if(timer){ clearTimeout(timer); timer=null; } card.classList.remove("drag-arm"); }
    card.addEventListener("touchstart",function(e){ start(e.touches[0].clientX,e.touches[0].clientY,e.target); },{passive:true});
    card.addEventListener("touchmove",function(e){ var t=e.touches[0]; if(Math.abs(t.clientX-sx)>12||Math.abs(t.clientY-sy)>12) cancel(); },{passive:true});
    card.addEventListener("touchend",cancel);
    card.addEventListener("touchcancel",cancel);
    card.addEventListener("mousedown",function(e){ start(e.clientX,e.clientY,e.target); });
    card.addEventListener("mouseup",cancel);
    card.addEventListener("mouseleave",cancel);
  })(cards[i]); }
}
function fireCard(card){
  var idx=+card.getAttribute("data-idx"); var it=REC[idx]; if(!it) return;
  try{ N.vibrate && N.vibrate(30); }catch(e){}
  try{
    if(N.startConvDrag){ N.startConvDrag(JSON.stringify(it.acc), it.sid); }
    else toast("当前版本不支持拖拽 · 请更新 APK",true);
  }catch(e){ toast("拖拽失败",true); }
}
// ── 进入: 切到该对话所属账号(WAM 多实例注入) 并在网页端前台打开此对话页 (类似切号面板点账号) ──
function openAcc(idx){
  var it=REC[idx]; if(!it||!it.acc) return;
  if(!it.acc.auth1){ toast("此号未解锁(无 auth1), 先在切号面板登录",true); return; }
  try{ if(it.acc.id) localStorage.setItem("rtflow.active", it.acc.id); }catch(e){}
  var web="https://app.devin.ai/sessions/"+String(it.sid||"").replace(/^devin-/,"");
  try{
    if(N.openAccountSession){ N.openAccountSession(JSON.stringify(it.acc), it.sid); }
    else if(N.openEntryNewTab){ N.openEntryNewTab(JSON.stringify(it.acc), web); }
    else { toast("当前版本不支持 · 请更新 APK",true); return; }
    toast("已切到 "+((it.acc.email||it.acc.id||"").split("@")[0])+" · 打开网页对话");
  }catch(e){ toast("打开失败",true); }
}

// ── 对话查看: 悬浮窗内多标签"网页式"查看(可同时开多个对话·切换·单独关闭) ──
function viewConv(idx){
  var it=REC[idx]; if(!it) return;
  var ex=-1; for(var i=0;i<CONV_TABS.length;i++){ if(CONV_TABS[i].sid===it.sid){ ex=i; break; } }
  if(ex>=0){ CONV_ACTIVE=ex; }
  else { CONV_TABS.push({ acc:it.acc, sid:it.sid, title:it.title||it.sid, md:"", loading:true }); CONV_ACTIVE=CONV_TABS.length-1; }
  document.getElementById("convView").classList.add("on");
  renderConvTabs();
  if(ex<0) loadConvMd(CONV_ACTIVE);
}
async function loadConvMd(ti){
  var t=CONV_TABS[ti]; if(!t) return;
  try{
    var r=await DaoCloud.exportSession(t.acc, t.sid, "conversation");
    if(r&&r.ok){ t.md=r.md||""; t.title=r.title||t.title; }
    else t.md="(提取失败: "+((r&&r.error)||"")+")";
  }catch(e){ t.md="(异常: "+e+")"; }
  t.loading=false; renderConvTabs();
}
function activateConv(ti){ CONV_ACTIVE=ti; renderConvTabs(); }
function closeConvTab(ti,ev){ if(ev&&ev.stopPropagation)ev.stopPropagation(); CONV_TABS.splice(ti,1);
  if(!CONV_TABS.length){ CONV_ACTIVE=-1; hideConv(); return; }
  if(CONV_ACTIVE>=CONV_TABS.length) CONV_ACTIVE=CONV_TABS.length-1; renderConvTabs();
}
function hideConv(){ document.getElementById("convView").classList.remove("on"); }
function renderConvTabs(){
  var tabsEl=document.getElementById("cvTabs"), bodyEl=document.getElementById("cvBody"), actEl=document.getElementById("cvActions");
  var h="";
  CONV_TABS.forEach(function(t,i){ h+='<div class="cv-tab'+(i===CONV_ACTIVE?" on":"")+'" onclick="activateConv('+i+')"><span class="nm" title="'+_esc(t.title)+'">'+_esc(String(t.title).slice(0,40))+'</span><span class="x" onclick="closeConvTab('+i+',event)">&#10005;</span></div>'; });
  tabsEl.innerHTML=h;
  var cur=CONV_TABS[CONV_ACTIVE];
  if(!cur){ bodyEl.textContent=""; actEl.innerHTML=""; return; }
  actEl.innerHTML='<span class="b" onclick="cvDl('+CONV_ACTIVE+')">&#11015; MD</span><span class="b pri" onclick="cvZip('+CONV_ACTIVE+')">&#128230; 全部文件</span>';
  bodyEl.textContent = cur.loading ? "提取对话中…" : (cur.md||"(空)");
  bodyEl.scrollTop=0;
}
function cvDl(ti){ var t=CONV_TABS[ti]; if(!t||!t.md){ toast("无内容",true); return; }
  try{ N.saveTextFile && N.saveTextFile(safeName(t.title||t.sid)+".md", t.md); toast("已下载 MD → 下载列表"); }catch(e){ toast("下载失败",true); } }
function cvZip(ti){ var t=CONV_TABS[ti]; if(!t) return; var idx=-1; for(var i=0;i<REC.length;i++){ if(REC[i].sid===t.sid){ idx=i; break; } } if(idx>=0) dlZip(idx); else toast("该对话已不在近期列表",true); }

async function dlMd(idx){
  var it=REC[idx]; if(!it) return; toast("下载 MD…");
  try{
    var r=await DaoCloud.exportSession(it.acc, it.sid, "conversation");
    if(!r.ok){ toast("提取失败: "+(r.error||""),true); return; }
    var fn=it.no+"_"+safeName(it.acc.email||it.acc.id)+"_"+safeName(r.title||it.sid)+".md";
    N.saveTextFile && N.saveTextFile(fn, r.md); toast("已下载 MD");
  }catch(e){ toast("异常: "+e,true); }
}
async function dlZip(idx){
  var it=REC[idx]; if(!it) return; toast("打包全部文件…");
  try{
    var files=[];
    var conv=await DaoCloud.exportSession(it.acc, it.sid, "conversation");
    if(conv.ok) files.push({name:"conversation.md", data:conv.md});
    var wl=await DaoCloud.exportSession(it.acc, it.sid, "worklog");
    if(wl.ok) files.push({name:"worklog.md", data:wl.md});
    var ev=null;
    try{ ev=await DaoCloud.sessionEvents(it.acc, it.sid); if(ev&&ev.ok) files.push({name:"events.json", data:JSON.stringify(ev.events||[],null,2)}); }catch(e){}
    try{
      var cf=await DaoCloud.collectSessionFiles(it.acc, it.sid, (ev&&ev.events)||null, function(d,t){ if(d===1||d%20===0)toast("拉取产出文件 "+d+"/"+t); });
      if(cf&&cf.files&&cf.files.length){ cf.files.forEach(function(x){ var p=(x.path||("_unpathed/"+x.key)).replace(/^\/+/,""); files.push({name:"files/"+p, b64:x.b64}); }); }
      if(cf&&cf.index&&cf.index.length) files.push({name:"files/_index.json", data:JSON.stringify(cf.index,null,2)});
    }catch(e){}
    files.push({name:"meta.json", data:JSON.stringify({account:it.acc.email,accountNo:it.no,session:it.sid,title:it.title,status:it.status,exportedAt:new Date().toISOString()},null,2)});
    var zipName=it.no+"_"+safeName(it.acc.email||it.acc.id)+"_"+safeName(it.title||it.sid)+".zip";
    var b64=window.buildZipBase64(files);
    var path=""; try{ path=N.saveBase64File ? N.saveBase64File(zipName, b64) : ""; }catch(e){}
    if(!path){ files.forEach(function(f){ if(f.data==null)return; try{ N.saveTextFile && N.saveTextFile(safeName(it.title||it.sid)+"_"+f.name.replace(/\//g,"_"), f.data); }catch(e){} }); toast("✓ 已下载 "+files.length+" 个文件(逐个)"); }
    else toast("✓ 已打包 "+files.length+" 文件 → "+zipName);
  }catch(e){ toast("打包异常: "+e,true); }
}

// 实时刷新: 仅在近期对话页可见时轮询(轮转批次, 轻量)
setInterval(function(){ if(document.getElementById("recentView").classList.contains("on") && !document.getElementById("convView").classList.contains("on")) loadRecent(false); }, 25000);
window.addEventListener("focus", function(){ if(document.getElementById("recentView").classList.contains("on")) loadRecent(false); });
// 启动: 先从缓存+实时追踪种子立刻渲染 → 后台刷准(缓存新鲜则只轮转, 避免每次开窗都全量扫)
var _cacheTs=_seedFromCache();
if(REC.length){ _seeded=true; renderRecent(); }
loadRecent((Date.now()-_cacheTs) > CACHE_TTL);
</script>
