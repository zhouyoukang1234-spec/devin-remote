<!doctype html>
<!-- Round-29: a GENUINELY EXTERNAL real GUI surface. Not our synthetic canvas: a third-party WebGL
     map library (MapLibre GL) rendering LIVE network raster tiles (OpenStreetMap) with labels and
     anti-aliasing. Kinematics are exposed via the hash so the keys can be measured on a real app:
       #webmap   -> left-drag PANS the map                (translation: one rigid shift -> COHERENT)
       #webspin  -> left-drag ROTATES the bearing, pitch=0  (flat rotation: no single shift -> INCOHERENT)
       #webtilt  -> left-drag ROTATES the bearing, pitch=60 (perspective rotation: also -> INCOHERENT)
       #webzoom  -> left-drag SCROLL-ZOOMS about centre     (radial expansion: INCOHERENT, but DIVERGENT)
       #webscale -> left-drag CSS-SCALES the rendered canvas about centre (round-31 control: a PURE image
                    magnification -- no map.setZoom, so NO vector re-layout / tile re-fetch / label re-place)
     The honest question: do footprint/gain/dyn survive a real third-party-rendered, network-textured
     GUI -- including tile pop-in noise -- the way they survived our synthetic real_lab.html?
     Round-29 clean finding (after fixing a stale-cache bug that had frozen webtilt at pitch=0): the dyn
     key separates ROTATION from TRANSLATION exactly as the lab orbit-vs-pan did. A pan is coherent; ANY
     bearing rotation -- flat (webspin) OR perspective (webtilt) -- is incoherent and the two group
     together. The perspective pitch is NOT the axis; rotation-vs-translation is. #webtilt is kept as the
     control proving the extra pitch does not change the rotation verdict on the same external surface.
     Round-30 adds #webzoom: a scroll-zoom is ALSO incoherent (no single rigid shift), so the binary
     coherence key cannot tell it from a rotation. The flow_structure key (round-30) decomposes the
     local flow into [translation, divergence, curl]; on CLEAN synthetic frames a zoom is DIVERGENT, a
     rotation is CURL, a pan is TRANSLATION. But round-30 MEASURED that this 3-way split does NOT survive
     external rendering (PARTIAL): finite-frame block-matching injects a motion-independent inward
     divergence into EVERY mode, so a native map zoom does not cosine-separate from a rotation.
     Round-31 adds #webscale to FALSIFIABLY isolate the cause: a pure CSS image-scale shares webzoom's
     finite-frame border geometry but has NO MapLibre vector re-layout. If it also fails to separate, the
     PARTIAL is pure border geometry; if it separates, MapLibre's vector re-layout is the culprit. -->
<html>
<head>
<meta charset="utf-8">
<title>web-lab</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>html,body,#map{margin:0;height:100%;width:100%;background:#111}</style>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
</head>
<body>
<div id="map"></div>
<div id="dbg" style="position:absolute;left:2px;top:2px;z-index:9;font:11px monospace;color:#000;background:#fff8;padding:1px 3px">init</div>
<script>
// Mode is fixed at load from the hash. Typing a URL that differs only in the hash is a same-document
// navigation (no reload), which would freeze `mode`/`pitch` at the first-loaded value -- so force a
// full reload whenever the hash changes, guaranteeing the measured mode always matches the URL.
window.addEventListener('hashchange', () => location.reload());
const mode = (location.hash || '#webmap').slice(1);
const style = {
  version: 8,
  sources: {osm: {type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                  tileSize: 256, attribution: 'OSM'}},
  layers: [{id: 'osm', type: 'raster', source: 'osm'}]
};
const pitch0 = (mode === 'webtilt') ? 60 : 0;
const ROT = (mode === 'webspin' || mode === 'webtilt');
const ZOOM = (mode === 'webzoom');
const SCALE = (mode === 'webscale');
const map = new maplibregl.Map({
  container: 'map', style: style,
  center: [2.3522, 48.8566], zoom: 12, bearing: 0, pitch: pitch0,
  fadeDuration: 0, attributionControl: false, interactive: true
});
window.__ready = false;
const dbg = document.getElementById('dbg');
const sc = () => { const m = /scale\(([\d.]+)\)/.exec(map.getCanvas().style.transform); return m ? parseFloat(m[1]) : 1; };
const upd = () => { dbg.textContent = mode + ' pitch=' + map.getPitch().toFixed(0) + ' bearing=' + map.getBearing().toFixed(0) + ' zoom=' + map.getZoom().toFixed(2) + ' scale=' + sc().toFixed(3); };
map.on('idle', () => { window.__ready = true; upd(); });
map.on('render', upd);

if (ZOOM) {
  // turn a plain horizontal left-drag into a SCROLL-ZOOM about the map centre. setZoom keeps the
  // centre fixed, so every feature moves radially outward (zoom-in) -- a curl-free, divergent field,
  // distinct from the pan's uniform translation and the spin's tangential swirl. The gain is gentle
  // (~1.3 zoom levels over the full drag) to keep per-sub-frame radial shift inside the block-match
  // search window and to limit tile pop-in.
  map.dragPan.disable(); map.scrollZoom.disable();
  let down = false, lastX = 0, z0 = 0;
  const c = map.getCanvasContainer();
  c.addEventListener('mousedown', e => { down = true; lastX = e.clientX; z0 = map.getZoom(); });
  window.addEventListener('mousemove', e => {
    if (!down) return;
    map.setZoom(z0 + (e.clientX - lastX) * 0.006);
  });
  window.addEventListener('mouseup', () => { down = false; });
}
if (SCALE) {
  // Round-31 control: a PURE image-scale zoom. We magnify the ALREADY-rendered canvas about its centre
  // via a CSS transform, WITHOUT touching the map (no setZoom -> no vector re-layout, no tile re-fetch,
  // no label re-placement). This is the textbook conformal divergence field, sharing webzoom's exact
  // finite-frame border geometry -- so comparing the two isolates "border bias" from "vector re-layout"
  // as the cause of zoom's PARTIAL external separation (round-30).
  map.dragPan.disable(); map.scrollZoom.disable();
  const cv = map.getCanvas();
  cv.style.transformOrigin = 'center center';
  let down = false, lastX = 0, s0 = 1;
  const c = map.getCanvasContainer();
  c.addEventListener('mousedown', e => { down = true; lastX = e.clientX; s0 = sc(); });
  window.addEventListener('mousemove', e => {
    if (!down) return;
    cv.style.transform = 'scale(' + Math.max(0.2, s0 + (e.clientX - lastX) * 0.004) + ')';
  });
  window.addEventListener('mouseup', () => { down = false; });
}
if (ROT) {
  // turn a plain left-drag into a bearing rotation. At pitch=0 (webspin) the whole field rotates
  // rigidly in-plane; at pitch=60 (webtilt) the same rotation is seen in perspective, so the near
  // (bottom) sweeps a large arc while the far (top) barely moves -- a genuinely non-rigid warp.
  map.dragPan.disable();
  let down = false, lastX = 0, b0 = 0;
  const c = map.getCanvasContainer();
  c.addEventListener('mousedown', e => { down = true; lastX = e.clientX; b0 = map.getBearing(); });
  window.addEventListener('mousemove', e => {
    if (!down) return;
    map.setBearing(b0 + (e.clientX - lastX) * 0.6);
  });
  window.addEventListener('mouseup', () => { down = false; });
}
</script>
</body>
</html>
