<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rt-flow 自动切换账号</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">道 · rt-flow <span class="ver">浏览器版</span></div>
    <div class="active" id="activeLine">未激活账号</div>
  </header>

  <section class="controls">
    <label class="switch">
      <input type="checkbox" id="autoSwitch" />
      <span>额度耗尽自动切换</span>
    </label>
    <div class="row">
      <label>缓冲 $<input type="number" id="buffer" min="0" step="1" /></label>
      <label>轮询 <input type="number" id="pollMin" min="1" step="1" />min</label>
      <button id="saveSettings" class="mini">保存</button>
    </div>
    <div class="row">
      <button id="rotateBtn" class="primary">⤴ 立即切到最优</button>
      <button id="refreshAll" class="mini">↻ 全部刷新额度</button>
    </div>
  </section>

  <section>
    <div class="sec-title">账号池</div>
    <ul id="accountList" class="accounts"></ul>
    <div id="empty" class="empty hid">账号池为空，下方添加。每个账号 = 邮箱 + 密码。</div>
  </section>

  <section class="addbox">
    <div class="sec-title">添加 / 更新账号</div>
    <input type="email" id="email" placeholder="邮箱 email" autocomplete="off" />
    <input type="password" id="password" placeholder="密码 password" autocomplete="off" />
    <input type="text" id="label" placeholder="标签 label (可选，防搞混)" autocomplete="off" />
    <button id="addBtn" class="primary">＋ 添加到账号池</button>
  </section>

  <div id="toast" class="toast hid"></div>
  <footer>email+password → auth1 → 注入 app.devin.ai 自动登录 · 道法自然</footer>
  <script src="popup.js"></script>
</body>
</html>
